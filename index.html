window.reviseWithProfile=async function(){
  const p=loadProfile();
  const activePlan=racePlans.find(r=>r.raceDate>=td());
  if(!activePlan){alert('Aktif koşu planı yok. Önce bir plan oluştur.');return;}

  showModal2('<div class="ov"><div class="mod" style="max-width:480px">'
    +'<div style="font-size:15px;font-weight:700;margin-bottom:6px"><i class="ti ti-sparkles"></i> Profil Bazlı Revizyon</div>'
    +'<div style="font-size:12px;color:var(--tx3);margin-bottom:14px">Profil verilerine ve hedeflere göre antrenman planı optimize ediliyor...</div>'
    +'<div id="prv-result" style="background:var(--bg3);border-radius:10px;padding:14px;font-size:12px;line-height:1.8;color:var(--tx2);min-height:60px"><span style="color:var(--tx3)">Analiz yapılıyor...</span></div>'
    +'<div id="prv-actions" style="margin-top:12px"></div>'
    +'</div></div>');

  const todayStr=td();
  const upcomingWks=activePlan.weeks.filter(w=>w.days.some(d=>d.date>=todayStr)).slice(0,4);
  const planSummary=upcomingWks.map(wk=>{
    const days=wk.days.filter(d=>d.type!=='rest').map(d=>{
      const dw=DAYS[new Date(d.date).getDay()===0?6:new Date(d.date).getDay()-1];
      return dw+': '+(RT_LABEL[d.type]||d.type)+' '+d.dist+'km @ '+d.pace;
    }).join(', ');
    return 'H'+wk.weekNum+'('+wk.phase+', '+wk.totalKm+'km): '+days;
  }).join('\n');

  const profileSummary=[
    p.weight?'Kilo: '+p.weight+'kg'+(p.targetWeight?' (Hedef: '+p.targetWeight+'kg)':''):'',
    p.bestHM?'YM: '+p.bestHM+(p.targetHM?' (Hedef: '+p.targetHM+')':''):'',
    p.best5k?'5K: '+p.best5k+(p.target5k?' (Hedef: '+p.target5k+')':''):'',
    p.squat1rm?'Squat: '+p.squat1rm+'kg'+(p.targetSquat?' (Hedef: '+p.targetSquat+'kg)':''):'',
    p.deadlift1rm?'Deadlift: '+p.deadlift1rm+'kg'+(p.targetDeadlift?' (Hedef: '+p.targetDeadlift+'kg)':''):'',
    p.weeklyKm?'Haftalık km: '+p.weeklyKm:'',
    p.injury?'Sakatlık: '+p.injury:'',
    p.limits?'Kısıtlama: '+p.limits:'',
  ].filter(Boolean).join('\n');

  const prompt='Sen elit bir kosu ve performans antrenorusun. Sporcu profili:\n'+profileSummary+'\n\nOnumuzdeki 4 haftanin plani:\n'+planSummary+'\n\nProfil ve hedeflere gore analiz yap:\n1. Mevcut kapasite ile plan uyumlu mu?\n2. Hedeflere ulasabilmek icin ne degismeli?\n3. Sakatlık veya kısıtlama varsa hangi antrenmanlar uyarlanmali?\n\n2-3 cumle somut yorum. Revizyon gerekiyorsa:\nREVISIONS_JSON:\n[{"date":"YYYY-MM-DD","action":"rest|easy|recovery|swap:tempo|swap:interval|swap:long","reason":"kisa Turkce neden"}]\nYoksa REVISIONS_JSON: []\nTurkce yaz.';

  try{
    const data=await claudeFetch(prompt,1000);
    if(!data){document.getElementById('prv-result').innerHTML='<span style="color:#e05c3a">Hata.</span>';return;}
    const text=(data.content||[]).map(c=>c.text||'').join('');
    const jsonMatch=text.match(/REVISIONS_JSON:\s*```(?:json)?\s*([\s\S]*?)```/)||text.match(/REVISIONS_JSON:\s*(\[[\s\S]*?\])/);
    let revisions=[];
    if(jsonMatch){try{revisions=JSON.parse(jsonMatch[1].trim());}catch(e){}}
    const display=text.replace(/REVISIONS_JSON:[\s\S]*$/,'').trim();
    const resultEl=document.getElementById('prv-result');
    const actionsEl=document.getElementById('prv-actions');
    if(resultEl) resultEl.innerHTML=display.replace(/\n/g,'<br/>');
    if(actionsEl){
      if(revisions.length>0){
        window._prvRevisions=revisions;
        actionsEl.innerHTML='<div style="margin-bottom:8px;font-size:11px;color:var(--tx3)">'+revisions.length+' değişiklik önerisi:</div>'
          +revisions.map(r=>'<div style="font-size:11px;padding:5px 8px;background:var(--bg3);border-radius:6px;margin-bottom:4px;color:var(--tx2)">'+r.date+' → <span style="color:#e8c547">'+r.action+'</span> <span style="color:var(--tx3)">· '+r.reason+'</span></div>').join('')
          +'<div style="display:flex;gap:8px;margin-top:10px">'
          +'<button class="btn" onclick="closeModal()" style="flex:1;justify-content:center">Kapat</button>'
          +'<button class="btn btnp" onclick="applyWeeklyRevisions(window._prvRevisions);closeModal();go(\'race\');" style="flex:1;justify-content:center">✓ Uygula ('+revisions.length+')</button>'
          +'</div>';
      } else {
        actionsEl.innerHTML='<button class="btn btns" onclick="closeModal()" style="width:100%;justify-content:center">Kapat</button>';
      }
    }
  }catch(err){
    const r=document.getElementById('prv-result');
    if(r) r.innerHTML='<span style="color:#e05c3a">Hata: '+err.message+'</span>';
  }
};

window.calcCapacity = function(){
  const p=loadProfile();
  const summaryEl=document.getElementById('prf-summary');
  const contentEl=document.getElementById('prf-summary-content');
  if(!summaryEl||!contentEl) return;
  const rows=[];
  if(p.birthYear){ const age=new Date().getFullYear()-parseInt(p.birthYear); rows.push({label:'Yaş',value:age+' yaş',note:age<30?'Peak antrenman dönemi':age<45?'Optimal performans yaşı':'Recovery süreleri uzayabilir'}); }
  if(p.height&&p.weight){ const bmi=(parseFloat(p.weight)/Math.pow(parseFloat(p.height)/100,2)).toFixed(1); rows.push({label:'BMI',value:bmi,note:bmi<18.5?'Zayıf':bmi<25?'Normal (ideal)':bmi<30?'Fazla kilolu':'Obez'}); }
  function parseT(str){ if(!str)return null; const pts=str.split(':'); if(pts.length===3)return parseInt(pts[0])*3600+parseInt(pts[1])*60+parseInt(pts[2]); return parseInt(pts[0])*60+parseInt(pts[1]||0); }
  function fmtP(spm){ const m=Math.floor(spm);const s=Math.round((spm-m)*60);return m+':'+(s<10?'0':'')+s; }
  if(p.best5k){ const sc=parseT(p.best5k); if(sc){ const pace=sc/5/60; rows.push({label:'5K Pace',value:fmtP(pace)+'/km',note:''}); } }
  if(p.best10k){ const sc=parseT(p.best10k); if(sc){ const pace=sc/10/60; rows.push({label:'10K Pace',value:fmtP(pace)+'/km',note:''}); } }
  if(p.bestHM){ const sc=parseT(p.bestHM); if(sc){ const pace=sc/21.1/60; rows.push({label:'YM Pace',value:fmtP(pace)+'/km',note:'Hedef pace civarı'}); } }
  if(p.squat1rm&&p.weight){ const r=(parseFloat(p.squat1rm)/parseFloat(p.weight)).toFixed(2); rows.push({label:'Squat/Vücut',value:r+'x',note:r<1?'Başlangıç':r<1.5?'Orta':r<2?'İleri':'Elite'}); }
  if(p.deadlift1rm&&p.weight){ const r=(parseFloat(p.deadlift1rm)/parseFloat(p.weight)).toFixed(2); rows.push({label:'Deadlift/Vücut',value:r+'x',note:r<1.5?'Başlangıç':r<2?'Orta':r<2.5?'İleri':'Elite'}); }
  if(p.maxPullup){ rows.push({label:'Max Pull-up',value:p.maxPullup+' tekrar',note:p.maxPullup<5?'Başlangıç':p.maxPullup<10?'Orta':p.maxPullup<15?'İyi':'Çok iyi'}); }
  contentEl.innerHTML=rows.length?rows.map(r=>'<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd)"><div style="font-size:12px;color:var(--tx2)">'+r.label+'</div><div style="text-align:right"><span style="font-size:12px;font-weight:700;color:#e8c547;font-family:monospace">'+r.value+'</span>'+(r.note?'<span style="font-size:10px;color:var(--tx3);margin-left:6px">'+r.note+'</span>':'')+'</div></div>').join(''):'<div style="font-size:12px;color:var(--tx3)">Hesaplama için bilgileri doldur.</div>';
  summaryEl.style.display='block';

  // Sıfırlama bölümünü ekle
  var resetSection = document.getElementById('profile-reset-section');
  if(!resetSection){
    resetSection = document.createElement('div');
    resetSection.id = 'profile-reset-section';
    resetSection.className = 'card';
    resetSection.style.cssText = 'margin-top:16px;border-color:#c0392b44';
    resetSection.innerHTML = '<div class="fb">'
      +'<div>'
      +'<div style="font-size:12px;font-weight:600;color:var(--tx)">⚠️ Veri Sıfırlama</div>'
      +'<div style="font-size:11px;color:var(--tx3);margin-top:2px">Seçtiğin verileri kalıcı olarak sil</div>'
      +'</div>'
      +'<button class="btn btns" onclick="showResetModal()" style="color:#c0392b;border-color:#c0392b44">Sıfırla…</button>'
      +'</div>';
    el('s-profile').appendChild(resetSection);
  }
};

  var raceLines=races.map(function(r){
    return '- '+r.name+' ('+r.date+', '+(DLBL[r.type]||r.type||'hm')+(r.goal?', hedef:'+r.goal:'')+')';
  }).join('\n');

  var d30=new Date(td());d30.setDate(d30.getDate()-30);
  var d30s=d30.toISOString().slice(0,10);
  var rec=logs.filter(function(l){return l.date>=d30s;});
  var recKm=rec.filter(function(l){return l.branch==='run';})
    .reduce(function(s,l){return s+parseFloat((l.runData&&l.runData.distance)||0);},0);
  var recStr=rec.filter(function(l){return l.branch==='strength';}).length;

  var prompt='Sen elit bir kosu ve kondisyon antrenorüsün. Türkce yaz.\n\n'
    +'SPORCU:\n'+(profLines.join('\n')||'Profil girilmemis')+'\n\n'
    +'HEDEF YARISLAR:\n'+(raceLines||'Yok')+'\n\n'
    +'SON 30 GUN: '+recKm.toFixed(0)+' km kosu, '+recStr+' kuvvet\n'
    +'ODAK: '+focus+(note?'\nNOT: '+note:'')+'\n\n'
    +'Su basliklari kullan:\n'
    +'**Genel Strateji**\n'
    +'**Faz Plani**\n'
    +'**Bu Hafta 3 Oneri**\n'
    +'**Dikkat Edilmesi Gerekenler**';

  // ⑥ API çağrısı — key yoksa direkt lokal plan
  var apiKey = typeof getApiKey === 'function' ? getApiKey() : null;
  if(!apiKey){
    console.log('API key yok, lokal plan kullaniliyor');
    var lt=buildLocalLongTermPlan(races,focus,prof,note); window._lastAIPlanText=lt; window._lastAIPlanRaces=races; window._lastAIPlanFocus=focus;
    renderAIPlanResult(lt, races, focus);
    window._aiPlanRunning = false;
    return;
  }

  claudeFetch(prompt, 1200)
  .then(function(json){
    console.log('AI Plan API yaniti:', JSON.stringify(json).slice(0,200));
    window._aiPlanRunning = false;
    if(!json){
      renderAIPlanResult(buildLocalLongTermPlan(races, focus, prof, note), races, focus);
      return;
    }
    var text = json.content ? json.content.map(function(b){return b.text||'';}).join('').trim() : '';
    if(!text) throw new Error('bos');
    window._lastAIPlanText=text; window._lastAIPlanRaces=races; window._lastAIPlanFocus=focus;
  renderAIPlanResult(text, races, focus);
  })
  .catch(function(err){
    window._aiPlanRunning = false;
    console.warn('API hatasi, lokal plan:', err&&err.message||err);
    renderAIPlanResult(buildLocalLongTermPlan(races, focus, prof, note), races, focus);
  });
};


function buildLocalLongTermPlan(races, focus, prof, note){
  const today = td();
  const DIST_LABEL2={'5k':'5 km','10k':'10 km','hm':'Yarı Maraton','marathon':'Maraton'};

  let out = '**Genel Strateji**\n\n';

  if(races.length===0){
    out += 'Aktif yarış hedefi bulunmuyor. Genel kondisyon ve kuvvet geliştirme odaklı bir program önerilir. ';
    out += 'Haftada 3-4 koşu seansı + 2 kuvvet seansı dengeli bir başlangıç noktasıdır.\n\n';
  } else {
    const nextRace = races[0];
    const daysLeft = Math.max(0, Math.round((new Date(nextRace.date)-new Date(today))/(1000*60*60*24)));
    const weeksLeft = Math.ceil(daysLeft/7);
    out += `En yakın yarışın **${nextRace.name}** (${nextRace.date}) için **${weeksLeft} haftan** var. `;
    if(focus.includes('Denge')) out += 'Koşu ve kuvvet antrenmanlarını dengeli götürerek hem dayanıklılık hem de güç gelişimi hedefliyoruz. ';
    else if(focus.includes('Koşu')) out += 'Koşu performansına odaklanarak haftalık km artışını kademeli olarak yükseltiyoruz. ';
    else if(focus.includes('Kuvvet')) out += 'Kuvvet ve kondisyon ağırlıklı program ile temel güç tabanı oluşturuyoruz. ';
    out += 'Periodizasyon: Baz → Gelişim → Zirve → İnce Ayar.\n\n';
  }

  out += '**Faz Planı**\n\n';

  // Fazları oluştur
  if(races.length>0){
    const nextRace=races[0];
    const daysLeft=Math.max(0,Math.round((new Date(nextRace.date)-new Date(today))/(1000*60*60*24)));
    const weeksLeft=Math.ceil(daysLeft/7);
    const baseKm = prof.bestHM ? 35 : 25;
    const phases=[
      {name:'Baz', weeks:Math.max(2,Math.round(weeksLeft*0.3)), km:baseKm, str:2, focus:'Aerobik temel, teknik'},
      {name:'Gelişim', weeks:Math.max(2,Math.round(weeksLeft*0.4)), km:Math.round(baseKm*1.3), str:2, focus:'Tempo, uzun koşu'},
      {name:'Zirve', weeks:Math.max(1,Math.round(weeksLeft*0.2)), km:Math.round(baseKm*1.5), str:1, focus:'Yarış temposu, interval'},
      {name:'İnce Ayar', weeks:Math.max(1,Math.round(weeksLeft*0.1)), km:Math.round(baseKm*0.7), str:1, focus:'Toparlanma, hazırlık'},
    ];
    phases.forEach(p=>{
      out+=`- **${p.name} (${p.weeks} hafta):** Haftalık ~${p.km} km koşu, ${p.str} kuvvet seansı — ${p.focus}\n`;
    });
    if(races.length>1){
      out+=`\n${races.slice(1).map(r=>`- **${r.name} (${r.date}):** Aynı baz üzerinde yeni zirve bloğu`).join('\n')}\n`;
    }
  } else {
    out+='- **Temel (4 hafta):** Haftada 25-30 km koşu, 2 kuvvet seansı\n';
    out+='- **Gelişim (4 hafta):** Haftada 35-40 km, 2 kuvvet seansı\n';
    out+='- **Sürdürme:** Haftada 40-45 km, 2-3 kuvvet seansı\n';
  }

  out+='\n**Bu Hafta İçin 3 Öneri**\n\n';
  const tips=[];
  if(focus.includes('Koşu')||focus.includes('Denge')) tips.push('1 uzun koşu (hedef mesafenin %60-70\'i), 1 tempo koşu, 1 easy recovery koşusu yap');
  if(focus.includes('Kuvvet')||focus.includes('Denge')) tips.push('Squat + deadlift odaklı alt vücut seansı ile single-leg egzersizler ekle');
  tips.push('Uyku kaliteni ve protein alımını optimize et — toparlanmanın %80\'i buradan geliyor');
  if(note&&note.length>5) tips.push(`Belirttiğin "${note.slice(0,40)}..." konusunu antrenörünle değerlendir`);
  tips.slice(0,3).forEach((t,i)=>{ out+=`- ${t}\n`; });

  out+='\n**Dikkat Edilmesi Gerekenler**\n\n';
  out+='- Haftalık km artışını %10\'dan fazla artırma (sakatlık önleme kuralı)\n';
  out+='- Yarıştan 2-3 gün önce yüksek yoğunluklu antrenman yapma\n';
  out+='- Kuvvet ve uzun koşu günlerini aynı güne koyma, 24-48 saat araya bırak\n';
  out+='- Her 4. haftayı düşük hacimli toparlanma haftası yap\n';

  return out;
}


function renderAIPlanResult(text, races, focus){

      .replace(/^#{1,3}\s+(.+)$/gm,'<h4 style="font-size:13px;font-weight:700;margin:14px 0 6px;color:var(--acc)">$1</h4>')
      .replace(/^- (.+)$/gm,'<li style="margin:4px 0;padding-left:4px">$1</li>')
      .replace(/(<li[^>]*>.*<\/li>\n?)+/gs, s=>'<ul style="padding-left:16px;margin:6px 0">'+s+'</ul>')
      .replace(/\n\n/g,'</p><p style="margin:8px 0">')
      .replace(/\n/g,'<br/>');
  }

  const raceChips = races.map(r=>
    `<span style="background:var(--acc)22;color:var(--acc);border:1px solid var(--acc)44;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:500">${r.name} — ${r.date}</span>`

        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btns" onclick="renderRaceScreen()" style="font-size:11px">← Plana Dön</button>
          <button class="btn btns" onclick="showAILongTermPlan()" style="font-size:11px">↻ Yeniden Oluştur</button>
          <button class="btn btnp" onclick="applyAIPlanToCalendar()" style="font-size:11px;gap:5px">📅 Plana İşle</button>
        </div>
      </div>

      ${raceChips?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">${raceChips}</div>`:''}

      <div class="card" style="line-height:1.7;font-size:12px;color:var(--tx2)">
        <p style="margin:0">${mdToHtml(text)}</p>

    </div>`;
}

window.applyAIPlanToCalendar = function(){
  var planText = window._lastAIPlanText||'';
  var races    = window._lastAIPlanRaces||[];
  var focus    = window._lastAIPlanFocus||'Denge';
  var today    = td();

  // Fazları parse et
  var phases=[];
  var blocks=planText.split(/\*\*Faz/i).slice(1);
  blocks.forEach(function(block){
    var wm=block.match(/Hafta[^)]*?(\d+)\s*[-\u2013]\s*(\d+)/i);
    var w1=wm?parseInt(wm[1]):null, w2=wm?parseInt(wm[2]):null;
    var km=parseInt((block.match(/(\d+)\s*km/i)||[0,35])[1])||35;
    var rd=Math.min(5,parseInt((block.match(/(\d+)\s*ko\u015f/i)||[0,3])[1]))||3;
    if(w1&&w2) phases.push({w1:w1,w2:w2,km:km,runDays:rd});
  });
  if(!phases.length) phases=[
    {w1:1,w2:8,km:30,runDays:3},
    {w1:9,w2:20,km:50,runDays:4},
    {w1:21,w2:26,km:60,runDays:5},
    {w1:27,w2:28,km:30,runDays:3}
  ];

  var RP={3:['easy','easy','long'],4:['easy','tempo','long','easy'],5:['easy','tempo','interval','long','easy']};
  var RS={3:[0,2,4],4:[0,2,4,6],5:[0,1,3,4,6]};
  var phaseNames=['base','build','peak','taper'];
  var totalWeeks=phases.reduce(function(s,p){return s+(p.w2-p.w1+1);},0);
  var raceDate=races.length?races[0].date:null;
  if(!raceDate){var rd2=new Date(today);rd2.setDate(rd2.getDate()+totalWeeks*7);raceDate=rd2.toISOString().slice(0,10);}
  var raceName=races.length?races[0].name:'AI Planı';
  var monday=wkStart(today);
  var weeks=[];

  phases.forEach(function(ph,pi){
    for(var w=ph.w1;w<=ph.w2;w++){
      var wkDate=new Date(monday);wkDate.setDate(wkDate.getDate()+(w-1)*7);
      var wkS=wkDate.toISOString().slice(0,10);
      var rSlots=RS[ph.runDays]||RS[3];
      var rTypes=RP[ph.runDays]||RP[3];
      var days=[];
      for(var d=0;d<7;d++){
        var dd=new Date(wkDate);dd.setDate(dd.getDate()+d);
        var ds=dd.toISOString().slice(0,10);
        var si=rSlots.indexOf(d);
        var dtype = si>=0?(rTypes[si]||'easy'):'rest';
        var kpd = Math.round(ph.km/ph.runDays);
        var paceMap = {easy:'6:00',tempo:'5:20',interval:'4:50',long:'6:30'};
        days.push({
          date:ds, type:dtype, done:false,
          dist: dtype!=='rest' ? kpd : 0,
          pace: paceMap[dtype]||'6:00'
        });
      }
      weeks.push({startDate:wkS,phase:phaseNames[Math.min(pi,3)],totalKm:ph.km,
        paces:{easy:'6:00',tempo:'5:20',interval:'4:50',long:'6:30'},days:days});
    }
  });

  var newPlan={
    id:'ai-'+Date.now(),
    raceName:raceName+' — AI Planı',
    raceDate:raceDate,
    raceType:races.length?races[0].type:'hm',
    goalTime:races.length&&races[0].goal?races[0].goal:'—',
    goalPace:races.length&&races[0].goal?(function(){
      var DIST={hm:21.1,'5k':5,'10k':10,marathon:42.2};
      var dk=DIST[races[0].type]||21.1;
      var parts=races[0].goal.split(':').map(Number);
      var sec=parts.length===3?parts[0]*3600+parts[1]*60+parts[2]:parts[0]*60+(parts[1]||0);
      var ps=Math.round(sec/dk);
      return Math.floor(ps/60)+':'+String(ps%60).padStart(2,'0');
    })():'—',
    _goalExpl:focus+' odaklı AI planı',
    currentLevel:'intermediate',
    daysPerWeek:phases[0]?phases[0].runDays:3,
    totalWeeks:totalWeeks,
    createdAt:today,
    weeks:weeks,
    perfData:{}
  };

  racePlans=racePlans.filter(function(r){return !(r.id&&r.id.indexOf('ai-')===0&&r.raceDate===raceDate);});
  racePlans.push(newPlan);
  saveR();
  window._aiPlanRunning=false;

  showModal('<div class="mod" onclick="event.stopPropagation()" style="max-width:400px;text-align:center;padding:28px">'
    +'<div style="font-size:36px;margin-bottom:12px">\uD83D\uDCC5</div>'
    +'<div style="font-size:18px;font-weight:700;margin-bottom:8px">Plan Takvime \u0130\u015flendi!</div>'
    +'<div style="font-size:13px;color:var(--tx2);margin-bottom:6px">'+totalWeeks+' haftal\u0131k plan olu\u015fturuldu.</div>'
    +'<div style="font-size:11px;color:var(--tx3);margin-bottom:16px">'+raceName+' \u2014 '+raceDate+'</div>'
    +'<div style="display:flex;gap:8px;justify-content:center">'
    +'<button class="btn btns" onclick="closeModal()">Kapat</button>'
    +'<button class="btn btnp" onclick="closeModal();renderRaceDashboard(racePlans[racePlans.length-1])">Plan\u0131 G\u00f6r \u2192</button>'
    +'</div></div>');
};

// DRAG & DROP ENGINE (mouse + touch)
// ══════════════════════════════════════════════════════════
let _drag = null; // {planId, date, type, dist, pace, description, el}

function initDragDrop(planId){
  const cells = document.querySelectorAll('.day-cell[draggable="true"]');
  const allCells = document.querySelectorAll('.day-cell');

  cells.forEach(el => {
    // Mouse drag
    el.addEventListener('dragstart', e => {
      _drag = {planId, date:el.dataset.date, type:el.dataset.type, el};
      el.classList.add('dragging','drag-source');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging','drag-source');
      document.querySelectorAll('.drag-over').forEach(c=>c.classList.remove('drag-over'));
      _drag = null;
    });
    // Touch drag
    el.addEventListener('touchstart', e => {
      const touch = e.touches[0];
      _drag = {planId, date:el.dataset.date, type:el.dataset.type, el,
        startX:touch.clientX, startY:touch.clientY};
      el.classList.add('drag-source');
    }, {passive:true});
    el.addEventListener('touchmove', e => {
      if(!_drag) return;
      const touch = e.touches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const cell = target?.closest('.day-cell');
      document.querySelectorAll('.drag-over').forEach(c=>c.classList.remove('drag-over'));
      if(cell && cell !== _drag.el) cell.classList.add('drag-over');
    }, {passive:true});
    el.addEventListener('touchend', e => {
      if(!_drag) return;
      const touch = e.changedTouches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const cell = target?.closest('.day-cell');
      if(cell && cell !== _drag.el) dropOnCell(cell, planId);
      _drag.el.classList.remove('drag-source');
      document.querySelectorAll('.drag-over').forEach(c=>c.classList.remove('drag-over'));
      _drag = null;
    });
  });

  allCells.forEach(el => {
    el.addEventListener('dragover', e => {
      if(!_drag || el === _drag.el) return;
      e.preventDefault();
      document.querySelectorAll('.drag-over').forEach(c=>c.classList.remove('drag-over'));
      el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      if(!_drag || el === _drag.el) return;
      dropOnCell(el, planId);
    });
  });
}

function dropOnCell(targetEl, planId){
  if(!_drag) return;
  const fromDate = _drag.date;
  const toDate = targetEl.dataset.date;
  if(!fromDate || !toDate || fromDate === toDate) return;

  const plan = racePlans.find(r=>r.id===planId);
  if(!plan) return;

  // Find source and target days in plan
  let fromDay=null, toDay=null, fromWk=null, toWk=null;
  for(const wk of plan.weeks){
    for(const d of wk.days){
      if(d.date===fromDate){fromDay=d;fromWk=wk;}
      if(d.date===toDate){toDay=d;toWk=wk;}
    }
  }
  if(!fromDay) return;

  // Dont allow drop on race day
  if(toDay && toDay.type==="race") return;

  // Swap sessions (or move to rest day)
  const fromSnapshot = {type:fromDay.type,dist:fromDay.dist,pace:fromDay.pace,description:fromDay.description,done:fromDay.done};

  if(toDay){
    // Swap
    fromDay.type=toDay.type; fromDay.dist=toDay.dist; fromDay.pace=toDay.pace;
    fromDay.description=toDay.description; fromDay.done=toDay.done;
    toDay.type=fromSnapshot.type; toDay.dist=fromSnapshot.dist; toDay.pace=fromSnapshot.pace;
    toDay.description=fromSnapshot.description; toDay.done=fromSnapshot.done;
  }

  // Recalc week km totals
  if(fromWk) fromWk.totalKm = Math.round(fromWk.days.reduce((s,d)=>s+d.dist,0)*10)/10;
  if(toWk && toWk!==fromWk) toWk.totalKm = Math.round(toWk.days.reduce((s,d)=>s+d.dist,0)*10)/10;

  saveR();
  renderRaceDashboard(plan);
}

// Render icon: replaces <i class="ti ti-xxx"> with inline SVG
function renderIcons(el){
  el = el || document.body;
  el.querySelectorAll('i[class*="ti-"]').forEach(function(icon){
    const cls = Array.from(icon.classList).find(c=>c.startsWith('ti-')&&c!=='ti');
    if(!cls) return;
    const svg = ICONS[cls];
    if(!svg) return;
    const wrapper = document.createElement('span');
    wrapper.className = 'ti-svg';
    wrapper.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;width:1em;height:1em;vertical-align:middle;color:inherit';
    wrapper.innerHTML = svg;
    icon.parentNode.replaceChild(wrapper, icon);
  });
}

// ══════════════════════════════════════════════════════════
// FIT FILE PARSER (sıfır bağımlılık, binary protocol)
// Suunto / Garmin / Polar .fit dosyaları için
// ══════════════════════════════════════════════════════════

const FIT = (function(){
  // FIT Global Message Numbers
  const MSG = { FILE_ID:0, SESSION:18, LAP:19, RECORD:20, ACTIVITY:34 };
  
  // FIT Base Types
  const BASE = {
    0x00:{size:1,read:(v,o)=>v.getUint8(o)},
    0x01:{size:1,read:(v,o)=>v.getInt8(o)},
    0x02:{size:2,read:(v,o,e)=>v.getUint16(o,e)},
    0x03:{size:2,read:(v,o,e)=>v.getInt16(o,e)},
    0x04:{size:4,read:(v,o,e)=>v.getUint32(o,e)},
    0x05:{size:4,read:(v,o,e)=>v.getInt32(o,e)},
    0x06:{size:4,read:(v,o,e)=>v.getFloat32(o,e)},
    0x07:{size:8,read:(v,o,e)=>v.getFloat64(o,e)},
    0x08:{size:1,read:(v,o)=>v.getUint8(o)},  // byte
    0x09:{size:2,read:(v,o,e)=>v.getUint16(o,e)},
    0x0A:{size:4,read:(v,o,e)=>v.getUint32(o,e)},
    0x0B:{size:8,read:(v,o)=>{ // uint64 - read as two uint32
      const lo=v.getUint32(o,true),hi=v.getUint32(o+4,true);
      return hi*0x100000000+lo; }},
    0x0C:{size:1,read:(v,o)=>v.getUint8(o)},  // bool
    0x0D:{size:1,read:(v,o)=>v.getUint8(o)},  // string byte
    0x0E:{size:4,read:(v,o,e)=>v.getUint32(o,e)}, // uint32z
    0x0F:{size:4,read:(v,o,e)=>v.getUint32(o,e)}, // byte
    0x84:{size:2,read:(v,o,e)=>v.getUint16(o,e)},
    0x85:{size:2,read:(v,o,e)=>v.getUint16(o,e)},
    0x86:{size:4,read:(v,o,e)=>v.getUint32(o,e)},
    0x8B:{size:2,read:(v,o,e)=>v.getUint16(o,e)},
    0x8C:{size:4,read:(v,o,e)=>v.getUint32(o,e)},
  };
  function baseSize(t){ return (BASE[t]||{size:1}).size; }
  function baseRead(t,v,o,e){ return (BASE[t]||BASE[0x00]).read(v,o,e); }

  // SESSION message field definitions (field_def_num → name, scale, offset, unit)
  const SESSION_FIELDS = {
    7:  {n:"sport"},
    8:  {n:"sub_sport"},
    9:  {n:"total_elapsed_time"},
    10: {n:"total_timer_time"},
    11: {n:"total_distance"},       // scale=100 → /100=m → /1000=km
    13: {n:"total_calories"},
    14: {n:"total_fat_calories"},
    15: {n:"avg_speed"},            // mm/s → /1000=m/s
    16: {n:"max_speed"},
    17: {n:"avg_heart_rate"},
    18: {n:"max_heart_rate"},
    19: {n:"avg_cadence"},
    20: {n:"max_cadence"},
    22: {n:"total_ascent"},
    23: {n:"total_descent"},
    25: {n:"total_training_effect"},
    26: {n:"total_laps"},
    27: {n:"num_laps"},
    33: {n:"avg_temperature"},
    124:{n:"enhanced_avg_speed"},
    125:{n:"enhanced_max_speed"},
    137:{n:"vo2_max"},              // VO2max (some devices, scale=10 → /10 = ml/kg/min)
    253:{n:"timestamp"},
  };
  const RECORD_FIELDS = {
    0:  {n:"latitude"},   // semicircles
    1:  {n:"longitude"},  // semicircles
    2:  {n:"altitude", s:5, offset:500},  // (raw/5)-500 = metres
    3:  {n:"heart_rate"},
    4:  {n:"cadence"},
    5:  {n:"distance", s:100},   // cm → m
    6:  {n:"speed", s:1000},     // mm/s → m/s
    7:  {n:"power"},
    13: {n:"temperature"},
    253:{n:"timestamp"},
  };

  function parse(buffer){
    const view = new DataView(buffer);
    let offset = 0;
    const result = { sessions:[], records:[], laps:[], raw:{} };
    const localMsgs = {}; // local message definitions

    // 1. File header
    const headerSize = view.getUint8(0);
    const protocolVer = view.getUint8(1);
    const profileVer = view.getUint16(2, true);
    const dataSize = view.getUint32(4, true);
    const magic = String.fromCharCode(view.getUint8(8),view.getUint8(9),view.getUint8(10),view.getUint8(11));
    if(magic !== ".FIT") throw new Error("Geçersiz FIT dosyası");
    offset = headerSize;
    const end = headerSize + dataSize;

    // 2. Parse records
    while(offset < end - 1){
      const recHdr = view.getUint8(offset++);

      if(recHdr & 0x40){ // Definition message
        const isDevData = (recHdr & 0x20) !== 0;
        const localNum = recHdr & 0x0F;
        offset++; // reserved
        const isBigEndian = view.getUint8(offset++) !== 0;
        const endian = !isBigEndian; // true = little endian for DataView
        const globalMsgNum = view.getUint16(offset, endian); offset += 2;
        const numFields = view.getUint8(offset++);
        const fields = [];
        for(let i=0;i<numFields;i++){
          fields.push({ defNum:view.getUint8(offset++), size:view.getUint8(offset++), baseType:view.getUint8(offset++) });
        }
        const devFieldDefs = [];
        if(isDevData){
          const numDevFields = view.getUint8(offset++);
          for(let i=0;i<numDevFields;i++){
            devFieldDefs.push({
              fieldNum: view.getUint8(offset++),
              size:     view.getUint8(offset++),
              devIdx:   view.getUint8(offset++)
            });
          }
        }
        localMsgs[localNum] = { globalNum:globalMsgNum, fields, devFieldDefs, endian };

      } else if(recHdr & 0x80){ // Compressed timestamp
        const localNum = (recHdr >> 5) & 0x03;
        const def = localMsgs[localNum];
        if(!def){ offset++; continue; }
        const msgOffset = offset;
        const msgData = readDataMsg(view, offset, def);
        offset += def.fields.reduce((s,f)=>s+f.size,0);
        processMsg(def.globalNum, msgData, result);

      } else { // Normal data message
        const localNum = recHdr & 0x0F;
        const def = localMsgs[localNum];
        if(!def) break;
        const msgData = readDataMsg(view, offset, def);
        offset += def.fields.reduce((s,f)=>s+f.size,0);
        processMsg(def.globalNum, msgData, result);
      }
    }

    return result;
  }

  function readDataMsg(view, offset, def){
    const data = {};
    let o = offset;
    for(const f of def.fields){
      const bt = f.baseType & 0x9F;
      let val;
      if(f.size === baseSize(bt)){
        val = baseRead(bt, view, o, def.endian);
      } else if(f.size === 1){ val = view.getUint8(o); }
      else if(f.size === 2){ val = view.getUint16(o, def.endian); }
      else if(f.size === 4){ val = view.getUint32(o, def.endian); }
      else if(f.size === 8){ val = view.getFloat64(o, def.endian); }
      else { val = view.getUint8(o); }
      data[f.defNum] = val;
      o += f.size;
    }
    // Read developer fields (Suunto custom: calories, VO2max, EPOC etc.)
    for(const df of (def.devFieldDefs||[])){
      try {
        let val;
        if(df.size === 4) val = view.getFloat32(o, def.endian);
        else if(df.size === 2) val = view.getUint16(o, def.endian);
        else if(df.size === 1) val = view.getUint8(o);
        else val = view.getFloat32(o, def.endian);
        data['dev_'+df.fieldNum+'_'+df.devIdx] = val;
        o += df.size;
      } catch(e){ o += df.size; }
    }
    return data;
  }

  // Invalid value sentinels
  const INVALID = { 1:0xFF, 2:0xFFFF, 4:0xFFFFFFFF };
  function isValid(val, size){ return val !== INVALID[size] && val !== undefined && val !== null; }

  function processMsg(globalNum, data, result){
    if(globalNum === MSG.SESSION){
      const s = {};
      for(const [k,v] of Object.entries(data)){
        const fd = SESSION_FIELDS[+k];
        if(!fd) continue;
        if(!isValid(v, 4) && !isValid(v, 2) && !isValid(v, 1)) continue;
        s[fd.n] = v;
      }
      // Convert units
      if(s.total_elapsed_time) s.total_elapsed_time = s.total_elapsed_time / 1000;
      if(s.total_timer_time)   s.total_timer_time   = s.total_timer_time   / 1000;
      if(s.total_distance)     s.total_distance     = s.total_distance     / 100000;
      // Speed: prefer enhanced, fallback to avg_speed
      const rawSpeed = s.enhanced_avg_speed || s.avg_speed;
      if(rawSpeed && rawSpeed < 0xFFFF) s.avg_speed = rawSpeed / 1000;
      else delete s.avg_speed;
      if(s.max_speed) s.max_speed = s.max_speed / 1000;
      // VO2max: field 137 or dev field
      if(s.vo2_max && s.vo2_max < 0xFFFF){
        if(s.vo2_max > 900) s.vo2_max = s.vo2_max / 10;
        if(s.vo2_max < 10 || s.vo2_max > 100) delete s.vo2_max;
      } else { delete s.vo2_max; }
      // Suunto developer fields: scan for calories (epoc, etc.) and VO2max
      // Suunto dev field indices vary by firmware - scan all dev_ fields
      for(const k of Object.keys(s)){
        if(!k.startsWith('dev_')) continue;
        const v = s[k];
        if(v == null || isNaN(v)) { delete s[k]; continue; }
        // VO2max: float, range 20-90
        if(!s.vo2_max && v >= 20 && v <= 90 && String(v).includes('.')) {
          s.vo2_max = Math.round(v * 10) / 10;
        }
        // Calories: integer-like, range 100-5000
        if(!s.suunto_calories && v >= 100 && v <= 5000 && Math.round(v) === v) {
          s.suunto_calories = Math.round(v);
        }
        delete s[k];
      }
      // Prefer suunto_calories over standard if standard is 0
      if(s.suunto_calories && (!s.total_calories || s.total_calories === 0)){
        s.total_calories = s.suunto_calories;
      }
      delete s.enhanced_avg_speed; delete s.enhanced_max_speed;
      result.sessions.push(s);
    }
    else if(globalNum === MSG.RECORD){
      const r = {};
      for(const [k,v] of Object.entries(data)){
        const fd = RECORD_FIELDS[+k];
        if(!fd || !isValid(v,4)&&!isValid(v,2)&&!isValid(v,1)) continue;
        r[fd.n] = v;
      }
      if(r.distance) r.distance = r.distance / 100000; // km
      if(r.speed) r.speed = r.speed / 1000; // m/s
      if(r.latitude) r.latitude = r.latitude * (180/Math.pow(2,31));
      if(r.longitude) r.longitude = r.longitude * (180/Math.pow(2,31));
      if(r.altitude) r.altitude = r.altitude/5 - 500;
      result.records.push(r);
    }
  }

  // ── Main extract function ────────────────────────────────
  // Returns normalized activity data for FitLog
  function extract(buffer){
    const parsed = parse(buffer);
    const sessions = parsed.sessions;
    if(!sessions.length) throw new Error("FIT dosyasında egzersiz verisi bulunamadı");

    // Merge all sessions (multi-sport)
    const totalDist = sessions.reduce((s,x)=>s+(x.total_distance||0),0);
    // Prefer timer_time (active, no pauses) matching Suunto app display
    const totalTime = sessions.reduce((s,x)=>s+(x.total_timer_time||x.total_elapsed_time||0),0);
    const totalCal  = sessions.reduce((s,x)=>s+(x.total_calories||0),0);

    // Heart rate: weighted avg
    const hrSessions = sessions.filter(x=>x.avg_heart_rate);
    const avgHR = hrSessions.length
      ? Math.round(hrSessions.reduce((s,x)=>s+(x.avg_heart_rate*(x.total_elapsed_time||1)),0)
        / hrSessions.reduce((s,x)=>s+(x.total_elapsed_time||1),0))
      : null;
    const maxHR = sessions.reduce((m,x)=>Math.max(m,x.max_heart_rate||0),0)||null;

    // Pace: prefer avg_speed, fallback to distance/time calculation
    const speedSessions = sessions.filter(x=>x.avg_speed && x.avg_speed > 0 && x.avg_speed < 20);
    let avgSpeed = speedSessions.length
      ? speedSessions.reduce((s,x)=>s+x.avg_speed,0)/speedSessions.length
      : null;

    // Fallback: calculate from total_distance / total_timer_time
    if(!avgSpeed && totalDist > 0 && totalTime > 0){
      avgSpeed = (totalDist * 1000) / totalTime; // km→m / seconds = m/s
    }

    let pace = null;
    if(avgSpeed && avgSpeed > 0){
      const paceMin = 1000/(avgSpeed*60); // m/s → min/km
      const pm = Math.floor(paceMin);
      const ps = Math.round((paceMin-pm)*60);
      pace = pm+":"+(ps<10?"0":"")+ps;
    }

    // Sport type
    const sportMap = {0:"generic",1:"run",2:"cycling",5:"swimming",17:"hiking"};
    const sport = sportMap[sessions[0]?.sport] || "run";

    // Timestamp → date
    const ts = sessions[0]?.timestamp;
    let date = new Date().toISOString().slice(0,10);
    if(ts){
      // FIT epoch: Dec 31, 1989 00:00:00 UTC
      const fitEpoch = 631065600; // seconds since Unix epoch
      const unix = (ts + fitEpoch) * 1000;
      date = new Date(unix).toISOString().slice(0,10);
    }

    // HR zone distribution from records
    // Use session max_heart_rate as ceiling (more accurate than observed max)
    const sessionMaxHR = maxHR || null;
    const records = parsed.records.filter(r=>r.heart_rate);
    const hrZones = records.length ? calcHRZones(records.map(r=>r.heart_rate), sessionMaxHR) : null;

    // VO2max: pick best value across sessions
    const vo2max = sessions.reduce((best, s) => {
      const v = s.vo2_max;
      if(v && v >= 20 && v <= 90) return best ? Math.max(best, v) : v;
      return best;
    }, null);

    const result_data = {
      date,
      sport,
      distance: totalDist > 0 ? Math.round(totalDist*100)/100 : null,
      duration: totalTime > 0 ? Math.round(totalTime/60) : null,
      calories: totalCal > 0 ? Math.round(totalCal) : null,
      avg_hr: avgHR,
      max_hr: maxHR,
      pace,
      avg_speed: avgSpeed ? Math.round(avgSpeed*100)/100 : null,
      vo2max,
      hrZones,
      records: parsed.records,
      raw_sessions: sessions,
    };
    // Debug: log to console for verification against Suunto app
    console.log('[FitLog FIT]', {
      dist: result_data.distance+' km',
      dur: result_data.duration+' dk',
      pace: result_data.pace+' dk/km',
      speed_ms: avgSpeed?.toFixed(3),
      hr_avg: result_data.avg_hr,
      hr_max: result_data.max_hr,
      kcal: result_data.calories,
      vo2max: result_data.vo2max,
      date: result_data.date,
      sessions: sessions.length,
    });
    return result_data;
  }

  function calcHRZones(hrArr, maxHR){
    // Standard 5-zone model: Z1<60%, Z2:60-70%, Z3:70-80%, Z4:80-90%, Z5:90%+
    // Use provided maxHR (from session) or fallback to observed max
    const ceiling = maxHR || Math.max(...hrArr);
    const z = [0,0,0,0,0];
    for(const hr of hrArr){
      const pct = hr/ceiling*100;
      if(pct < 60)       z[0]++;
      else if(pct < 70)  z[1]++;
      else if(pct < 80)  z[2]++;
      else if(pct < 90)  z[3]++;
      else               z[4]++;
    }
    const total = z.reduce((s,v)=>s+v,1);
    return z.map(v=>Math.round(v/total*100));
  }

  return { parse, extract };
})();

let _fitParsed = null;

window.handleFitFile = function(file){
  if(!file) return;
  if(file.name.endsWith('.gpx')) processGpxFile(file);
  else processFitFile(file);
};
window.handleFitDrop = function(file){
  if(!file) return;
  if(file.name.endsWith('.fit')) processFitFile(file);
  else if(file.name.endsWith('.gpx')) processGpxFile(file);
};

function processFitFile(file){
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const data = FIT.extract(e.target.result);
      _fitParsed = data;
      renderFitPreview(data, file.name);
    } catch(err) {
      document.getElementById('fit-preview').innerHTML =
        `<div style="color:#e05c3a;padding:12px;background:rgba(224,92,58,.1);border-radius:8px;margin-top:10px;font-size:13px">
          <i class="ti ti-alert-circle"></i> Hata: ${err.message}
        </div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function processGpxFile(file){
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const data = GPX.parse(e.target.result);
      _fitParsed = data; // reuse same _fitParsed variable
      console.log('[FitLog] Parsed GPX data:', {
        distance: data.distance + ' km',
        duration: data.duration + ' min',
        pace: data.pace + ' min/km',
        avg_hr: data.avg_hr + ' bpm',
        max_hr: data.max_hr + ' bpm',
        calories: data.calories + ' kcal',
        elevation_gain: data.elevation_gain + ' m',
        points: data.points_count,
        date: data.date,
      });
      renderFitPreview(data, file.name);
    } catch(err){
      document.getElementById('fit-preview').innerHTML =
        '<div style="color:#e05c3a;padding:12px;background:rgba(224,92,58,.1);border-radius:8px;margin-top:10px;font-size:13px">'
        + '<b>GPX Hatası:</b> ' + err.message + '</div>';
    }
  };
  reader.readAsText(file); // GPX is text/XML
}

  ];
  const distHTML='', durHTML='', calHTML='', hrAvgHTML='', hrMaxHTML='', paceHTML='';

  // HR zone bars
  let zoneHTML = "";

        <div class="lbl" style="margin-bottom:8px">Kalp atış hızı zone dağılımı</div>
        ${data.hrZones.map((pct,i)=>`
          <div style="margin-bottom:6px">
            <div class="fb" style="font-size:10px;color:var(--tx3);margin-bottom:2px">
              <span style="color:${zColors[i]}">${zLabels[i]}</span>
              <span>${pct}%</span>
            </div>
            <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${zColors[i]};border-radius:3px;transition:width .4s"></div>
            </div>
          </div>`).join("")}
      </div>`;
  }

  document.getElementById('fit-preview').innerHTML = `
    <div class="fit-result" style="border-color:#e8c54733;background:var(--bg3)">
      <div class="fc gap8 mb10">
        <div style="width:38px;height:38px;border-radius:9px;background:rgba(232,197,71,.15);display:flex;align-items:center;justify-content:center">
          <i class="ti ${ic}" style="font-size:19px;color:#e8c547"></i>
        </div>
        <div>
          <div style="font-size:14px;font-weight:600">${sl} — ${filename}</div>
          <div style="font-size:11px;color:var(--tx3);margin-top:2px">
            ${data.date}
            ${filename.endsWith('.gpx')
              ? '· GPX · '+data.points_count+' nokta · ↑'+data.elevation_gain+'m'
              : data.raw_sessions?'· FIT · '+(data.raw_sessions.length)+' seans':''
            }

        <span class="tag" style="background:#5bb8a044;color:#5bb8a0;margin-left:auto">
          <i class="ti ti-check" style="font-size:11px"></i> Okundu

      ${isGpx && (!data.calories || !data.vo2max) ? `<div style="font-size:11px;color:#ff7c43;margin-top:8px;padding:7px 10px;background:rgba(255,124,67,.1);border-radius:7px;border:1px solid rgba(255,124,67,.3)">
        <b>Kalori ve VO2max</b> GPX formatında bulunmuyor.
        Aynı antrenmanı <b>FIT olarak da dışa aktar</b> ve yükle — bu veriler otomatik eklenir.
      </div>`:''}
      <div style="font-size:10px;color:var(--tx3);margin-top:6px">Suunto uygulamasındaki değerleri sağ sütuna gir — farklılıklar varsa hemen görürsün.</div>
      ${zoneHTML}
    </div>`;

  document.getElementById('fit-actions').style.display = 'flex';
}

window.saveFitActivity = function(){
  if(!_fitParsed) return;
  const date = document.getElementById('fit-date')?.value || _fitParsed.date;
  const entry = {
    id: Date.now().toString(),
    date,
    branch: _fitParsed.sport === "run" ? "run" : "assist",
    duration: _fitParsed.duration ? String(_fitParsed.duration) : "",
    calories: _fitParsed.calories ? String(_fitParsed.calories) : "",
    notes: "Suunto FIT dosyasından içe aktarıldı",
    source: "fit",
    runData: _fitParsed.sport === "run" ? {
      distance: _fitParsed.distance ? String(_fitParsed.distance) : "",
      pace: _fitParsed.pace || "",
      hr_avg: _fitParsed.avg_hr ? String(_fitParsed.avg_hr) : "",
      hr_max: _fitParsed.max_hr ? String(_fitParsed.max_hr) : "",
      type: "easy"
    } : undefined,
    fitData: {
      hrZones: _fitParsed.hrZones,
      avg_speed: _fitParsed.avg_speed,
      sport: _fitParsed.sport,
      vo2max: _fitParsed.vo2max || null,
      elevation_gain: _fitParsed.elevation_gain || null,
    }
  };
  logs.push(entry);
  saveL();
  const wasMarked = autoMarkPlanDay(date);
  _fitParsed = null;
  closeModal();

  // Always refresh both screens so done state is visible everywhere
  renderScreen('dashboard');
  renderScreen('weekly');
  renderScreen('race');
  renderScreen('history');
  // Re-render whichever screen is active
  renderScreen(curScr);

  const msg = wasMarked
    ? '✓ FIT kaydedildi · Plan günü tamamlandı — '+date
    : '✓ Suunto FIT kaydedildi — '+date;
  showToast(msg);
};

// Simple toast notification
function showToast(msg){
  const t = document.createElement('div');
  t.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#f0ede8;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;border:1px solid rgba(255,255,255,.15);box-shadow:0 4px 20px rgba(0,0,0,.4)";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

// GPX FILE PARSER
// Suunto / Garmin .gpx dosyaları için
// ══════════════════════════════════════════════════════════
const GPX = (function(){

  function parse(text){
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, 'application/xml');
    if(doc.querySelector('parsererror')) throw new Error('Geçersiz GPX dosyası');

    // Metadata
    const name = doc.querySelector('name')?.textContent || '';

    // Track points
    const trkpts = Array.from(doc.querySelectorAll('trkpt'));
    if(!trkpts.length) throw new Error('GPX dosyasında parkur verisi bulunamadı');

    const points = trkpts.map(pt => {
      const lat  = parseFloat(pt.getAttribute('lat'));
      const lon  = parseFloat(pt.getAttribute('lon'));
      const ele  = parseFloat(pt.querySelector('ele')?.textContent || 0);
      const time = pt.querySelector('time')?.textContent || null;
      const hr   = parseInt(pt.querySelector('hr, HeartRateBpm value, [localname="hr"]')?.textContent
                   || pt.querySelector('*')?.closest?.('[localname="TrackPointExtension"]')?.querySelector('[localname="hr"]')?.textContent
                   || 0) || null;
      // Suunto / Garmin extension heart rate
      const hrExt = parseInt(
        pt.querySelector('gpxtpx\\:hr')?.textContent ||
        pt.getElementsByTagNameNS('http://www.garmin.com/xmlschemas/TrackPointExtension/v1','hr')[0]?.textContent ||
        pt.getElementsByTagNameNS('*','hr')[0]?.textContent ||
        0
      ) || null;

      return { lat, lon, ele, time, hr: hrExt || hr };
    });

    // Date from first point
    let date = new Date().toISOString().slice(0,10);
    if(points[0]?.time){
      date = new Date(points[0].time).toISOString().slice(0,10);
    }

    // Total distance via Haversine
    let totalDistKm = 0;
    for(let i=1; i<points.length; i++){
      totalDistKm += haversine(
        points[i-1].lat, points[i-1].lon,
        points[i].lat,   points[i].lon
      );
    }

    // Total time
    let totalTimeSec = 0;
    if(points[0]?.time && points[points.length-1]?.time){
      totalTimeSec = (new Date(points[points.length-1].time) - new Date(points[0].time)) / 1000;
    }

    // Avg speed → pace
    let pace = null;
    let avgSpeedMs = null;
    if(totalDistKm > 0 && totalTimeSec > 0){
      avgSpeedMs = (totalDistKm * 1000) / totalTimeSec; // m/s
      const paceMin = 1000 / (avgSpeedMs * 60); // min/km
      const pm = Math.floor(paceMin);
      const ps = Math.round((paceMin - pm) * 60);
      pace = pm + ':' + (ps < 10 ? '0' : '') + ps;
    }

    // Heart rate stats
    const hrPoints = points.filter(p => p.hr && p.hr > 30 && p.hr < 230);
    const avgHR = hrPoints.length
      ? Math.round(hrPoints.reduce((s,p) => s+p.hr, 0) / hrPoints.length)
      : null;
    const maxHR = hrPoints.length
      ? Math.max(...hrPoints.map(p=>p.hr))
      : null;

    // HR zones (using session maxHR)
    const hrZones = hrPoints.length ? calcGPXHRZones(hrPoints.map(p=>p.hr), maxHR) : null;

    // Calories from metadata (Suunto GPX sometimes includes this)
    let calories = null;
    const calEl = doc.querySelector('calories, Calories, cals');
    if(calEl) calories = parseInt(calEl.textContent) || null;
    // Suunto extension
    const suuntoExt = doc.querySelector('suunto\\:Calories, [localname="Calories"]');
    if(suuntoExt && !calories) calories = parseInt(suuntoExt.textContent) || null;

    // Elevation gain
    let elevGain = 0;
    for(let i=1; i<points.length; i++){
      const diff = points[i].ele - points[i-1].ele;
      if(diff > 0) elevGain += diff;
    }

    // Estimated calorie burn if not in file
    // Formula: MET-based for running ≈ 1 kcal/kg/km (avg 70kg person)
    // Better: use HR-based estimation (Keytel formula for men, simplified)
    // We dont know weight/age so use distance-based rough estimate
    let estimatedCal = null;
    if(!calories && totalDistKm > 0){
      // Rough: 1 kcal per kg per km, assume 70kg default
      // User can override in comparison table
      estimatedCal = Math.round(totalDistKm * 70 * 1.0);
    }

    // Suunto sometimes embeds extra data in GPX extensions
    // Try harder to find calories
    const allText = doc.documentElement.innerHTML || '';
    if(!calories){
      const calMatch = allText.match(/(?:calories|Calories|kcal)[^>]*>(\d+)/i);
      if(calMatch) calories = parseInt(calMatch[1]);
    }

    return {
      date,
      name,
      sport: 'run',
      distance: Math.round(totalDistKm * 100) / 100,
      duration: totalTimeSec > 0 ? Math.round(totalTimeSec / 60) : null,
      calories: calories || null, // GPX rarely has this - comes from FIT or manual
      calories_estimated: !calories ? estimatedCal : null,
      avg_hr: avgHR,
      max_hr: maxHR,
      pace,
      avg_speed: avgSpeedMs ? Math.round(avgSpeedMs * 100) / 100 : null,
      vo2max: null, // Not available in GPX - load FIT for this
      elevation_gain: Math.round(elevGain),
      hrZones,
      points_count: points.length,
      raw_points: points,
    };
  }

  function haversine(lat1, lon1, lat2, lon2){
    const R = 6371; // km
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
              Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function calcGPXHRZones(hrArr, maxHR){
    const ceiling = maxHR || Math.max(...hrArr);
    const z = [0,0,0,0,0];
    for(const hr of hrArr){
      const pct = hr/ceiling*100;
      if(pct < 60)       z[0]++;
      else if(pct < 70)  z[1]++;
      else if(pct < 80)  z[2]++;
      else if(pct < 90)  z[3]++;
      else               z[4]++;
    }
    const total = z.reduce((s,v)=>s+v,1);
    return z.map(v=>Math.round(v/total*100));
  }

  return { parse };
})();

// Antrenman tipine göre Suunto Workout Builder adımları
function generateWorkoutSteps(day, paces){
  const type = day.type;
  const dist = day.dist;
  const p = paces; // {easy, tempo, interval, long, hill, fartlek, strides, progression, recovery, race}

  const steps = [];

  switch(type){

    case 'easy':
    case 'recovery':
      steps.push({
        name: type==='recovery'?'Aktif Toparlanma':'Kolay Koşu',
        type: 'work',
        target: 'pace',
        targetMin: p.easy,
        targetMax: slowerPace(p.easy, 30),
        duration: null,
        distance: dist,
        unit: 'km',
        notes: 'Rahat, konuşabilir tempo. Zone 1-2.'
      });
      break;

    case 'long':
    case 'progression': {
      const seg1Km = Math.round(dist * 0.7 * 10)/10;
      const seg2Km = Math.round((dist - seg1Km)*10)/10;
      const seg3Km = 0;
      steps.push({name:'Kolay',type:'warmup',target:'pace',targetMin:p.long||p.easy,distance:seg1Km,unit:'km',notes:'Kolay tempo, konuşabilir'});
      steps.push({name:'Tempo',type:'work',target:'pace',targetMin:p.tempo,distance:seg2Km,unit:'km',notes:'Orta-hızlı, yarış pace simülasyonu'});
      if(type==='progression')
        steps.push({name:'Tempo Bitiş',type:'work',target:'pace',targetMin:fasterPace(p.tempo,5),targetMax:p.tempo,distance:seg3Km,unit:'km',notes:'Güçlü bitiş, negatif split'});
      else
        {} // no cooldown for long
      break;
    }

    case 'tempo': {
      const warmKm = Math.min(1.5, Math.round(dist*0.2*10)/10);
      const mainKm = Math.round((dist - warmKm*2)*10)/10;
      steps.push({name:'Isınma',type:'warmup',target:'pace',targetMin:p.easy,targetMax:slowerPace(p.easy,30),distance:warmKm,unit:'km',notes:'Kolay koş, kasları hazırla'});
      steps.push({name:'Tempo',type:'work',target:'pace',targetMin:fasterPace(p.tempo,5),targetMax:p.tempo,distance:mainKm,unit:'km',notes:'Laktat eşiği — zorlu ama sürdürülebilir. Zone 3-4.'});
      steps.push({name:'Soğuma',type:'cooldown',target:'pace',targetMin:p.easy,targetMax:slowerPace(p.easy,30),distance:warmKm,unit:'km',notes:'Yavaşla, nefes kontrolü'});
      break;
    }

    case 'interval':
    case 'fartlek': {
      const reps = type==='fartlek' ? 6 : (dist<6?4:dist<9?5:6);
      const repDist = type==='fartlek' ? 0.4 : (dist<8?0.6:0.8);
      const recSec = type==='fartlek' ? 120 : 90;
      steps.push({name:'Isınma',type:'warmup',target:'pace',targetMin:p.easy,targetMax:slowerPace(p.easy,30),distance:1.5,unit:'km',notes:'Kolay koş + 2-3 kısa hızlanma (strides)'});
      for(let i=0;i<reps;i++){
        steps.push({name:`Hızlı ${i+1}/${reps}`,type:'work',target:'pace',targetMin:fasterPace(p.interval,5),targetMax:p.interval,distance:repDist,unit:'km',notes:type==='fartlek'?'Hisse göre hızlı':'Maksimum sürdürülebilir hız. Zone 4-5.'});
        if(i<reps-1)
          steps.push({name:`Toparlanma ${i+1}`,type:'rest',target:'pace',targetMin:slowerPace(p.easy,30),targetMax:slowerPace(p.easy,60),duration:recSec,unit:'sn',notes:'Kolay koş veya yürü, tam toparlan'});
      }
      steps.push({name:'Soğuma',type:'cooldown',target:'pace',targetMin:p.easy,targetMax:slowerPace(p.easy,30),distance:1.0,unit:'km',notes:'Yavaş koşu, nefes normal dönene kadar'});
      break;
    }

    case 'hill': {
      const reps = 8;
      steps.push({name:'Isınma',type:'warmup',target:'pace',targetMin:p.easy,targetMax:slowerPace(p.easy,30),distance:1.0,unit:'km',notes:'Düz zeminde kolay koş'});
      for(let i=0;i<reps;i++){
        steps.push({name:`Tepe ${i+1}/${reps}`,type:'work',target:'hr',targetMin:'Z4',targetMax:'Z5',distance:0.2,unit:'km',notes:'Sert çıkış, dik duruş, kol hareketi. Tepe sonuna kadar maksimum effort.'});
        steps.push({name:`İniş ${i+1}`,type:'rest',target:'pace',targetMin:slowerPace(p.easy,60),targetMax:slowerPace(p.easy,90),duration:90,unit:'sn',notes:'Yürüyerek veya çok yavaş koşarak in, toparlan'});
      }
      steps.push({name:'Soğuma',type:'cooldown',target:'pace',targetMin:p.easy,targetMax:slowerPace(p.easy,30),distance:1.0,unit:'km',notes:'Düz zeminde kolay koş'});
      break;
    }

    case 'strides': {
      const easyKm = dist;
      steps.push({name:'Easy Run',type:'warmup',target:'pace',targetMin:p.easy,distance:easyKm,unit:'km',notes:'Kolay koşu'});
      for(let i=0;i<4;i++){
        steps.push({name:'Stride '+(i+1)+'/4',type:'work',target:'pace',targetMin:p.strides||fasterPace(p.interval,10),duration:20,unit:'sn',notes:'20sn kontrollü hizlanma %85 effort'});
        steps.push({name:'Recovery',type:'rest',target:'pace',targetMin:p.easy,duration:60,unit:'sn',notes:'60sn yürü veya cok yavas kos'});
      }
      break;
    }

    case 'race':
      steps.push({name:'Yarış Başlangıcı (1-5km)',type:'work',target:'pace',targetMin:p.race,targetMax:slowerPace(p.race,15),distance:5,unit:'km',notes:'Sakin başla! İlk 5km hedef pacen ±10sn.'});
      steps.push({name:'Orta Bölüm (5-16km)',type:'work',target:'pace',targetMin:fasterPace(p.race,5),targetMax:p.race,distance:11,unit:'km',notes:'Hedef pace. Tutarlı ritim. Zone 3-4.'});
      steps.push({name:'Son Bölüm (16-21km)',type:'work',target:'pace',targetMin:fasterPace(p.race,10),targetMax:p.race,distance:5.1,unit:'km',notes:'Güç varsa artır. Negatif split hedefle!'});
      break;

    default:
      steps.push({name:'Antrenman',type:'work',target:'pace',targetMin:p.easy,targetMax:slowerPace(p.easy,30),distance:dist,unit:'km',notes:''});
  }
  return steps;
}

// Pace helpers: input "5:30" string → adjust by seconds → return string
function paceToSec(pStr){
  if(!pStr||pStr==='—') return 0;
  const parts=(pStr+'').split(':');
  return parseInt(parts[0])*60+parseInt(parts[1]||0);
}
function secToPace(sec){
  if(sec<=0) return '—';
  const m=Math.floor(sec/60);const s=sec%60;
  return m+':'+(s<10?'0':'')+s;
}
function slowerPace(pStr,sec){return secToPace(paceToSec(pStr)+sec);}
function fasterPace(pStr,sec){return secToPace(Math.max(60,paceToSec(pStr)-sec));}

window.copyWorkoutText = function(planId, date){
  const plan = racePlans.find(r=>r.id===planId);
  if(!plan) return;
  let day=null;
  for(const wk of plan.weeks){
    const d=wk.days.find(d=>d.date===date);
    if(d){day=d;break;}
  }
  if(!day) return;

  const steps = generateWorkoutSteps(day, plan.paces);
  const lines = [
    RT_LABEL[day.type]+' — '+day.dist+' km ('+date+')',
    '─'.repeat(40),
    ...steps.map((s,i)=>{
      const dur = s.distance ? s.distance+'km' : (s.duration ? s.duration+s.unit : '');
      const target = s.target==='pace'
        ? 'Pace: '+(s.targetMin||'—')+'/km'+(s.targetMax?' — '+s.targetMax+'/km':'')
        : s.target==='hr' ? 'KAH: '+s.targetMin+(s.targetMax?' – '+s.targetMax:'') : '';
      return (i+1)+'. '+s.name+' | '+dur+' | '+target+'\n   '+s.notes;
    }),
    '',
    'Suunto app → Watch → Structured Workouts → Create New',
  ];

  const text = lines.join('\n');
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>showToast('✓ Kopyalandı — Suunto uygulamasına girebilirsin'));
  } else {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showToast('✓ Kopyalandı');
  }
};

const ICU_API_KEY='6dtrho9lbhs0a2wbjhckxis9c';

function buildIcuWorkout(day,steps){
  var lines = [];
  var prevType = null;
  var repCount = 0;
  var repLines = [];
  var inRep = false;

  // Detect repeat blocks (work+rest pairs)
  var i = 0;
  while(i < steps.length){
    var s = steps[i];
    var stype = s.type;

    // Check if this is a stride/interval repeat block
    var isRepWork = (stype==='work' && i+1<steps.length && steps[i+1].type==='rest');
    var nextIsRepWork = (i+2<steps.length && steps[i+2].type==='work' && i+3<steps.length && steps[i+3].type==='rest');

    if(isRepWork && nextIsRepWork && !inRep){
      // Count repeats
      var reps = 0;
      var j = i;
      while(j < steps.length && steps[j].type==='work' && j+1<steps.length && steps[j+1].type==='rest'){
        reps++; j+=2;
      }
      // Output as repeat block
      if(lines.length>0) lines.push('');
      lines.push(reps+'x');
      // Work step
      var ws = steps[i];
      var wdur = ws.duration ? ws.duration+'s' : ws.distance ? ws.distance+'km' : '20s';
      var wpace = ws.targetMin ? ws.targetMin+'/km Pace' : 'Z5 Pace';
      lines.push('- '+wdur+' '+wpace);
      // Rest step
      var rs = steps[i+1];
      var rdur = rs.duration ? rs.duration+'s' : '60s';
      var rpace = rs.targetMin ? rs.targetMin+'/km Pace' : 'Z1 Pace';
      lines.push('- '+rdur+' '+rpace);
      i += reps*2;
      continue;
    }

    // Normal step
    if(stype !== prevType){
      if(lines.length>0) lines.push('');
      var hdr = stype==='warmup'   ? 'Warmup'
              : stype==='cooldown' ? 'Cooldown'
              : stype==='rest'     ? 'Recovery'
              : 'Main Set';
      lines.push(hdr);
      prevType = stype;
    }

    // Duration
    var dur = s.distance ? s.distance+'km'
            : s.duration ? s.duration+'s'
            : '10m';

    // Normalize pace overflow (6:60 → 7:00)
    var rawPace = s.targetMin || '';
    if(rawPace){
      var pp=rawPace.split(':');
      var pm=parseInt(pp[0])||0, ps=parseInt(pp[1])||0;
      if(ps>=60){pm+=Math.floor(ps/60);ps=ps%60;}
      rawPace=pm+':'+(ps<10?'0':'')+ps;
    }
    var target = rawPace ? rawPace+'/km Pace' : 'Z2 Pace';

    lines.push('- '+dur+' '+target);
    i++;
  }

  var title = (RT_LABEL[day.type]||day.type)+' '+day.dist+'km';
  return title+'\n\n'+lines.join('\n');
}


function sendToIcu(planId,date){
  var plan=racePlans.find(function(r){return r.id===planId;});
  if(!plan)return;
  var day=null;
  for(var i=0;i<plan.weeks.length;i++){
    var d=plan.weeks[i].days.find(function(d){return d.date===date;});
    if(d){day=d;break;}

window.spSelect = function(id, val){
  spState.data[id] = val;
  if(spState.step < spSteps.length-1){ spNext(); }
  else { renderStrengthWizard(); }
};

window.spToggle = function(id, val){
  if(!spState.data[id]) spState.data[id]=[];
  const idx = spState.data[id].indexOf(val);
  if(idx>=0) spState.data[id].splice(idx,1);
  else spState.data[id].push(val);
  renderStrengthWizard();
};

window.spNext = function(){
  if(spState.step < spSteps.length-1){ spState.step++; renderStrengthWizard(); }
  else { generateStrengthPlan(); }
};

window.spBack = function(){
  if(spState.step > 0){ spState.step--; renderStrengthWizard(); }
  else { spState.step=0; renderRaceScreen(); }
};

// Plan oluştur
function generateStrengthPlan(){
  const d = spState.data;
  const days = parseInt(d.days||'2');
  const hasOlympic = d.olympic !== 'none';
  const pullups = parseInt(d.pullups||'5');
  const hasBell = (d.equipment||[]).includes('barbell');
  const hasRings = (d.equipment||[]).includes('rings');

  // Haftalık şema
  const weekTemplate = [];

  // Gün 1: Her zaman Güç
  weekTemplate.push({
    type: 'strength',
    label: 'Güç',
    color: '#e05c3a',
    sessions: buildStrengthSession(d, 1)
  });

  if(days >= 2){
    weekTemplate.push({
      type: 'runstrength',
      label: 'Koşu Gücü',
      color: '#5bb8a0',
      sessions: buildRunStrengthSession(d)
    });
  }

  if(days >= 3){
    weekTemplate.push({
      type: 'olympic',
      label: hasOlympic ? 'Güç + Olimpik' : 'Güç B',
      color: '#a78bfa',
      sessions: buildStrengthSession(d, 2)
    });
  }

  if(days >= 4){
    weekTemplate.push({
      type: 'cali',
      label: 'Calisthenic',
      color: '#f59e0b',
      sessions: buildCaliSession(d)
    });
    weekTemplate.push({
      type: 'metcon',
      label: 'Metcon',
      color: '#ec4899',
      sessions: buildMetconSession(d)
    });
  }

  strengthPlan = {
    id: Date.now().toString(),
    createdAt: td(),
    profile: d,
    weekTemplate: weekTemplate,
  };
  saveStrength();
  renderStrengthDashboard();
}

// Güç seansı oluştur
function buildStrengthSession(d, variant){
  const hasBell = (d.equipment||[]).includes('barbell');
  const hasDB = (d.equipment||[]).includes('dumbbell');
  const hasOly = d.olympic !== 'none';

  if(variant === 1){
    // Push / Pull / Hinge odaklı
    const moves = [];
    if(hasBell){
      moves.push({name:'Back Squat',         sets:'4x5',   note:'%75-85 1RM, derin çömelme'});
      moves.push({name:'Bench Press',        sets:'3x8',   note:'Kontrollü iniş 3sn'});
      moves.push({name:'Romanian Deadlift',  sets:'3x8',   note:'Hip hinge, hafif diz bükme'});
    } else if(hasDB){
      moves.push({name:'Goblet Squat',       sets:'4x10',  note:'DB göğüste, dik gövde'});
      moves.push({name:'DB Push Press',      sets:'3x10',  note:'Bacak yardımıyla overhead'});
      moves.push({name:'DB Romanian DL',     sets:'3x10',  note:'Tek bacak seçeneği'});
    } else {
      moves.push({name:'Pistol Squat Prog.', sets:'3x5',   note:'Destekli veya tam'});
      moves.push({name:'Pike Push-up',       sets:'3x8',   note:'Overhead kuvvet'});
      moves.push({name:'Nordic Curl',        sets:'3x5',   note:'Hamstring gücü'});
    }
    moves.push({name:'Farmer Carry',         sets:'3x30m', note:'KB veya DB, dik omurga'});
    return moves;
  } else {
    // Deadlift / Press varyant
    const moves = [];
    if(hasBell){
      moves.push({name:'Deadlift',           sets:'4x4',   note:'%80-90 1RM, patlayıcı kalkış'});
      moves.push({name:'Overhead Press',     sets:'4x6',   note:'Strict, core sıkı'});
      if(hasOly && d.olympic==='intermediate'){
        moves.push({name:'Hang Power Clean', sets:'4x3',   note:'Diz üstünden, hızlı pull'});
      } else if(hasOly){
        moves.push({name:'Power Clean',      sets:'4x3',   note:'Yerden, teknik odaklı'});
      }
    } else {
      moves.push({name:'Single Leg DL',      sets:'3x8',   note:'Her iki taraf, denge odaklı'});
      moves.push({name:'Z Press',            sets:'3x10',  note:'Yerde oturarak press'});
      moves.push({name:'KB Swing',           sets:'4x15',  note:'Hip snap, glute aktif'});
    }
    moves.push({name:'Core: Ab Wheel',       sets:'3x8',   note:'Yavaş ilerle, sırt düz'});
    return moves;
  }
}

// Koşu gücü seansı
function buildRunStrengthSession(d){
  return [
    {name:'Bulgarian Split Squat', sets:'3x8',  note:'Her bacak, yavaş iniş 3sn'},
    {name:'Hip Thrust',            sets:'3x12', note:'Bant veya barbell, glute squeeze'},
    {name:'Single Leg Calf Raise', sets:'3x15', note:'Her bacak, tam ROM'},
    {name:'Copenhagen Plank',      sets:'3x20s',note:'Adductor gücü, koşu stabilite'},
    {name:'Step-up',               sets:'3x10', note:'Her bacak, kutu yüksek tut'},
    {name:'Lateral Band Walk',     sets:'3x15', note:'Bant dizlerde, kalça açık'},
  ];
}

// Calisthenic seansı
function buildCaliSession(d){
  const pullups = parseInt(d.pullups||'5');
  const target = d.muscleup||'bar';
  const hasRings = (d.equipment||[]).includes('rings');
  const moves = [];

  // Pull-up progression
  if(pullups <= 2){
    moves.push({name:'Band Assisted Pull-up', sets:'5x5',  note:'Ağır bandla, tam ROM'});
    moves.push({name:'Negative Pull-up',      sets:'3x5',  note:'5sn iniş, güç gelişimi'});
  } else if(pullups <= 5){
    moves.push({name:'Strict Pull-up',        sets:'5x3',  note:'Tam kilitlenme üstte'});
    moves.push({name:'Scapular Pull-up',      sets:'3x10', note:'Omuz aktivasyonu'});
  } else if(pullups <= 10){
    moves.push({name:'Weighted Pull-up',      sets:'4x4',  note:'%10-20 vücut ağırlığı ekle'});
    moves.push({name:'L-sit Pull-up',         sets:'3x5',  note:'Bacaklar düz öne'});
  } else {
    moves.push({name:'Muscle-up Transition',  sets:'5x3',  note:'Bar veya ring geçiş drill'});
    moves.push({name:'Weighted Pull-up',      sets:'3x5',  note:'Ağır, patlayıcı'});
  }

  // Muscle-up progression
  if(target==='ring'||target==='both'){
    if(hasRings){
      moves.push({name:'Ring Row',           sets:'3x10', note:'Gövde düz, tam çekiş'});
      moves.push({name:'Ring Dip',           sets:'3x8',  note:'Halka sabitleme, tam ROM'});
      moves.push({name:'False Grip Row',     sets:'3x8',  note:'False grip ile, bilek pozisyon'});
    }
  }
  if(target==='bar'||target==='both'){
    moves.push({name:'Bar Kip Swing',        sets:'3x10', note:'Hollow-arch ritim'});
    moves.push({name:'Chest-to-bar Pull-up', sets:'3x5',  note:'Bar göğse değmeli'});
  }

  // Dip
  moves.push({name:'Ring/Bar Dip',           sets:'3x10', note:'Tam ROM, yavaş iniş'});
  // Core
  moves.push({name:'Hollow Body Hold',       sets:'3x30s',note:'Sırt yerde, bel basık'});

  return moves;
}

// Metcon seansı
function buildMetconSession(d){
  const formats = d.metcon||['amrap'];
  const fmt = formats[Math.floor(Math.random()*formats.length)];

  if(fmt==='amrap'){
    return [{name:'AMRAP 15dk',sets:'',note:'5 Pull-up | 10 Push-up | 15 Air Squat | Tekrar et'}];
  } else if(fmt==='emom'){
    return [{name:'EMOM 20dk',sets:'',note:'Dk 1: 15 KB Swing | Dk 2: 12 Push-up | Dk 3: 10 Box Jump | Dk 4: Dinlen'}];
  } else if(fmt==='fortime'){
    return [{name:'For Time',sets:'',note:'21-15-9: Thruster + Pull-up (Fran formatı)'}];
  } else {
    return [{name:'Chipper',sets:'',note:'50 Air Squat | 40 Push-up | 30 Sit-up | 20 Pull-up | 10 Burpee — sırayla bitir'}];
  }
}

// Plan tabında koşu ve güç planı — BİRLEŞİK TABLO
function renderRaceScreen(){

  if(rpState.step > 0){ renderRaceWizard(); return; }
  if(spState.step > 0 && !hasStrength){ renderStrengthWizard(); return; }

  // Her iki plan da yoksa — seçim ekranı
  if(!hasRace && !hasStrength){
    scr.innerHTML = `
      <div style="max-width:680px;margin:0 auto;padding:16px">

          style="width:100%;padding:16px;border-radius:12px;font-size:14px;font-weight:600;justify-content:center;gap:8px">

  // BİRLEŞİK TABLO — her iki plan aynı ekranda
  const today = td();
  const activePlan = racePlans.find(r=>r.raceDate >= today);

  // Kolon renk yardımcıları — tüm satırlarda kullanılır
  const todayDow = new Date().getDay(); // 0=Sun,1=Mon...
  const COL_BG = ['rgba(255,255,255,.012)','rgba(255,255,255,.025)','rgba(255,255,255,.012)',
                  'rgba(255,255,255,.025)','rgba(255,255,255,.012)','rgba(255,255,255,.04)','rgba(255,255,255,.04)'];
  const COL_BG_TODAY = 'rgba(232,197,71,.06)';
  const colBg = (i)=>((i===todayDow-1)||(i===6&&todayDow===0))?COL_BG_TODAY:COL_BG[i];
  const COL_BORDER = ['transparent','rgba(255,255,255,.06)','transparent',
                      'rgba(255,255,255,.06)','transparent','rgba(255,255,255,.1)','transparent'];
  const colStyle = (i)=>'background:'+colBg(i)+';border-left:1px solid '+COL_BORDER[i]+';';

      +'<td colspan="'+colspan+'" style="padding:14px 10px 6px;background:rgba(224,92,58,.05);border-bottom:1px solid #e05c3a33">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'

    +'<th style="padding:8px 10px;text-align:left;font-size:10px;color:var(--tx3);font-weight:600;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap;background:var(--bg3)">Hafta</th>'
