// ── SABAH CHECK-IN MODALİ ────────────────────────────────
window.showMorningCheckIn = function(){
  const today = td();
  const existing = getTodaySoreness();

  // Kas grupları listesi (kısa ID → ad)
  const muscleList = Object.entries(MUSCLE_NAMES);

  let html = '<div class="mod" onclick="event.stopPropagation()" style="max-width:540px">';
  html += '<div class="fb mb12"><div>';
  html += '<div style="font-size:16px;font-weight:700">🌅 Sabah Check-in</div>';
  html += '<div style="font-size:11px;color:var(--tx3);margin-top:3px">' + today + ' · Bugün hangi kasların ağrıyor?</div>';
  html += '</div><button class="btn btns" onclick="closeModal()">✕</button></div>';

  html += '<div style="font-size:11px;color:var(--tx2);margin-bottom:14px;line-height:1.6;background:var(--bg3);padding:8px 12px;border-radius:8px">';
  html += '💡 <b>DOMS</b> (Gecikmiş Kas Ağrısı) egzersizden 24-72 saat sonra zirveye ulaşır. ';
  html += 'Ağrılı kasları bugünkü programdan çıkarıyor, komşu kaslarla telafi ediyorum.';
  html += '</div>';

  // Kas grubu grid
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px">';
  muscleList.forEach(([id, name])=>{
    const cur = existing[id] || 0;
    const recentLoad = getMuscleLoad(id, 3);
    const loadIndicator = recentLoad>=6 ? '🔴' : recentLoad>=3 ? '🟡' : '';
    html += '<div style="background:var(--bg3);border-radius:8px;padding:8px 10px;border:1px solid var(--bd)">';
    html += '<div style="font-size:11px;font-weight:600;margin-bottom:6px;color:var(--tx)">'+ loadIndicator +' '+ name +'</div>';
    html += '<div style="display:flex;gap:4px">';
    [0,1,2,3].forEach(n=>{
      const active = cur===n;
      const col = sorenessColor(n);
      html += '<button onclick="mcSetSoreness(\''+id+'\','+n+')" id="mcs-'+id+'-'+n+'"'
        +' style="flex:1;padding:3px 2px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;'
        +'background:'+(active?col+'33':'transparent')+';'
        +'border:1px solid '+(active?col:'var(--bd)')+';'
        +'color:'+(active?col:'var(--tx3)')+'">'
        + sorenessEmoji(n) +'</button>';
    });
    html += '</div></div>';
  });
  html += '</div>';

  html += '<div class="fc gap8" style="justify-content:flex-end">';
  html += '<button class="btn btns" onclick="closeModal()">Vazgeç</button>';
  html += '<button class="btn btnp" onclick="saveMorningCheckIn()">Kaydet &amp; Planı Güncelle</button>';
  html += '</div></div>';

  showModal(html);

  // Geçici state
  window._mcState = Object.assign({}, existing);
};

window.mcSetSoreness = function(id, level){
  window._mcState = window._mcState || {};
  window._mcState[id] = level;
  // UI güncelle
  Object.keys(MUSCLE_NAMES).forEach(mid=>{
    [0,1,2,3].forEach(n=>{
      const btn = document.getElementById('mcs-'+mid+'-'+n);
      if(!btn) return;
      const active = (mid===id ? n===level : (window._mcState[mid]||0)===n);
      const col = sorenessColor(n);
      btn.style.background = active ? col+'33' : 'transparent';
      btn.style.borderColor = active ? col : 'var(--bd)';
      btn.style.color = active ? col : 'var(--tx3)';
    });
  });
};

window.saveMorningCheckIn = function(){
  const today = td();
  const log = getSorenessLog();
  log[today] = window._mcState || {};
  saveSorenessLog(log);
  localStorage.setItem(CHECKIN_KEY, today);
  closeModal();
  renderDashboard();  // Kas haritasını ve uyarıları güncelle
  // Plan revizyonu göster
  setTimeout(showDOMS_PlanRevision, 300);
};

// ── PLAN REVİZYON HESAPLAMA ──────────────────────────────
window.showDOMS_PlanRevision = function(){
  const today = td();
  const soreness = getTodaySoreness();
  const sore = Object.entries(soreness).filter(([,v])=>v>=1); // hafif+ ağrı

  if(sore.length===0){
    // Ağrı yok, teşvik et
    showModal('<div class="mod" onclick="event.stopPropagation()" style="max-width:420px">'
      +'<div style="font-size:16px;font-weight:700;margin-bottom:8px">✅ Harika Toparlanma!</div>'
      +'<div style="font-size:13px;color:var(--tx2);margin-bottom:14px">Bugün kayda değer bir kas ağrısı yok. Planlı antrenmanına devam edebilirsin.</div>'
      +'<button class="btn btnp" onclick="closeModal()" style="width:100%;justify-content:center">Anlaşıldı</button>'
      +'</div>');
    return;
  }

  // Hangi egzersizler bugün ağrılı kasları kullanıyor?
  const todayPlan = plans[today];
  const activePlan = racePlans.find(r=>r.raceDate>=today);
  let todayExerciseType = todayPlan ? todayPlan.branch : null;
  if(activePlan){
    const wk = activePlan.weeks.find(w=>wkDates(w.startDate).includes(today));
    if(wk){ const day=wk.days.find(d=>d.date===today); if(day) todayExerciseType=day.type; }
  }

  const soreIds = sore.map(([id])=>id);
  const soreNames = soreIds.map(id=>MUSCLE_NAMES[id]||id).join(', ');

  // Ağrılı kasları kullanan egzersizler için alternatif bul
  let conflictHtml = '';
  let revisionHtml = '';

  if(todayExerciseType && EXERCISE_MUSCLES[todayExerciseType]){
    const m = EXERCISE_MUSCLES[todayExerciseType];
    const conflict = [...m.primary,...m.secondary].filter(id=>soreIds.includes(id));
    if(conflict.length>0){
      conflictHtml = '<div style="background:rgba(224,92,58,.1);border:1px solid #e05c3a44;border-radius:8px;padding:10px 12px;margin-bottom:12px">'
        +'<div style="font-size:12px;font-weight:600;color:#e05c3a;margin-bottom:4px">⚠️ Bugünkü Plan Çakışıyor</div>'
        +'<div style="font-size:11px;color:var(--tx2)">'+EXERCISE_MUSCLES[todayExerciseType].label
        +' → '+conflict.map(id=>MUSCLE_NAMES[id]).join(', ')+' kaslarını kullanıyor</div>'
        +'</div>';
    }
  }

  // Ağrı seviyesine göre öneriler — literatüre dayalı
  revisionHtml += '<div style="font-size:12px;font-weight:600;margin-bottom:10px;color:var(--tx)">📋 Bugün İçin Öneriler</div>';
  sore.forEach(([id, level])=>{
    const name = MUSCLE_NAMES[id]||id;
    const daysSincePeak = getMuscleLoad(id,1); // bugünkü ağrı
    let advice='', color='', avoid='', ok='';

    if(level===3){ // Şiddetli
      color='#e05c3a';
      advice='Tam dinlenme — kas hasarı riski yüksek';
      avoid='Bu kasla ilgili TÜM egzersizler';
      ok='Yürüyüş, hafif germe';
    } else if(level===2){ // Orta
      color='#e8c547';
      advice='Hafif aktif toparlanma — yük azaltılmalı';
      avoid='Ağır yük, eksantrik egzersiz';
      ok='%60 yük, konsantrik ağırlıklı hareketler';
    } else { // Hafif (1)
      color='#5bb8a0';
      advice='Modifiye antrenman mümkün';
      avoid='Maksimal efor, yüksek hacim';
      ok='%80 yük, normal hareket aralığı';
    }

    revisionHtml += '<div style="border:1px solid '+color+'44;border-radius:8px;padding:10px 12px;margin-bottom:8px">'
      +'<div class="fb" style="margin-bottom:6px">'
      +'<span style="font-weight:600;color:'+color+'">'+sorenessEmoji(level)+' '+name+'</span>'
      +'<span style="font-size:10px;color:'+color+'">'+sorenessLabel(level)+'</span>'
      +'</div>'
      +'<div style="font-size:11px;color:var(--tx2);margin-bottom:4px">'+advice+'</div>'
      +'<div style="font-size:10px;color:var(--tx3)">🚫 Kaçın: <span style="color:#e05c3a">'+avoid+'</span></div>'
      +'<div style="font-size:10px;color:var(--tx3)">✅ Yapabilirsin: <span style="color:#5bb8a0">'+ok+'</span></div>'
      +'</div>';
  });

  // Bu haftaki plan etkisi
  revisionHtml += '<div style="font-size:11px;color:var(--tx3);margin-top:8px;padding:8px 10px;background:var(--bg3);border-radius:7px">';
  revisionHtml += '📚 <b>Literatür:</b> DOMS 24-72s arası zirveye ulaşır, ~7 günde iyileşir. ';
  revisionHtml += 'Ağrılı kasta eksantrik kuvvet %43.5\'e kadar düşebilir (Hody et al. 2019). ';
  revisionHtml += 'Bu kas gruplarını en az <b>48-72 saat</b> dinlendir.';
  revisionHtml += '</div>';

  const html = '<div class="mod" onclick="event.stopPropagation()" style="max-width:500px">'
    +'<div class="fb mb12"><div>'
    +'<div style="font-size:16px;font-weight:700">🔄 Program Revizyonu</div>'
    +'<div style="font-size:11px;color:var(--tx3);margin-top:2px">Ağrılı kas: '+soreNames+'</div>'
    +'</div><button class="btn btns" onclick="closeModal()">✕</button></div>'
    + conflictHtml
    + revisionHtml
    +'<div class="fc gap8 mt12" style="justify-content:flex-end">'
    +'<button class="btn btns" onclick="closeModal()">Kapat</button>'
    +'<button class="btn btnp" onclick="closeModal();go(\'race\')">Planı Görüntüle</button>'
    +'</div></div>';

  showModal(html);
};

// ── SABAH CHECK-IN BANNER'INI DASHBOARD'A EKLE ──────────
function renderMorningCheckInBanner(){
  const today = td();
  const lastCheckIn = localStorage.getItem(CHECKIN_KEY);
  const soreness = getTodaySoreness();
  const hasSoreness = Object.values(soreness).some(v=>v>0);
  const done = lastCheckIn === today;

  // Ağrılı kasları özetle
  const soreList = Object.entries(soreness)
    .filter(([,v])=>v>=2)
    .map(([id,v])=>'<span style="background:'+sorenessColor(v)+'22;color:'+sorenessColor(v)+';padding:1px 6px;border-radius:10px;font-size:10px">'
      +sorenessEmoji(v)+' '+MUSCLE_NAMES[id]+'</span>')
    .join(' ');

  if(done && !hasSoreness){
    return '<div class="card mb10" style="border-color:#5bb8a044">'
      +'<div class="fb">'
      +'<div style="font-size:12px;color:#5bb8a0;font-weight:600">✅ Sabah check-in tamamlandı — Ağrı yok, tam gaz!</div>'
      +'<button class="btn btns" onclick="showMorningCheckIn()" style="font-size:10px">Güncelle</button>'
      +'</div></div>';
  }

  if(done && hasSoreness){
    return '<div class="card mb10" style="border-color:#e8c54744">'
      +'<div class="lbl">Bugünkü Kas Ağrıları</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">'+soreList+'</div>'
      +'<div class="fc gap6">'
      +'<button class="btn btns" onclick="showMorningCheckIn()" style="font-size:10px">Güncelle</button>'
      +'<button class="btn btns" onclick="showDOMS_PlanRevision()" style="font-size:10px;color:#e8c547;border-color:#e8c54744">Program Revizyonu →</button>'
      +'</div></div>';
  }

  // Henüz check-in yapılmamış
  return '<div class="card mb10" style="border-color:#e8c54766;cursor:pointer" onclick="showMorningCheckIn()">'
    +'<div class="fb">'
    +'<div>'
    +'<div style="font-size:13px;font-weight:700">🌅 Sabah Check-in</div>'
    +'<div style="font-size:11px;color:var(--tx3);margin-top:3px">Bugün hangi kasların ağrıyor? Programa yansıtayım.</div>'
    +'</div>'
    +'<button class="btn btnp btns" onclick="event.stopPropagation();showMorningCheckIn()">Başla</button>'
    +'</div></div>';
}

// renderDashboard'ı sabah check-in banner'ıyla sarmalayalım
const _origRenderDashboard = renderDashboard;
renderDashboard = function(){
  _origRenderDashboard();
  // Harita flex container'ından SONRA sabah check-in banner'ını ekle
  const dash = el('s-dashboard');
  if(dash){
    // Flex container (kas+eklem haritaları) sonrasına yerleştir
    const flexRow = dash.querySelector('div[style*="display:flex"][style*="align-items:flex-start"]');
    const bannerHtml = renderMorningCheckInBanner();
    if(flexRow && flexRow.nextSibling){
      const tmp = document.createElement('div');
      tmp.innerHTML = bannerHtml;
      dash.insertBefore(tmp.firstChild, flexRow.nextSibling);
    } else {
      dash.insertAdjacentHTML('beforeend', bannerHtml);
    }
  }
  // Kas haritasındaki seçili ağrıları yansıt
  setTimeout(highlightSoreMuslesOnMap, 100);
};

// Ağrılı kasları haritada otomatik vurgula
function highlightSoreMuslesOnMap(){
  const soreness = getTodaySoreness();
  Object.entries(soreness).forEach(([muscleShortId, level])=>{
    if(level===0) return;
    const ids = MUSCLE_IDS[muscleShortId] || [];
    ids.forEach(fullId=>{
      const el = document.getElementById(fullId);
      if(!el) return;
      const color = sorenessColor(level);
      el.style.fill = color;
      el.style.fillOpacity = '0.7';
      el.style.stroke = color;
      // Seçili set varsa dbSelected'a ekle
      if(typeof _dbSelected!=='undefined') _dbSelected.add(fullId);
    });
  });
}
