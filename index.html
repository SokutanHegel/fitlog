// WEEKLY (antrenman girişi)
// ══════════════════════════════════════════════════════════
function showModal2(h,cb){el("modal").innerHTML=`<div class="ov" id="mov">${h}</div>`;el("mov").addEventListener("click",e=>{if(e.target===el("mov"))closeModal();});if(cb)cb();}
window.flSelB=k=>{window._sb=k;document.querySelectorAll("#bsel .bo").forEach(b=>{const a=b.dataset.b===k;b.style=a?`border-color:${BC[k]};background:${BC[k]}18;color:${BC[k]}`:""});};
window.saveDP=date=>{plans[date]={branch:window._sb,note:gv("pnote")};saveP();closeModal();renderAll();};
window.saveWO=function(date,br){
  const e={id:Date.now().toString(),date,branch:br,duration:gv("wdur"),calories:gv("wkcal"),notes:gv("wnotes")};
  if(br==="run")e.runData={distance:gv("wdist"),pace:gv("wpace"),hr_avg:gv("whrav"),hr_max:gv("whrmax"),type:gv("wtype")||"easy"};
  if(br==="strength")e.sets=(window._sr||[]).map(i=>({exercise:gv("srex"+i),weight:gv("srkg"+i),reps:gv("srrp"+i),sets_count:gv("srst"+i)})).filter(s=>s.exercise);
  if(br==="calisthenics"||br==="assist")e.bws=(window._cr||[]).map(i=>({exercise:gv("crex"+i),reps:gv("crrp"+i),sets_count:gv("crst"+i),note:gv("crnt"+i)})).filter(s=>s.exercise);
  logs.push(e);saveL();closeModal();renderAll();
};
window.addSR=()=>{const i=(window._sr=window._sr||[]).length;window._sr.push(i);el("srows").insertAdjacentHTML("beforeend",`<div id="sr${i}" style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 26px;gap:4px;margin-bottom:4px;align-items:center"><input class="fi" type="text" id="srex${i}" placeholder="Bench press" style="font-size:11px;padding:4px 7px"/><input class="fi" type="number" id="srkg${i}" placeholder="80" style="font-size:11px;padding:4px 7px"/><input class="fi" type="number" id="srrp${i}" placeholder="8" style="font-size:11px;padding:4px 7px"/><input class="fi" type="number" id="srst${i}" placeholder="4" style="font-size:11px;padding:4px 7px"/><button class="btn btnd btns" onclick="delSR(${i})">✕</button></div>`);};
window.delSR=i=>{const e=el("sr"+i);if(e)e.remove();window._sr=(window._sr||[]).filter(x=>x!==i);};
window.addCR=()=>{const i=(window._cr=window._cr||[]).length;window._cr.push(i);el("crows").insertAdjacentHTML("beforeend",`<div id="cr${i}" style="display:grid;grid-template-columns:2fr 1fr 1fr 2fr 26px;gap:4px;margin-bottom:4px;align-items:center"><input class="fi" type="text" id="crex${i}" placeholder="Pull-up" style="font-size:11px;padding:4px 7px"/><input class="fi" type="number" id="crrp${i}" placeholder="10" style="font-size:11px;padding:4px 7px"/><input class="fi" type="number" id="crst${i}" placeholder="4" style="font-size:11px;padding:4px 7px"/><input class="fi" type="text" id="crnt${i}" placeholder="Band yardımı" style="font-size:11px;padding:4px 7px"/><button class="btn btnd btns" onclick="delCR(${i})">✕</button></div>`);};
window.delCR=i=>{const e=el("cr"+i);if(e)e.remove();window._cr=(window._cr||[]).filter(x=>x!==i);};
window.delLog=id=>{if(!confirm("Sil?"))return;logs=logs.filter(l=>l.id!==id);saveL();renderAll();};

function showDayPlan(date){
  const plan=plans[date]||{branch:"rest",note:""};
  const opts=Object.keys(BL).map(k=>{const a=plan.branch===k;return`<button class="bo" data-b="${k}" onclick="flSelB('${k}')" style="${a?`border-color:${BC[k]};background:${BC[k]}18;color:${BC[k]}`:""}" ><span style="width:7px;height:7px;border-radius:50%;background:${BC[k]};display:inline-block;flex-shrink:0"></span>${BL[k]}</button>`;}).join("");
  showModal(`<div class="mod" onclick="event.stopPropagation()"><div style="font-size:15px;font-weight:500;margin-bottom:14px">${DAYSL[dow(date)]} — Plan</div><div class="bsel" id="bsel">${opts}</div><div class="fg"><label class="fl">Not</label><input class="fi" type="text" id="pnote" value="${plan.note||""}" placeholder="Sabah parkuru..."/></div><div class="fc gap8 mt12" style="justify-content:flex-end"><button class="btn btns" onclick="closeModal()">İptal</button><button class="btn btnp btns" onclick="saveDP('${date}')">Kaydet</button></div></div>`,()=>{window._sb=plan.branch;});}
window.showPlan=showDayPlan;

function showWorkoutLog(date){
  const plan=plans[date];const br=plan?plan.branch:"run";
  const isR=br==="run",isS=br==="strength",isC=br==="calisthenics"||br==="assist";
  let rf="",sf="",cf="";
  if(isR)rf=`<div class="g2 mb8"><div class="fg" style="margin:0"><label class="fl">Mesafe (km)</label><input class="fi" type="number" step="0.01" id="wdist" placeholder="5.0"/></div><div class="fg" style="margin:0"><label class="fl">Pace (dk:sn)</label><input class="fi" type="text" id="wpace" placeholder="5:30"/></div><div class="fg" style="margin:0"><label class="fl">Ort. KAH</label><input class="fi" type="number" id="whrav" placeholder="145"/></div><div class="fg" style="margin:0"><label class="fl">Maks. KAH</label><input class="fi" type="number" id="whrmax" placeholder="170"/></div></div><div class="fg"><label class="fl">Koşu türü</label><select class="fi" id="wtype"><option value="easy">Kolay</option><option value="tempo">Tempo</option><option value="interval">İnterval</option><option value="long">Uzun koşu</option><option value="hill">Dağ/Eğim</option></select></div>`;
  if(isS)sf=`<div class="lbl mb8">Egzersizler</div><div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 26px;gap:4px;margin-bottom:4px;font-size:10px;color:var(--tx3)"><span>Egzersiz</span><span>kg</span><span>Tekrar</span><span>Set</span><span></span></div><div id="srows"></div><button class="btn btns mt8" onclick="addSR()">+ Egzersiz ekle</button>`;
  if(isC)cf=`<div class="lbl mb8">Hareketler</div><div style="display:grid;grid-template-columns:2fr 1fr 1fr 2fr 26px;gap:4px;margin-bottom:4px;font-size:10px;color:var(--tx3)"><span>Hareket</span><span>Tekrar</span><span>Set</span><span>Not</span><span></span></div><div id="crows"></div><button class="btn btns mt8" onclick="addCR()">+ Hareket ekle</button>`;
  showModal(`<div class="mod" onclick="event.stopPropagation()"><div class="fb mb10"><div style="font-size:15px;font-weight:500">${DAYSL[dow(date)]} ${tag(br)}</div><button class="btn btns" onclick="closeModal()">✕</button></div><div class="g2 mb8"><div class="fg" style="margin:0"><label class="fl">Süre (dk)</label><input class="fi" type="number" id="wdur" placeholder="45"/></div><div class="fg" style="margin:0"><label class="fl">Kalori (kcal)</label><input class="fi" type="number" id="wkcal" placeholder="400"/></div></div>${rf}${sf}${cf}<div class="fg mt8"><label class="fl">Notlar</label><textarea class="fi" id="wnotes" rows="2" style="resize:vertical"></textarea></div><div class="fc gap8 mt12" style="justify-content:flex-end"><button class="btn btns" onclick="closeModal()">İptal</button><button class="btn btnp btns" onclick="saveWO('${date}','${br}')">Kaydet</button></div></div>`,()=>{window._sr=[];window._cr=[];if(isS)addSR();if(isC)addCR();});}
window.showLog=showWorkoutLog;

let wkOff=0,selDay=null;
function renderWeekly(){
  if(window._aiPlanRunning) return; // AI plan oluşturuluyor
  const today=td();const base=new Date(wkStart(today));base.setDate(base.getDate()+wkOff*7);
  const wk=base.toISOString().slice(0,10);const wd=wkDates(wk);
  const wl=logs.filter(l=>wd.includes(l.date));
  const tkm=wl.reduce((s,l)=>s+parseFloat(l.runData?.distance||0),0);
  const tkcal=wl.reduce((s,l)=>s+parseFloat(l.calories||0),0);
  const tmins=wl.reduce((s,l)=>s+parseFloat(l.duration||0),0);
  const pdays=wd.filter(d=>plans[d]&&plans[d].branch!=="rest").length;
  const ddays=wd.filter(d=>logs.some(l=>l.date===d)).length;
  const cells=wd.map((date,i)=>{
    const plan=plans[date];const br=plan?plan.branch:"rest";const isT=date===today;
    const dayLogs=logs.filter(l=>l.date===date);
    const done=dayLogs.length>0;
    const hasFit=dayLogs.some(l=>l.source==="fit");
    const sel=date===selDay;
    const canUploadFit=plan&&br==="run"&&!done;
    return`<div class="dc" style="border-color:${sel?BC[br]:"rgba(255,255,255,.07)"};position:relative" onclick="selD('${date}')">
      ${done?`<div class="ddone"><i class="ti ti-check" style="font-size:12px;color:#5bb8a0"></i></div>`:""}
      ${hasFit&&done?`<i class="ti ti-watch" style="position:absolute;bottom:3px;right:3px;font-size:9px;color:#e8c547;z-index:3" title="Suunto FIT"></i>`:""}
      ${canUploadFit&&!done?`<i class="ti ti-watch" style="position:absolute;bottom:3px;right:3px;font-size:9px;color:#e8c54755;z-index:3"></i>`:""}
      <div style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em">${DAYS[i]}</div>
      <div style="font-size:15px;font-weight:600;margin:2px 0;color:${isT?"#e8c547":"var(--tx)"}">${date.slice(8)}</div>
      <div style="width:6px;height:6px;border-radius:50%;background:${BC[br]};margin:0 auto"></div>
      <div style="font-size:9px;color:var(--tx3);margin-top:2px">${plan?BL[br]:""}</div>
      ${canUploadFit?`<div style="font-size:9px;color:#e8c54788;margin-top:2px"><i class="ti ti-watch" style="font-size:9px"></i></div>`:""}
    </div>`;}).join("");
  let det="";
  if(selDay){const plan=plans[selDay];const br=plan?plan.branch:"rest";const dl=logs.filter(l=>l.date===selDay);
    const lh=dl.length?dl.map(log=>`<div class="csm mb8" style="border:1px solid ${BC[log.branch]}33"><div class="fb mb8"><span class="mu" style="font-size:11px">${log.duration?log.duration+" dk":""}${log.calories?" · "+log.calories+" kcal":""}</span>${tag(log.branch)}</div>${log.runData?.distance?`<div class="mu" style="font-size:11px;font-family:monospace">${log.runData.distance} km · ${log.runData.pace} dk/km · KAH ${log.runData.hr_avg||"—"}/${log.runData.hr_max||"—"}</div>`:""} ${(log.sets||[]).filter(s=>s.exercise).map(s=>`<div class="dim" style="font-size:11px;font-family:monospace">${s.exercise} ${s.sets_count}×${s.reps} @ ${s.weight}kg</div>`).join("")}${(log.bws||[]).filter(s=>s.exercise).map(s=>`<div class="dim" style="font-size:11px;font-family:monospace">${s.exercise} ${s.sets_count}×${s.reps}${s.note?" ("+s.note+")":""}</div>`).join("")}${log.notes?`<div style="font-size:11px;color:var(--tx3);margin-top:3px;font-style:italic">${log.notes}</div>`:""}</div>`).join(""):
    `<div class="dim" style="text-align:center;padding:12px 0;font-size:11px">Bu gün için kayıt yok.</div>`;
    det=`<div class="card mt8" style="border-color:${BC[br]}44"><div class="fb mb10"><div><div style="font-size:14px;font-weight:600">${DAYSL[dow(selDay)]}</div><div style="margin-top:3px">${tag(br)}</div>${plan?.note?`<div class="mu" style="font-size:11px;margin-top:2px">${plan.note}</div>`:""}</div><div class="fc gap6">
          <button class="btn btns" onclick="showPlan('${selDay}')">Plan düzenle</button>
          ${br!=="rest"?`
            <button class="btn btnp btns" onclick="showLog('${selDay}')">+ Manuel gir</button>
            <button class="btn btns" onclick="showFitImport('${selDay}')" style="border-color:#e8c54755;color:#e8c547" title="Suunto FIT dosyası yükle">
              <i class="ti ti-watch"></i> FIT
            </button>
          `:""}
        </div></div>${lh}</div>`;}
  el("s-race").innerHTML=
    `<div class="fb mb10"><div><div style="font-size:13px;font-weight:600">${wkOff===0?"Bu Hafta":wkOff===-1?"Geçen Hafta":(wkOff>0?"+":"")+wkOff+" Hafta"}</div><div class="dim" style="font-size:10px;margin-top:1px">${wd[0]} → ${wd[6]}</div></div><div class="fc gap6"><button class="btn btns" onclick="shWk(-1)">‹</button>${wkOff!==0?`<button class="btn btns" onclick="shWk(0)">Bugün</button>`:""}<button class="btn btns" onclick="shWk(1)">›</button></div></div>`+
    `<div class="g4 mb10">${[{l:"Toplam km",v:f1(tkm),u:"km",c:"#e8c547"},{l:"Toplam kalori",v:fN(tkcal),u:"kcal",c:"#e05c3a"},{l:"Aktif süre",v:fN(tmins),u:"dk",c:"#5bb8a0"},{l:"Tamamlanan",v:`${ddays}/${pdays}`,u:"gün",c:"#9b7fe8"}].map(m=>mc(m.v,m.u,m.l,m.c)).join("")}</div>`+
    `<div class="g7 mb10">${cells}</div>${det}`;}
window.shWk=d=>{if(d===0)wkOff=0;else wkOff+=d;selDay=null;renderWeekly();};
window.selD=date=>{selDay=selDay===date?null:date;renderWeekly();};

// ── stats ──────────────────────────────────────────────────
let stTab="run";
function renderStats(){
  const rl=logs.filter(l=>l.branch==="run"&&l.runData?.distance).sort((a,b)=>a.date.localeCompare(b.date));
  const sl=logs.filter(l=>l.branch==="strength");
  const cl=logs.filter(l=>l.branch==="calisthenics");
  const byW={};rl.forEach(l=>{const w=wkStart(l.date).slice(5);byW[w]=(byW[w]||0)+parseFloat(l.runData.distance||0);});
  const wkKm=Object.keys(byW).sort().slice(-8).map(k=>({w:k.slice(3),km:parseFloat(byW[k].toFixed(1))}));
  const byM={};rl.forEach(l=>{const m=l.date.slice(5,7);byM[m]=(byM[m]||0)+parseFloat(l.runData.distance||0);});
  const moKm=Object.keys(byM).sort().slice(-6).map(k=>({m:k,km:parseFloat(byM[k].toFixed(1))}));
  const totKm=rl.reduce((s,l)=>s+parseFloat(l.runData.distance||0),0);
  const totVol=sl.reduce((s,l)=>s+(l.sets||[]).reduce((sv,r)=>sv+(parseFloat(r.weight||0)*parseFloat(r.reps||0)*parseFloat(r.sets_count||0)),0),0);
  const pt=rl.slice(-10).map(l=>{const p=(l.runData.pace||"0:00").split(":");const mn=parseFloat(p[0]||0)+parseFloat(p[1]||0)/60;return mn>0?mn:null;}).filter(Boolean);
  const ap=pt.length?pt.reduce((s,v)=>s+v,0)/pt.length:0;
  const aps=ap>0?(Math.floor(ap)+":"+("0"+Math.round((ap-Math.floor(ap))*60)).slice(-2)):"—";
  const svol=sl.slice(-8).map(l=>({d:l.date.slice(5),vol:Math.round((l.sets||[]).reduce((s,r)=>s+(parseFloat(r.weight||0)*parseFloat(r.reps||0)*parseFloat(r.sets_count||0)),0))}));
  const cex={};cl.forEach(l=>(l.bws||[]).forEach(s=>{if(s.exercise)cex[s.exercise]=(cex[s.exercise]||0)+(parseFloat(s.reps||0)*parseFloat(s.sets_count||0));}));
  const cexA=Object.keys(cex).map(k=>({n:k.slice(0,10),t:Math.round(cex[k])})).sort((a,b)=>b.t-a.t).slice(0,8);
  const tabs=`<div class="tabs">${[["run","Koşu"],["strength","Kuvvet"],["calisthenics","Calisthenics"]].map(t=>`<button class="tab${stTab===t[0]?" on":""}" onclick="swST('${t[0]}')">${t[1]}</button>`).join("")}</div>`;
  let c="";
  if(stTab==="run")c=`<div class="g3 mb10">${[{l:"Toplam mesafe",v:f1(totKm)+" km",c:"#e8c547"},{l:"Ort. pace",v:aps+" dk/km",c:"#e8c547"},{l:"Toplam seans",v:rl.length,c:"var(--tx2)"}].map(m=>`<div class="csm"><div style="font-size:17px;font-family:monospace;color:${m.c};font-weight:500">${m.v}</div><div class="mu" style="font-size:11px;margin-top:5px">${m.l}</div></div>`).join("")}</div><div class="g2"><div class="card"><div class="lbl">Haftalık km</div>${barChart(wkKm,"km","w","#e8c547")}</div><div class="card"><div class="lbl">Aylık km</div>${barChart(moKm,"km","m","#e8c54788")}</div></div><div class="card mt8"><div class="lbl">Son koşular</div>${rl.length?rl.slice(-5).reverse().map(l=>`<div class="fb" style="font-size:11px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.07)"><span class="dim">${l.date}</span><span style="font-family:monospace;color:#e8c547">${l.runData.distance} km</span><span class="dim">${l.runData.pace} dk/km</span><span class="dim">${l.runData.hr_avg||"—"} bpm</span></div>`).join(""):`<div class="dim" style="text-align:center;padding:14px 0;font-size:11px">Henüz koşu kaydı yok</div>`}</div>`;
  if(stTab==="strength")c=`<div class="g3 mb10">${[{l:"Toplam hacim",v:Math.round(totVol/1000)+"t",c:"#e05c3a"},{l:"Toplam seans",v:sl.length,c:"#e05c3a"},{l:"Ort. süre",v:(sl.length?Math.round(sl.reduce((s,l)=>s+parseFloat(l.duration||0),0)/sl.length):0)+" dk",c:"var(--tx2)"}].map(m=>`<div class="csm"><div style="font-size:17px;font-family:monospace;color:${m.c};font-weight:500">${m.v}</div><div class="mu" style="font-size:11px;margin-top:5px">${m.l}</div></div>`).join("")}</div><div class="card mb8"><div class="lbl">Seans hacmi (kg)</div>${barChart(svol,"vol","d","#e05c3a")}</div><div class="card"><div class="lbl">Son seanslar</div>${sl.length?sl.slice(-3).reverse().map(log=>`<div style="margin-bottom:10px"><div class="dim" style="font-size:10px;margin-bottom:3px">${log.date}</div>${(log.sets||[]).filter(s=>s.exercise).map(s=>`<div class="fb" style="font-size:11px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.07)"><span>${s.exercise}</span><span style="font-family:monospace;color:#e05c3a">${s.sets_count}×${s.reps} @ ${s.weight}kg</span></div>`).join("")}</div>`).join(""):`<div class="dim" style="text-align:center;padding:14px 0;font-size:11px">Henüz kuvvet kaydı yok</div>`}</div>`;
  if(stTab==="calisthenics")c=`<div class="g3 mb10">${[{l:"Toplam seans",v:cl.length,c:"#5bb8a0"},{l:"Toplam süre",v:Math.round(cl.reduce((s,l)=>s+parseFloat(l.duration||0),0))+" dk",c:"#5bb8a0"},{l:"Farklı hareket",v:Object.keys(cex).length,c:"var(--tx2)"}].map(m=>`<div class="csm"><div style="font-size:17px;font-family:monospace;color:${m.c};font-weight:500">${m.v}</div><div class="mu" style="font-size:11px;margin-top:5px">${m.l}</div></div>`).join("")}</div><div class="card"><div class="lbl">Hareket başına toplam tekrar</div>${barChart(cexA,"t","n","#5bb8a0")}</div>`;
  el("s-stats").innerHTML=tabs+c;}
window.swST=t=>{stTab=t;renderStats();};

// ── goals ──────────────────────────────────────────────────
let gEdit=false;
function renderGoals(){
  const today=td();const mp=today.slice(0,7);
  const rl=logs.filter(l=>l.branch==="run");const sl=logs.filter(l=>l.branch==="strength");
  const totKm=rl.reduce((s,l)=>s+parseFloat(l.runData?.distance||0),0);
  const moKm=rl.filter(l=>l.date.slice(0,7)===mp).reduce((s,l)=>s+parseFloat(l.runData?.distance||0),0);
  const moVol=sl.filter(l=>l.date.slice(0,7)===mp).reduce((s,l)=>s+(l.sets||[]).reduce((sv,r)=>sv+(parseFloat(r.weight||0)*parseFloat(r.reps||0)*parseFloat(r.sets_count||0)),0),0);
  const items=[{k:"monthly_km",l:"Aylık koşu km hedefi",u:"km",c:"#c8860a",cur:parseFloat(moKm.toFixed(1))},{k:"total_km",l:"Toplam km hedefi",u:"km",c:"#c8860a",cur:parseFloat(totKm.toFixed(1))},{k:"pace_target",l:"Hedef pace",u:"dk/km",c:"#c8860a",cur:null},{k:"monthly_vol",l:"Aylık kuvvet hacmi",u:"kg",c:"#c0392b",cur:Math.round(moVol)},{k:"pullup_max",l:"Max pull-up hedefi",u:"tekrar",c:"#1a8a6a",cur:null},{k:"pushup_max",l:"Max push-up hedefi",u:"tekrar",c:"#1a8a6a",cur:null}];
  const rows=items.map(g=>{const tgt=parseFloat(goals[g.k]||0);const pct=tgt>0&&g.cur!=null?Math.min(100,Math.round(g.cur/tgt*100)):0;const vd=gEdit?`<input class="fi" type="text" id="g-${g.k}" value="${goals[g.k]||""}" style="width:70px;display:inline-block;padding:3px 6px;font-size:11px"/> ${g.u}`:`<span style="font-family:monospace;color:${g.c}">${goals[g.k]||"—"} ${g.u}</span>`;return`<div class="card"><div class="fb mb8"><div style="font-size:12px;font-weight:500">${g.l}</div><div style="font-size:11px">${g.cur!=null?`<span style="font-family:monospace;color:${g.c}">${g.cur} / </span>`:""} ${vd}</div></div>${g.cur!=null&&tgt>0?`<div class="pb"><div class="pf" style="width:${pct}%;background:${g.c}"></div></div><div class="dim" style="font-size:10px;margin-top:3px">${pct}% tamamlandı</div>`:""}</div>`;}).join("");

  /* ── Yarış Listesi ── */
  const DIST_LABEL = {'5k':'5 km','10k':'10 km','hm':'Yarı Maraton (21.1 km)','marathon':'Maraton (42.2 km)','other':'Özel mesafe'};
  const DIST_KM    = {'5k':5,'10k':10,'hm':21.1,'marathon':42.2};

  // racePlans (planı olan yarışlar) + raceEntries (sadece kayıt) birleştir
  function timeToSec(t){
    if(!t)return null;
    const p=t.split(':').map(Number);
    return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+(p[1]||0);
  }
  function secToPace(sec,km){
    if(!sec||!km)return null;
    const s=Math.round(sec/km);
    return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  }

  const allRaces = [
    ...racePlans.map(r=>({...r, _type:'plan'})),
    ...raceEntries.map(r=>({...r, _type:'entry'}))
  ].sort((a,b)=>a.raceDate.localeCompare(b.raceDate));

  const upcoming = allRaces.filter(r=>r.raceDate>=today);
  const past     = allRaces.filter(r=>r.raceDate<today);

  function raceCard(r, isPast){
    const dLeft = diffDays(today, r.raceDate);
    const isPlan = r._type==='plan';

    // Plan istatistikleri
    const totalSess= isPlan ? r.weeks?.reduce((s,w)=>s+w.days?.filter(d=>d.type!=='rest').length,0)||0 : 0;
    const doneSess = isPlan ? r.weeks?.reduce((s,w)=>s+w.days?.filter(d=>d.done&&d.type!=='rest').length,0)||0 : 0;
    const totalWks = isPlan ? r.weeks?.length||0 : 0;
    const pct = totalSess>0?Math.min(100,Math.round(doneSess/totalSess*100)):0;

    const distLabel = DIST_LABEL[r.raceType]||r.raceType||'Koşu';
    const distKm    = DIST_KM[r.raceType]||null;
    const statusColor = isPast?'#9a9088':dLeft<=14?'#c0392b':dLeft<=42?'#c8860a':'#1a8a6a';
    const statusText  = isPast?'Tamamlandı':dLeft===0?'🏁 Bugün!':dLeft<=1?'Yarın!':dLeft+' gün kaldı';

    // Pace hesapla (entry için finishTime'dan)
    const pace = r.goalPace || (r.finishTime&&distKm ? secToPace(timeToSec(r.finishTime),distKm)+'  /km' : null);
    const result = r.finishTime ? `✅ Sonuç: <b>${r.finishTime}</b>${pace?' — '+pace:''}` : '';

    // Hedef gösterimi: plan varsa AI hesaplı, entry ise elle girilmiş
    function buildGoalBadge(r){
      // Her durumda AI tahmini yap
      // 1. Plan + AI açıklaması → sarı badge
      if(r._type==='plan' && r._goalExpl){
        var _pp=loadProfile(),_rb=_pp.bestHM||_pp.best10k||_pp.best5k||null,_ib='';
        if(_rb&&r.goalTime){function _px(t){var p=t.split(':').map(Number);return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+(p[1]||0);}var _rs=_px(_rb),_gs=_px(r.goalTime);if(_rs>0&&_gs>0){var _pc=Math.round((1-_gs/_rs)*100);if(_pc>0)_ib='<span style="background:#fff0d0;color:#a06000;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600">+%'+_pc+'</span>';}}
        return '<span style="display:inline-flex;align-items:center;gap:6px;flex-wrap:wrap;background:#fff8ee;border:1px solid #f0c060;border-radius:6px;padding:3px 10px;font-size:11px;color:#a06000">'
          +'🤖 <b>'+r.goalTime+'</b>'+(r.goalPace?' &nbsp;·&nbsp; <span style="color:#b07020">'+r.goalPace+'/km</span>':'')
          +(_ib?' &nbsp;'+_ib:'')+'</span>';
      }

      // 2. Entry veya plan'da hedef yok → profil verilerinden otomatik tahmin
      if(!r.goalTime && distKm){
        var refPlan = racePlans.find(function(p){ return p.perfData; });
        var bestSec = null;
        var srcLabel = '';

        if(refPlan && refPlan.perfData){
          var refs2 = [{key:'best_hm',km:21.1},{key:'best_10k',km:10},{key:'best_5k',km:5}];
          for(var ri=0;ri<refs2.length;ri++){
            var rr=refs2[ri], mm=refPlan.perfData[rr.key];
            if(mm&&typeof mm==='number'&&mm>0){
              bestSec=mm*60*Math.pow(distKm/rr.km,1.06)*0.93;
              srcLabel={'best_hm':'YM','best_10k':'10k','best_5k':'5k'}[rr.key];
              break;
            }
          }
        }

        // Fallback 1: herhangi bir planın goalTime'ından Riegel ile tahmin
        if(!bestSec){
          var anyPlan=racePlans.find(function(p){return p.goalTime&&(p.raceType||p.perfData);});
          if(anyPlan&&anyPlan.goalTime){
            function _h2s(t){var p=t.split(':').map(Number);return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+(p[1]||0);}
            var kKm=DIST_KM[anyPlan.raceType]||21.1;
            var kSec=_h2s(anyPlan.goalTime);
            if(kSec>0){bestSec=kSec*Math.pow(distKm/kKm,1.06);srcLabel=anyPlan.raceName||'mevcut plan';}
          }
        }
        // Fallback 2: profil verisi (bestHM, best10k, best5k)
        if(!bestSec){
          var prof=loadProfile();
          function _parseT(t){if(!t)return 0;var p=t.split(':').map(Number);return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+(p[1]||0);}
          var profRefs=[{v:prof.bestHM,km:21.1,lb:'YM'},{v:prof.best10k,km:10,lb:'10k'},{v:prof.best5k,km:5,lb:'5k'}];
          for(var pi=0;pi<profRefs.length;pi++){
            var pr=profRefs[pi],sec2=_parseT(pr.v);
            if(sec2>0){bestSec=sec2*Math.pow(distKm/pr.km,1.06)*0.93;srcLabel=pr.lb;break;}
          }
        }

        if(bestSec){
          function _s2h(s){s=Math.round(s);var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?h+':'+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0'):m+':'+String(sc).padStart(2,'0');}
          var pT=_s2h(bestSec),ps2=Math.round(bestSec/distKm),pP=Math.floor(ps2/60)+':'+String(ps2%60).padStart(2,'0');
          // Referans süreyle karşılaştır — iyileşme %'si
          var refSec2 = bestSec / 0.93; // %7 geri al → orijinal referans
          var improvePct = Math.round((1 - bestSec/refSec2)*100);
          var improveStr = improvePct > 0 ? '+%'+improvePct+' iyileşme' : '';
          return '<span style="display:inline-flex;align-items:center;gap:6px;background:#f0f7ff;border:1px solid #b8d4f0;border-radius:6px;padding:3px 10px;font-size:11px;color:#2060a0">'
            +'🤖 <b>'+pT+'</b> &nbsp;·&nbsp; <span style="color:#3070b0">'+pP+'/km</span>'
            +(improveStr?'&nbsp;<span style="background:#e0f0e0;color:#1a7a3a;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600">'+improveStr+'</span>':'')
            +'&nbsp;<span style="color:#7090b0;font-size:10px">'+srcLabel+' verisinden</span>'
            +'</span>';
        }
        return ''; // veri yok
      }

      // 3. Hedef var ama AI yok → pace hesapla göster
      if(r.goalTime){
        var autoPace = '';
        if(distKm){
          var sec2 = timeToSec(r.goalTime);
          if(sec2) autoPace = secToPace(sec2, distKm)+'/km';
        }
        var displayPace = r.goalPace || autoPace;
        return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--tx2)">
          🎯 Hedef: <b>${r.goalTime}</b>${displayPace?` &nbsp;·&nbsp; ⚡ ${displayPace}`:''}
        </span>`;
      }
      return '';
    }

    const entryId = r._type==='entry'?r.id:'';

    return `<div class="card" style="border-left:3px solid ${statusColor}">
      <div class="fb">
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700">${r.raceName||'Yarış'}</div>
          <div style="font-size:11px;color:var(--tx2);margin-top:3px;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
            <span>📅 ${r.raceDate}</span>
            <span>📍 ${distLabel}</span>
            ${r.location?`<span>🗺 ${r.location}</span>`:''}
            ${r.surface?`<span>${{road:'🛣️ Yol',trail:'🌲 Patika',track:'🏟️ Pist',mixed:'↕️ Karma'}[r.surface]||''}</span>`:''}
          </div>
          <div style="margin-top:6px">${buildGoalBadge(r)}</div>
          ${r._type==='plan'&&r._goalExpl?`<div style="font-size:10px;color:var(--tx3);margin-top:5px;line-height:1.5">🤖 ${r._goalExpl}</div>`:''}
          ${result?`<div style="font-size:11px;color:#1a8a6a;margin-top:4px">${result}</div>`:''}
          ${r.notes?`<div style="font-size:11px;color:var(--tx3);margin-top:4px;font-style:italic">${r.notes}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <div style="font-size:12px;font-weight:600;color:${statusColor}">${statusText}</div>
          ${isPlan?`<button class="btn btns" style="font-size:10px" onclick="go('race')">Plana Git →</button>`:''}
          ${entryId?`<button class="btn btns" style="font-size:10px" onclick="showAddRaceModal('${entryId}')">Düzenle</button>`:''}`
          +`${entryId?`<button class="btn btns" style="font-size:10px;color:#c0392b" onclick="deleteRaceEntry('${entryId}')">Sil</button>`:''}
        </div>
      </div>
      ${isPlan&&totalSess>0?`
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px">
        <div style="background:var(--bg2);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:16px;font-weight:700;color:${statusColor}">${pct}%</div>
          <div style="font-size:10px;color:var(--tx3)">Plan</div>
        </div>
        <div style="background:var(--bg2);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:16px;font-weight:700;color:${statusColor}">${doneSess}/${totalSess}</div>
          <div style="font-size:10px;color:var(--tx3)">Seans</div>
        </div>
        <div style="background:var(--bg2);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:16px;font-weight:700;color:${statusColor}">${totalWks}</div>
          <div style="font-size:10px;color:var(--tx3)">Hafta</div>
        </div>
      </div>
      <div class="pb" style="margin-top:8px"><div class="pf" style="width:${pct}%;background:${statusColor}"></div></div>
      `:''}
    </div>`;
  }

  const racesHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <div style="font-size:14px;font-weight:700">🏁 Yarış Hedeflerim</div>
      <div style="display:flex;gap:6px">
        <button class="btn btns" onclick="showAddRaceModal()" style="font-size:11px">+ Yarış Ekle</button>
        <button class="btn btns btnp" onclick="go('race')" style="font-size:11px">+ Planla</button>
      </div>
    </div>
    ${allRaces.length===0
      ? `<div class="card" style="text-align:center;padding:28px;border-style:dashed;border-color:var(--bd2)">
           <div style="font-size:32px;margin-bottom:8px">🏃</div>
           <div style="font-size:14px;font-weight:600;margin-bottom:6px">Henüz yarış hedefi yok</div>
           <div style="font-size:12px;color:var(--tx3);margin-bottom:16px">Katılmayı planladığın yarışları ekle.</div>
           <div style="display:flex;gap:8px;justify-content:center">
             <button class="btn btns" onclick="showAddRaceModal()">+ Yarış Ekle</button>
             <button class="btn btnp" onclick="go('race')">Antrenman Planı Oluştur</button>
           </div>
         </div>`
      : ''
    }
    ${upcoming.length>0?`<div class="lbl">Yaklaşan Yarışlar</div>${upcoming.map(r=>raceCard(r,false)).join('')}`:''}
    ${past.length>0?`<div class="lbl" style="margin-top:14px">Geçmiş Yarışlar</div>${past.map(r=>raceCard(r,true)).join('')}`:''}
  `;

  el("s-goals").innerHTML=`
    <div class="fb mb12">
      <div style="font-size:16px;font-weight:700">🎯 Hedef &amp; Yarış</div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn btns${gEdit?" btnp":""}" onclick="togGE()">${gEdit?"Kaydet":"Hedefleri Düzenle"}</button>
        <button class="btn btns" onclick="showResetModal()" style="color:#c0392b;border-color:#c0392b33;font-size:11px">🗑️ Sıfırla</button>
      </div>
    </div>
    ${racesHTML}
    <div style="font-size:13px;font-weight:600;margin:16px 0 10px">📊 Antrenman Hedefleri</div>
    ${rows}
  `;
}

window.saveRaceEntry = function(editId){
  const name = gv('re-name').trim();
  const date = gv('re-date').trim();
  if(!name||!date){ alert('Yarış adı ve tarih zorunlu'); return; }
  const entry = {
    id: editId || Date.now().toString(),
    raceName: name,
    raceDate: date,
    raceType: gv('re-type'),
    location: gv('re-loc').trim(),
    surface: gv('re-surface'),
    finishTime: gv('re-result').trim(),
    notes: gv('re-notes').trim(),
  };
  if(editId){
    const idx = raceEntries.findIndex(r=>r.id===editId);
    if(idx>=0) raceEntries[idx]=entry;
  } else {
    raceEntries.push(entry);
  }
  saveRE();
  closeModal();
  renderGoals();
};

window.deleteRaceEntry = function(id){
  if(!confirm('Bu yarışı silmek istiyor musun?')) return;
  raceEntries = raceEntries.filter(r=>r.id!==id);
  saveRE();
  renderGoals();
};

// HAFTALIK PLAN SORGULAMA SİSTEMİ
// Pazar + Pazartesi sabahı tetiklenir — o haftanın planına göre
// antrenmanları revize eder
// ══════════════════════════════════════════════════════════
const WEEKLY_CHECK_KEY = 'fl7_weekly_check';

function getWeeklyCheckData(){
  try{ return JSON.parse(localStorage.getItem(WEEKLY_CHECK_KEY)||'{}'); }
  catch(e){ return {}; }
}
function saveWeeklyCheckData(d){
  localStorage.setItem(WEEKLY_CHECK_KEY, JSON.stringify(d));
}

// Bugün Pazar mı (0) yoksa Pazartesi mi (1)?
function shouldShowWeeklyCheck(){
  const now = new Date();
  const dow = now.getDay(); // 0=Paz, 1=Pzt
  if(dow !== 0 && dow !== 1) return false;
  const todayStr = now.toISOString().slice(0,10);
  const data = getWeeklyCheckData();
  // Bugün zaten gösterdik mi?
  if(data.lastShown === todayStr) return false;
  return true;
}

function markWeeklyCheckShown(){
  const data = getWeeklyCheckData();
  data.lastShown = new Date().toISOString().slice(0,10);
  saveWeeklyCheckData(data);
}

// Antrenman revizyonu uygula
function applyWeeklyRevisions(revisions){
  const activePlan = racePlans.find(r=>r.raceDate >= td());
  if(!activePlan){ console.warn('applyWeeklyRevisions: aktif plan yok'); return; }
  let changed = false;
  console.log('Applying revisions:', JSON.stringify(revisions));
  revisions.forEach(rev=>{
    if(!rev.date || !rev.action) return;
    let found = false;
    for(const wk of activePlan.weeks){
      const dayIdx = wk.days.findIndex(d=>d.date===rev.date);
      if(dayIdx < 0) continue;
      const day = wk.days[dayIdx];
      found = true;
      const act = (rev.action||'').toLowerCase().trim();
      console.log('Revising', rev.date, 'type:', day.type, '→', act);
      if(act==='rest'||act==='skip'){
        day.type='rest'; day.dist=0; day.pace='—'; changed=true;
      } else if(act==='easy'){

      }
      if(rev.reason) day._revisionNote=rev.reason;

      break;
    }
    if(!found) console.warn('Date not found in plan:', rev.date);

window.sendWeeklyCheck = async function(planContext){
  const input = (document.getElementById('wc-input')?.value||'').trim();
  const energyLabels = ['Yorgun','Normal','Enerjik','Harika'];
  const energyStr = energyLabels[_wcEnergy]||'Normal';
  const btn = document.getElementById('wc-send-btn');
  const resultEl = document.getElementById('wc-result');
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="ti ti-loader"></i> Analiz ediliyor...'; }

  const prompt = `Sen bir koşu antrenörüsün. Kullanıcının bu haftaki koşu planı şu:
${planContext||'Plan bilgisi yok'}

Kullanıcının bu haftaki durumu:
- Enerji seviyesi: ${energyStr}
- Haftalık program: ${input||'Belirtilmedi'}

Bunu analiz et ve şunu söyle:
1. Hangi antrenmanlar uygun, hangilerini revize et (max 3-4 cümle)
2. Eğer revizyon gerekiyorsa JSON formatında belirt:

REVISIONS_JSON:
[{"date":"YYYY-MM-DD","action":"rest|easy|swap:tempo","reason":"kısa neden"}]

Yoksa REVISIONS_JSON: [] yaz.
Türkçe yanıt ver. Samimi ve motive edici ol.`;

  try{
    const data = await claudeFetch(prompt, 1000);
    if(!data) return;
    const text = (data.content||[]).map(c=>c.text||'').join('');

    // Revizyon JSONını parse et
    const jsonMatch = text.match(/REVISIONS_JSON:\s*(\[[\s\S]*?\])/);
    let revisions = [];
    if(jsonMatch){
      try{ revisions = JSON.parse(jsonMatch[1]); }catch(e){}
    }

    // Açıklama metnini göster
    const displayText = text.replace(/REVISIONS_JSON:[\s\S]*$/,'').trim();
    if(resultEl){
      resultEl.style.display='block';
      resultEl.innerHTML = displayText.replace(/\n/g,'<br/>');
    }

    // Revizyon butonunu göster
    if(btn){
      if(revisions.length>0){
        btn.disabled=false;
        btn.innerHTML='<i class="ti ti-check"></i> Revizyonları Uygula ('+revisions.length+')';
        btn.onclick=()=>{ applyWeeklyRevisions(revisions); closeModal(); };
      } else {
        btn.disabled=false;
        btn.innerHTML='<i class="ti ti-check"></i> Tamam, Planı Koru';
        btn.onclick=()=>closeModal();
      }
    }
  } catch(err){
    if(resultEl){ resultEl.style.display='block'; resultEl.innerHTML='<span style="color:#e05c3a">Bağlantı hatası. Tekrar dene.</span>'; }
    if(btn){ btn.disabled=false; btn.innerHTML='Tekrar Dene'; }
  }
};

window.wkpToggleVenue=function(date, vkey){
  // Mevcut seçili venueleri oku
  const btns=document.querySelectorAll('[data-date="'+date+'"].wkp-venue-btn');
  const active=[];
  btns.forEach(b=>{
    const k=b.getAttribute('data-vkey');
    const isCurrent=(k===vkey);
    const wasActive=b.style.borderColor==='rgb(232, 197, 71)';
    const nowActive=isCurrent?!wasActive:wasActive;
    b.style.borderColor=nowActive?'#e8c547':'';
    b.style.background=nowActive?'rgba(232,197,71,.15)':'';
    if(nowActive) active.push(k);
  });
  // Gizli inputa kaydet
  let inp=document.getElementById('wkp-venue-val-'+date);
  if(!inp){
    inp=document.createElement('input');
    inp.type='hidden'; inp.id='wkp-venue-val-'+date;
    document.getElementById('wkp-row-'+date)?.appendChild(inp);
  }
  inp.value=active.join(',');
};

// Tablo inputlarını oku
function wkpReadDays(){
  const days=window._wkpWkDays||[];
  const homeCity=localStorage.getItem('fl7_home_city')||'Kuşadası';
  const map={};
  days.forEach(day=>{
    const city=document.getElementById('wkp-city-'+day.date)?.value.trim()||'';
    const dep=document.getElementById('wkp-dep-'+day.date)?.value.trim()||'';
    const arr=document.getElementById('wkp-arr-'+day.date)?.value.trim()||'';
    const avail=document.getElementById('wkp-avail-'+day.date)?.value.trim()||'';
    const venue=document.getElementById('wkp-venue-val-'+day.date)?.value||'';
    const isAway=city&&city.toLowerCase()!==homeCity.toLowerCase();
    if(city||dep||arr||avail) map[day.date]={city,dep,arr,avail,venue,isAway};
  });
  return map;
}
window.wkpSaveOnly=function(){

};
window.analyzeWeekPlan=async function(){
  const map=wkpReadDays();
  const key=window._wkpNoteKey;
  if(key){ localStorage.setItem(key+'_days',JSON.stringify(map)); localStorage.setItem(key,Object.values(map).map(d=>typeof d==='object'?d.city||'':'').filter(Boolean).join(', ')||'Plan var'); }
  const energyLabels=['Yorgun','Normal','Enerjik','Harika'];
  const energy=energyLabels[window._wkpEnergy||1];
  const noteKey=window._wkpNoteKey;
  const btn=document.getElementById('wkp-analyze-btn');
  const resultEl=document.getElementById('wkp-ai-result');
  const actionsEl=document.getElementById('wkp-ai-actions');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader"></i> Analiz...';}
  if(resultEl){resultEl.style.display='block';resultEl.innerHTML='<span style="color:var(--tx3)">Yapay zeka analiz ediyor...</span>';}
  if(actionsEl) actionsEl.innerHTML='';
  const days=window._wkpWkDays||[];
  const venueLabel={'park':'Koşu parkuru var','gym':'Spor salonu var','hotel':'Otel odası var (ekipman yok, sadece bodyweight)','none':'İmkan yok'};
  const daySummary=days.map((day,di)=>{
    const dowShort=DAYS[di];
    const hasRun=day.type!=='rest';
    const train=hasRun?(RT_LABEL[day.type]||day.type)+' '+day.dist+'km':'Dinlenme';
    const d=map[day.date]||{};
    let notes=[];
    if(d.city && d.isAway){
      notes.push('Seyahat: '+d.city+(d.dep&&d.arr?' ('+d.dep+'-'+d.arr+')':''));
      if(d.venue) notes.push('İmkan: '+(d.venue.split(',').map(v=>venueLabel[v]||v).join(', ')));
    } else if(d.city){
      notes.push('Konum: Ev şehri');
    }
    if(d.avail) notes.push('Müsait saat: '+d.avail);
    return dowShort+' ('+day.date+'): Antrenman='+train+(notes.length?' | '+notes.join(' | '):'');
  }).join('\n');
  // Uzun koşu + koşu parkuru olan günü tespit et ve prompta ekle
  const longParkDays = days.filter(d=>{
    const dd = map[d.date]||{};
    const hasPark = typeof dd==='object' && (dd.venue||'').includes('park');
    return d.type==='long' && hasPark;
  });
  const easyDays = days.filter(d=>d.type==='easy');
  let swapHint = '';
  let autoRevisions = [];
  if(longParkDays.length>0 && easyDays.length>0){
    const lp = longParkDays[0];
    const ea = easyDays[0];
    const lpDow = DAYS[days.indexOf(lp)];
    const eaDow = DAYS[days.indexOf(ea)];
    swapHint = '\n\nONEMLI: '+lpDow+' ('+lp.date+') seyahat+parkur+UZUN KOS gunudur. '
      +eaDow+' ('+ea.date+') ise bu haftanin KOLAY KOS gunudur. '
      +'Bu iki gunun antrenmanlarini birbiriyle degistir: '
      +lpDow+' easy, '+eaDow+' swap:long yap.';
    // Otomatik revizyon hazırla
    autoRevisions = [
      {date: lp.date, action:'easy', reason: eaDow+' ile yer değiştirildi — seyahat günü uzun koşu yapılamaz'},
      {date: ea.date, action:'swap:long', reason: lpDow+' seyahat olduğu için uzun koşu buraya taşındı'},
    ];
  } else if(longParkDays.length>0){
    // Kolay gün yoksa sadece easy yap
    const lp = longParkDays[0];
    autoRevisions = [{date: lp.date, action:'easy', reason:'Seyahat günü uzun koşu yerine kolay koşu'}];
  }

  const promptText='Sen bir kosu antrenoru sun. Kullanicinin bu haftaki gun gun plani:\n'+daySummary+'\nGenel enerji: '+energy+swapHint+'\n\nKURALLAR:\n1. OTEL ODASI → swap:metcon\n2. SPOR SALONU → swap:salon\n3. KOSU PARKURU secilmis gun:\n   - O gun UZUN KOS (long) → o gunu easy yap VE o haftadaki KOLAY KOS (easy) gununu swap:long yap\n   - O gun baska bir kos ise → easy yap\n   - O gun DINLENME ise → degistirme\n4. IMKAN YOK + yogun → rest\n5. Seyahat gununde uzun kos yapilmaz.\n\nDINLENME GUNLERI DEGISTIRILMEZ.\n\nHer gun icin karar ver. 2-3 cumle aciklama.\n\nREVISIONS_JSON:\n[{"date":"YYYY-MM-DD","action":"rest|easy|recovery|swap:tempo|swap:interval|swap:metcon|swap:salon|swap:long","reason":"kisa Turkce neden"}]\nBirden fazla revision olabilir. Yoksa REVISIONS_JSON: []\nTurkce yaz.';
  try{
    const data=await claudeFetch(promptText,800);
    if(!data){if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-sparkles"></i> AI Revize Et';}return;}
    const text=(data.content||[]).map(c=>c.text||'').join('');
    console.log('RAW API RESPONSE:', text);
    // Ham cevabı göster - debug
    if(resultEl){ resultEl.style.display='block'; resultEl.innerHTML='<div style="font-size:10px;color:var(--tx3);margin-bottom:6px">Ham yanıt:</div><pre style="font-size:10px;white-space:pre-wrap;color:var(--tx2)">'+text.replace(/</g,'&lt;')+'</pre>'; }
    const jsonMatch=text.match(/REVISIONS_JSON:\s*```(?:json)?\s*([\s\S]*?)```/)||text.match(/REVISIONS_JSON:\s*(\[[\s\S]*?\])/);
    let revisions=[];
    if(jsonMatch){try{revisions=JSON.parse(jsonMatch[1].trim());}catch(e){console.log('JSON err:',e);}}
    // autoRevisions ekle (uzun koşu+park swap gibi kod tarafı tespitler)
    autoRevisions.forEach(ar=>{
      if(!revisions.find(r=>r.date===ar.date)) revisions.push(ar);
    });
    const display=text.replace(/REVISIONS_JSON:[\s\S]*$/,'').trim();
    if(resultEl) resultEl.innerHTML=display.replace(/\n/g,'<br/>');
    if(actionsEl){
      if(revisions.length>0){
        window._pendingRevisions = revisions;
        const revHtml=revisions.map(r=>'<div style="font-size:11px;padding:5px 8px;background:var(--bg3);border-radius:6px;margin-bottom:4px;color:var(--tx2)">'+r.date+' \u2192 <span style="color:#e8c547">'+r.action+'</span> <span style="color:var(--tx3)">· '+r.reason+'</span></div>').join('');
        actionsEl.innerHTML='<div style="margin-bottom:6px;font-size:11px;color:var(--tx3)">'+revisions.length+' degisiklik onerisi:</div>'+revHtml
          +'<div style="display:flex;gap:8px;margin-top:10px">'
          +'<button class="btn" onclick="closeModal()" style="flex:1;justify-content:center">Kapat</button>'
          +'<button class="btn btnp" onclick="applyWeeklyRevisions(window._pendingRevisions);wkpSaveOnly();" style="flex:1;justify-content:center">&#x2713; Uygula ('+revisions.length+')</button></div>';
      } else {
        actionsEl.innerHTML='<div style="display:flex;gap:8px;margin-top:8px">'
          +'<button class="btn" onclick="closeModal()" style="flex:1;justify-content:center">Kapat</button>'
          +'<button class="btn btnp" onclick="wkpSaveOnly()" style="flex:1;justify-content:center">Kaydet</button></div>';
      }
    }
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh"></i> Tekrar Analiz';}
  }catch(err){
    console.error('analyzeWeekPlan error:', err);
    if(resultEl) resultEl.innerHTML='<span style="color:#e05c3a">Hata: '+err.message+'</span>';
    if(btn){btn.disabled=false;btn.innerHTML='Tekrar Dene';}
  }
};

window.showStrengthDayDetail = function(encodedEntry, dateStr){
  const entry = JSON.parse(decodeURIComponent(encodedEntry));
  const sc = entry.color||'#a78bfa';
  const emoji = {'strength':'💪','runstrength':'🦵','olympic':'🏋️','cali':'🤸','metcon':'⚡'}[entry.type]||'💪';
  const sessions = entry.sessions||[];
  const dateKey = dateStr || new Date().toISOString().slice(0,10);

  const STR_WEIGHTS_KEY = 'fl7_str_weights';
  const STR_LOGS_KEY = 'fl7_str_logs';
  const weights = JSON.parse(localStorage.getItem(STR_WEIGHTS_KEY)||'{}');
  const allLogs = JSON.parse(localStorage.getItem(STR_LOGS_KEY)||'[]');
  const todayLog = allLogs.find(l=>l.date===dateKey&&l.label===entry.label)||null;
  const profile = JSON.parse(localStorage.getItem('fl7_profile')||'{}');

  // Hedef ağırlık hesapla: önce son log, sonra profil 1RM'den
  function calcTarget(name){
    // Son log
    const prevLogs = allLogs.filter(l=>l.label===entry.label&&l.date<dateKey);
    const lastLog = prevLogs[prevLogs.length-1];
    const lastEx = lastLog?.exercises?.find(e=>e.name===name);
    if(lastEx?.weight) return {w:parseFloat(lastEx.weight), src:'Son antrenman'};
    if(weights[name]) return {w:parseFloat(weights[name]), src:'Önceki kayıt'};
    // Profil 1RM'den hesapla — geniş hareket haritası
    const sq  = parseFloat(profile.squat1rm)||0;
    const dl  = parseFloat(profile.deadlift1rm)||0;
    const bp  = parseFloat(profile.bench1rm)||0;
    const ohp = parseFloat(profile.ohp1rm)||0;
    const bw  = parseFloat(profile.weight)||75;
    const nl = name.toLowerCase();
    let w = 0;
    // Squat ailesi
    if(nl.includes('back squat'))                    w = Math.round(sq*0.75/2.5)*2.5;
    else if(nl.includes('front squat'))              w = Math.round(sq*0.60/2.5)*2.5;
    else if(nl.includes('goblet squat'))             w = Math.round(sq*0.25/2.5)*2.5;
    else if(nl.includes('bulgarian')||nl.includes('split squat')) w = Math.round(sq*0.40/2.5)*2.5;
    else if(nl.includes('step-up')||nl.includes('step up'))       w = Math.round(sq*0.30/2.5)*2.5;
    else if(nl.includes('lunge'))                    w = Math.round(sq*0.30/2.5)*2.5;
    else if(nl.includes('leg press'))                w = Math.round(sq*1.20/2.5)*2.5;
    // Deadlift ailesi
    else if(nl.includes('deadlift')&&nl.includes('romanian')) w = Math.round(dl*0.55/2.5)*2.5;
    else if(nl.includes('deadlift')&&nl.includes('single'))   w = Math.round(dl*0.35/2.5)*2.5;
    else if(nl.includes('deadlift'))                 w = Math.round(dl*0.80/2.5)*2.5;
    else if(nl.includes('hip thrust')||nl.includes('glute bridge')) w = Math.round(dl*0.70/2.5)*2.5;
    else if(nl.includes('rdl'))                      w = Math.round(dl*0.55/2.5)*2.5;
    else if(nl.includes('kettlebell swing'))         w = Math.round(dl*0.20/2.5)*2.5;
    else if(nl.includes('farmer carry')||nl.includes('farmer')) w = Math.round(bw*0.40/2.5)*2.5;
    // Press ailesi
    else if(nl.includes('bench press')&&nl.includes('incline')) w = Math.round(bp*0.80/2.5)*2.5;
    else if(nl.includes('bench press'))              w = Math.round(bp*0.75/2.5)*2.5;
    else if(nl.includes('overhead press')||nl.includes('ohp')) w = Math.round(ohp*0.75/2.5)*2.5;
    else if(nl.includes('dumbbell press'))           w = Math.round(bp*0.35/2.5)*2.5; // her el
    else if(nl.includes('lateral raise'))            w = Math.round(ohp*0.15/2.5)*2.5;
    else if(nl.includes('bicep curl')||nl.includes('curl')) w = Math.round(bp*0.20/2.5)*2.5;
    else if(nl.includes('tricep')||nl.includes('pushdown')) w = Math.round(bp*0.20/2.5)*2.5;
    // Row / Pull ailesi
    else if(nl.includes('barbell row'))              w = Math.round(dl*0.55/2.5)*2.5;
    else if(nl.includes('cable row')||nl.includes('row')) w = Math.round(dl*0.35/2.5)*2.5;
    // Vücut ağırlığı hareketleri (ağırlık yok)
    else if(nl.includes('plank')||nl.includes('push-up')||nl.includes('pull-up')||
            nl.includes('calf raise')||nl.includes('band walk')||nl.includes('copenhagen')) w = -1;
    if(w > 0) return {w, src:'1RM bazlı'};
    if(w === -1) return null; // Vücut ağırlığı
    return null;
  }

  const feelingOpts = [
    {v:'easy',   l:'😊 Kolay',    c:'#5bb8a0'},
    {v:'good',   l:'💪 İdeal',    c:'#e8c547'},
    {v:'hard',   l:'🔥 Zordu',    c:'#ff7c43'},
    {v:'failed', l:'❌ Yapamadım', c:'#e05c3a'},
  ];

  const sessionRows = sessions.map((s,si)=>{
    const name = typeof s==='string'?s:(s.name||'');
    const reps = s.reps||s.sets||'';
    const note = s.notes||s.description||'';
    const target = calcTarget(name);
    const logEntry = todayLog?.exercises?.find(e=>e.name===name);

    const feelBtns = feelingOpts.map(f=>
      '<button type="button" class="btn btns str-feel-btn" data-si="'+si+'" data-feel="'+f.v+'" '
      +'onclick="strFeel('+si+',\''+f.v+'\')" '
      +'style="flex:1;justify-content:center;font-size:9px;padding:3px 2px;'
      +(logEntry?.feeling===f.v?'border-color:'+f.c+';background:'+f.c+'22;color:'+f.c:'')+'">'+f.l+'</button>'
    ).join('');

    return '<div style="background:'+sc+'08;border-radius:8px;border:1px solid '+sc+'22;padding:10px;margin-bottom:8px">'
      // Başlık + set/tekrar + hedef ağırlık
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--tx)">'+name+'</div>'
      +(note?'<div style="font-size:10px;color:var(--tx3);margin-top:1px">'+note+'</div>':'')
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0;margin-left:8px">'
      +'<div style="font-size:13px;font-weight:700;color:'+sc+';font-family:monospace">'
      +reps+(target?' @ <span style="color:#e8c547">'+target.w+' kg</span>':'')
      +'</div>'
      +(target?'<div style="font-size:8px;color:var(--tx3);margin-top:1px">'+target.src+'</div>':'<div style="font-size:8px;color:var(--tx3)">Vücut ağırlığı</div>')
      +'</div></div>'

      // Yaptığım ağırlık + tekrar
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">'
      +'<div><label style="font-size:9px;color:var(--tx3);display:block;margin-bottom:2px">Yaptığım Ağırlık</label>'
      +'<div style="display:flex;align-items:center;gap:4px">'
      +'<input class="fi" id="str-w-'+si+'" type="number" step="2.5" placeholder="'+(target?target.w:'—')+'" '
      +'value="'+(logEntry?.weight||'')+'" style="flex:1;padding:5px 8px;font-size:13px;font-weight:600;text-align:center" />'
      +'<span style="font-size:10px;color:var(--tx3)">kg</span></div></div>'

      +'<div><label style="font-size:9px;color:var(--tx3);display:block;margin-bottom:2px">Yaptığım Tekrar</label>'
      +'<div style="display:flex;align-items:center;gap:4px">'
      +'<input class="fi" id="str-r-'+si+'" type="number" placeholder="—" '
      +'value="'+(logEntry?.actualReps||'')+'" style="flex:1;padding:5px 8px;font-size:13px;font-weight:600;text-align:center" />'
      +'<span style="font-size:10px;color:var(--tx3)">tekrar</span></div></div>'
      +'</div>'

      // His
      +'<div style="display:flex;gap:3px">'+feelBtns+'</div>'
      +'</div>';
  }).join('');

  showModal2('<div class="ov"><div class="mod" style="max-width:480px;max-height:90vh;display:flex;flex-direction:column">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-shrink:0">'
    +'<div style="display:flex;align-items:center;gap:10px">'
    +'<span style="font-size:26px">'+emoji+'</span>'
    +'<div><div style="font-size:15px;font-weight:700;color:'+sc+'">'+entry.label+'</div>'
    +'<div style="font-size:10px;color:var(--tx3);margin-top:1px">'+dateKey+' · '+sessions.length+' hareket</div></div>'
    +'</div>'
    +'<button class="btn btns" onclick="closeModal()">&#x2715;</button></div>'

// Log kaydet
window.saveStrLog = function(encodedEntry, dateKey){
  const entry = JSON.parse(decodeURIComponent(encodedEntry));
  const sessions = entry.sessions||[];
  const STR_WEIGHTS_KEY = 'fl7_str_weights';
  const STR_LOGS_KEY = 'fl7_str_logs';
  const weights = JSON.parse(localStorage.getItem(STR_WEIGHTS_KEY)||'{}');
  const allLogs = JSON.parse(localStorage.getItem(STR_LOGS_KEY)||'[]');

  const exercises = sessions.map((s,si)=>{
    const name = typeof s==='string'?s:(s.name||'');
    const w = document.getElementById('str-w-'+si)?.value||'';
    const actualReps = document.getElementById('str-r-'+si)?.value||'';
    const feeling = _strFeelings[si]||'';
    if(w) weights[name] = w;
    return {name, weight:w, actualReps, feeling, targetReps:s.reps||s.sets||''};
  });

  const sessionNote = document.getElementById('str-session-note')?.value||'';
  const logEntry = {date:dateKey, label:entry.label, type:entry.type, exercises, note:sessionNote, loggedAt:new Date().toISOString()};

  // Eski logu sil, yenisini ekle
  const filtered = allLogs.filter(l=>!(l.date===dateKey&&l.label===entry.label));
  filtered.push(logEntry);
  localStorage.setItem(STR_LOGS_KEY, JSON.stringify(filtered));
  localStorage.setItem(STR_WEIGHTS_KEY, JSON.stringify(weights));

  const btn = document.querySelector('[onclick*="saveStrLog"]');
  if(btn){const orig=btn.innerHTML;btn.innerHTML='✓ Kaydedildi';btn.style.background='#5bb8a0';setTimeout(()=>{btn.innerHTML=orig;btn.style.background='';},2000);}
};

  const prompt='Sen bir kuvvet antrenoru sun. Sporcu antrenman loglarini paylasti:\n\nAntrenman: '+entry.label+'\nPlanlanan: '+(entry.sessions||[]).map(s=>(s.name||s)+(s.reps?' '+s.reps:'')).join(', ')+'\n\nSon Antrenman Loglari (tarih: agirlik, hedef tekrar, yapilan tekrar, his):\n'+logSummary+'\n\nAciklamasiz kurallar:\n- Tum tekrarlari tamamladiysa ve kolay hissettiyse: +2.5-5 kg artir\n- Tum tekrarlari tamamladiysa ve iyi hissettiyse: ayni agirlik veya +2.5 kg\n- Tekrarlari tamamlayamadiysa veya zor hissettiyse: agirlik sabit tut\n- Yapamadim dediyse: -5-10% azalt\n\nHer hareket icin net oneri ver, sonra JSON:\nSTR_ADJUSTMENTS:\n[{"exercise":"hareket","action":"increase|decrease|maintain","amount":"2.5 kg","targetWeight":"yeni agirlik kg","reason":"kisa neden"}]\nTurkce yaz.';

  try{

    const text = (data.content||[]).map(c=>c.text||'').join('');
    const jsonMatch = text.match(/STR_ADJUSTMENTS:\s*(\[[\s\S]*?\])/);
    let adjustments = [];
    if(jsonMatch){try{adjustments=JSON.parse(jsonMatch[1]);}catch(e){}}
    const display = text.replace(/STR_ADJUSTMENTS:[\s\S]*$/,'').trim();
    if(resultEl) resultEl.innerHTML = '<div style="margin-bottom:8px">'+display.replace(/\n/g,'<br/>')+'</div>'
      +(adjustments.length?'<div style="border-top:1px solid var(--bd);padding-top:8px;margin-top:4px">'
        +adjustments.map(a=>{
          const c = a.action==='increase'?'#5bb8a0':a.action==='decrease'?'#e05c3a':'#e8c547';

            +'<span style="font-weight:600;color:var(--tx)">'+a.exercise+'</span> '

// ── PKCE Yardımcıları ─────────────────────────────────────
async function generateCodeVerifier(){
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function generateCodeChallenge(verifier){
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

// ── OAuth Callback İşle (sayfa yüklenince) ───────────────
async function handleSuuntoCallback(){
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const savedState = localStorage.getItem('fl7_suunto_state');
  if(!code || !state || !state.startsWith('fitlog_')) return;

  // URL'den code'u temizle
  window.history.replaceState({}, document.title, window.location.pathname);

  const clientId = getSuuntoClientId() || '92f71a8d-af3b-4e3d-8261-c86cf8f0398d';
  const clientSecret = localStorage.getItem('fl7_suunto_secret')||'';
  const redirectUri = 'http://localhost';

  // Basic Auth: Base64(clientId:clientSecret)
  const basicAuth = btoa(clientId + ':' + clientSecret);

  try{
    const res = await fetch(SUUNTO_TOKEN_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'Authorization': 'Basic ' + basicAuth,
      },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        code: code,
        redirect_uri: 'http://localhost',
      }).toString()
    });
    const data = await res.json();
    if(data.access_token){
      const token = {...data, expires_at: Date.now() + (data.expires_in||3600)*1000};
      localStorage.setItem(SUUNTO_TOKEN_KEY, JSON.stringify(token));
      suuntoSyncAll();

        +'</div></div>');
    } else {
      console.error('Suunto token error:', data);
      alert('Token alınamadı: ' + JSON.stringify(data));
    }
  }catch(e){ console.error('Suunto callback error:', e); }
}

// ── API Çağrısı ────────────────────────────────────────────
async function suuntoFetch(endpoint, opts={}){
  const token = getSuuntoToken();
  if(!token?.access_token) return null;
  const subKey = localStorage.getItem('fl7_suunto_sub_key')||'';
  try{
    const r = await fetch(SUUNTO_API_BASE + endpoint, {
      ...opts,
      headers: {
        'Authorization': 'Bearer ' + token.access_token,
        'Content-Type': 'application/json',
        ...(subKey ? {'Ocp-Apim-Subscription-Key': subKey} : {}),
        ...(opts.headers||{})
      }
    });
    if(r.status===401){
      // Token geçersiz — logout
      localStorage.removeItem(SUUNTO_TOKEN_KEY);
      return null;
    }
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}

// ── Aktiviteleri Çek ──────────────────────────────────────
async function suuntoFetchActivities(days=30){
  const until = new Date().toISOString();
  const since = new Date(Date.now()-days*86400000).toISOString();
  const data = await suuntoFetch('/workouts?since='+since+'&until='+until+'&limit=30');
  if(!data?.payload) return [];
  return data.payload.map(w=>({
    id: w.workoutKey,
    date: (w.startTime||'').slice(0,10),
    name: w.workoutName||w.activityId,
    type: w.activityId,
    duration: w.totalTime,
    distance: w.totalDistance ? Math.round(w.totalDistance/10)/100 : null, // cm → km
    avgHR: w.avgHRBpm,
    maxHR: w.maxHRBpm,
    calories: w.totalCalories,
    elevation: w.totalAscent,
    avgPace: w.totalDistance&&w.totalTime ? (w.totalTime/60)/(w.totalDistance/100000) : null,
    peakTrainingEffect: w.peakTrainingEffect,
    recoveryTime: w.recoveryTime,
  }));
}

async function suuntoSendWorkout(day){
  const label = RT_LABEL[day.type]||day.type;
  const distM = (day.dist||0)*1000;
  const paceDecimal = (() => {
    if(!day.pace) return null;
    const parts = day.pace.split(':');
    return parseFloat(parts[0]) + (parseFloat(parts[1]||0))/60;
  })();
  const speedMs = paceDecimal ? 1000/paceDecimal/60 : null;

  const payload = {
    workoutName: label + ' — ' + (day.dist||'') + ' km',
    startTime: day.date + 'T07:00:00.000Z',
    totalDistance: distM * 100, // metre → cm
    sport: 'RUNNING',
    workoutType: 'DISTANCE_TARGET',
    targets: distM ? [{type:'DISTANCE', value: distM * 100}] : [],
    description: label + (day.pace?' @ '+day.pace+'/km':'') + (day.dist?' · '+day.dist+' km':''),
  };

  const result = await suuntoFetch('/workouts', {method:'POST', body: JSON.stringify(payload)});
  return result?.payload?.workoutKey ? {ok:true, id:result.payload.workoutKey} : {ok:false};
}

async function suuntoSyncAll(){
  if(!isSuuntoConnected()){ console.log('Suunto bağlı değil'); return; }
  console.log('Suunto sync başlıyor...');
  const activities = await suuntoFetchActivities(30);
  console.log('Suunto aktiviteler:', activities?.length, activities);
  if(!activities?.length){ console.warn('Aktivite gelmedi'); return; }
  const cache = {activities, syncedAt: new Date().toISOString()};
  localStorage.setItem(SUUNTO_CACHE_KEY, JSON.stringify(cache));
  updateSuuntoBadges(activities);
  // Geçmiş sayfasına da aktar
  suuntoImportToLogs(activities);
  return cache;
}

function getSuuntoCache(){ try{ return JSON.parse(localStorage.getItem(SUUNTO_CACHE_KEY)||'null'); }catch(e){ return null; } }

// Suunto aktivitelerini logs'a aktar
function suuntoImportToLogs(activities){
  if(!activities?.length) return;
  let imported = 0;
  activities.forEach(a=>{
    if(!a.date || !a.id) return;
    // Zaten var mı?
    const exists = logs.some(l=>l.suuntoId===a.id);
    if(exists) return;

    const isRun = (a.type||'').toLowerCase().includes('run') ||
                  (a.type||'').toLowerCase().includes('trail') ||
                  (a.type||'').toLowerCase().includes('hike');

    const paceStr = a.avgPace
      ? Math.floor(a.avgPace)+':'+(Math.round((a.avgPace%1)*60)+'').padStart(2,'0')
      : null;

    const entry = {
      id: 'suunto_'+a.id,
      suuntoId: a.id,
      date: a.date,
      branch: isRun ? 'run' : 'strength',
      source: 'suunto',
      label: a.name || (isRun ? 'Koşu' : 'Antrenman'),
      duration: a.duration ? Math.round(a.duration/60) : null,
      calories: a.calories || null,
      notes: '',
      runData: isRun ? {
        distance: a.distance,
        pace: paceStr,
        avgHR: a.avgHR,
        maxHR: a.maxHR,
        elevation: a.elevation,
      } : null,
    };
    logs.unshift(entry);
    imported++;
  });

  if(imported > 0){
    saveL();
    console.log('Suunto:', imported, 'aktivite import edildi');
    // UI güncelle
    if(typeof renderDashboard === 'function') renderDashboard();
  }
}

function updateSuuntoBadges(activities){
  // Plan hücrelerini aktivitelerle eşleştir
  if(!activities?.length) return;
  const byDate = {};
  activities.forEach(a=>{ if(!byDate[a.date]) byDate[a.date]=a; });
  // Aktivite badge'lerini güncelle
  activities.forEach(a=>{
    const el = document.getElementById('suunto-badge-'+a.date);
    if(el && a.distance) el.innerHTML = '✓ '+a.distance+'km';
  });
}

// ── API İstekleri ─────────────────────────────────────────
async function icuGet(path){
  const {athlete} = getIcuSettings();
  if(!athlete) return null;
  try{
    const r = await fetch('https://intervals.icu/api/v1/athlete/'+athlete+path, {headers: icuHeaders()});
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}

async function icuPost(path, body){
  const {athlete} = getIcuSettings();
  if(!athlete) return null;
  try{
    const r = await fetch('https://intervals.icu/api/v1/athlete/'+athlete+path, {method:'POST', headers: icuHeaders(), body: JSON.stringify(body)});
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}

// Athlete bilgisini çek (bağlantı testi)
async function icuFetchAthlete(){
  const data = await icuGet('/');
  return !!data?.id;
}

// ── Wellness Verisi (HRV, dinlenme KAH, uyku) ────────────
async function icuFetchWellness(days=30){
  const end = td();
  const start = new Date(Date.now() - days*86400000).toISOString().slice(0,10);
  const data = await icuGet('/wellness?oldest='+start+'&newest='+end);
  if(!Array.isArray(data)) return [];
  return data.map(w=>({
    date: w.id,
    hrv: w.hrv||w.hrvScore||null,
    hrvRmssd: w.rmssd||null,
    restingHR: w.restingHR||null,
    sleep: w.sleepSecs ? Math.round(w.sleepSecs/3600*10)/10 : null,
    sleepScore: w.sleepScore||null,
    vo2max: w.vo2max||null,
    form: w.form||null,
    fitness: w.ctl||null,
    fatigue: w.atl||null,
    weight: w.weight||null,
    spO2: w.spO2||null,
  }));
}

// ── Aktiviteler (tamamlanan antrenmanlar) ─────────────────
async function icuFetchActivities(days=30){
  const end = td();
  const start = new Date(Date.now() - days*86400000).toISOString().slice(0,10);
  const data = await icuGet('/activities?oldest='+start+'&newest='+end+'&cols=id,name,start_date_local,type,distance,moving_time,average_speed,average_heartrate,max_heartrate,average_cadence,total_elevation_gain,training_load,suffer_score,average_watts');
  if(!Array.isArray(data)) return [];
  return data.map(a=>({
    id: a.id,
    date: (a.start_date_local||'').slice(0,10),
    name: a.name,
    type: a.type,
    distance: a.distance ? Math.round(a.distance/100)/10 : null, // metre → km
    duration: a.moving_time,
    avgPace: a.average_speed ? (1000/a.average_speed/60) : null, // m/s → dk/km
    avgHR: a.average_heartrate,
    maxHR: a.max_heartrate,
    cadence: a.average_cadence,
    elevation: a.total_elevation_gain,
    load: a.training_load,
    sufferScore: a.suffer_score,
  }));
}

// ── Planlı Antrenmanı intervals.icu'ya Gönder ─────────────
async function icuSendPlannedWorkout(day, planType){
  const {athlete} = getIcuSettings();
  if(!athlete) return false;

  let description = '';
  let loadTarget = null;
  if(planType==='run'){
    const paceMin = Math.floor(parseFloat(day.pace));
    const paceSec = Math.round((parseFloat(day.pace)-paceMin)*60);
    description = (RT_LABEL[day.type]||day.type)+' — '+day.dist+' km @ '+day.pace+'/km';
    loadTarget = Math.round(day.dist * 10);
  } else {
    description = day._salonName||day._metconName||day.type;
  }

  const payload = {
    'category': planType==='run'?'RUN':'STRENGTH',
    'start_date_local': day.date+'T07:00:00',
    'description': description,
    'type': planType==='run'?'Run':'WeightTraining',
    'name': description,
    'indoor': false,
    'load_target': loadTarget,
  };
  const result = await icuPost('/events', payload);
  return !!result?.id;
}

// ── Tüm Verileri Senkronize Et ────────────────────────────
async function syncIcuAll(){
  const {athlete, apiKey} = getIcuSettings();
  if(!athlete||!apiKey) return;

  const [wellness, activities] = await Promise.all([
    icuFetchWellness(60),
    icuFetchActivities(30),
  ]);

  const cache = {wellness, activities, syncedAt: new Date().toISOString()};
  localStorage.setItem(ICU_CACHE_KEY, JSON.stringify(cache));

  // UI'ı güncelle
  updateIcuBadges();
  return cache;
}

// Önbellekten oku

  try{ return JSON.parse(localStorage.getItem(ICU_CACHE_KEY)||'null'); }catch(e){ return null; }
}

// Bugünün wellness verisini al

  const cache = getIcuCache();

  return cache.wellness?.find(w=>w.date===td())||cache.wellness?.[cache.wellness.length-1]||null;

function buildMuscleSvgHTML(){

  /*
    v12 — Gerçek insan oranları, 8 baş boy kuralı
    ViewBox: 0 0 140 560

    8 baş boy ölçüleri (her birim = 30px):
    Baş:       0– 60  (2 birim, rx=14)
    Boyun:    60– 75
    Omuz:     75–120  (omuz genişliği: 100px, 36–136)
    Göğüs:   120–180
    Bel:     180–210  (bel: 58–82, sadece 24px her yan)
    Kalça:   210–240  (60–80, 20px her yan)
    Uyluk:   240–370  (130px uzun, ince: max 22px her yan)
    Diz:     370–390
    Baldır:  390–490  (100px uzun, ince)
    Ayak:    490–520
    TOPLAM:  ~520px

    Omuz merkezi: x=70, omuz ucu: x=36 ve x=104

// Kas haritasındaki seçimi kaydet → sabah check-in'e yansıt → revizyon göster
window.dbSaveAndRevise = function(){
  // _dbSoreness içeriğini (fullId → level) kas kısa ID'sine çevir
  var soreness = {};
  Object.entries(_dbSoreness).forEach(function(entry){
    var fullId = entry[0], level = entry[1];
    if(level === 0) return;
    // fullId örn: "dbf-pec", "dbb-glute" → kısa ID bul
    Object.entries(MUSCLE_IDS).forEach(function(e){
      var shortId = e[0], ids = e[1];
      if(ids.indexOf(fullId) !== -1) soreness[shortId] = Math.max(soreness[shortId]||0, level);
    });
    // Direkt kısa ID eşleşmesi de dene
    var stripped = fullId.replace('dbf-','').replace('dbb-','');
    if(MUSCLE_NAMES[stripped] && !soreness[stripped]) soreness[stripped] = level;
  });

  // LocalStorage'a kaydet (bugünkü tarih için)
  var today = td();
  var log = ld(SORENESS_KEY, {});
  // Mevcut veriyle birleştir
  log[today] = Object.assign({}, log[today]||{}, soreness);
  sv(SORENESS_KEY, log);
  localStorage.setItem(CHECKIN_KEY, today);

  // Dashboard banner'ını güncelle
  if(typeof renderDashboard === 'function') renderDashboard();

  // Revizyon modalini göster
  setTimeout(showDOMS_PlanRevision, 200);
};

        var wk = activePlan.weeks[wkIdx];

        var phaseMap = {base:'Baz',build:'Gelişim',peak:'Zirve',taper:'İnce Ayar',race:'Yarış',recovery:'Toparlanma'};
        var phaseLabel = phaseMap[phaseName] || phaseName;
        weekLine = 'Hafta '+(wkIdx+1)+' / '+totalWeeks
          +(phaseLabel ? ' &middot; '+phaseLabel : '');
      }
    }

    // Bugünkü egzersiz tipi
    var todayPlan = (typeof plans!=='undefined') && plans[today];
    var exLabel = '';
    if(todayPlan && todayPlan.branch){
      var branchMap = {run:'Koşu',strength:'Kuvvet',cross:'Çapraz',rest:'Dinlenme'};
      exLabel = branchMap[todayPlan.branch] || todayPlan.branch;
      if(todayPlan.label) exLabel = todayPlan.label;
    }

    box.innerHTML =
      '<div style="font-size:11px;color:var(--tx2);font-weight:500">'+dateStr+'</div>'
      +(weekLine ? '<div style="font-size:10px;color:var(--tx3);margin-top:3px">'+weekLine+'</div>' : '')
      +(exLabel  ? '<div style="font-size:10px;color:#e8c547;margin-top:3px">📅 '+exLabel+'</div>' : '');
  })();
  document.querySelectorAll('.db-mg').forEach(function(el){
    el.style.cursor = 'pointer';
    el.addEventListener('click', function(){
      /* Görünmez g içindeyse tıklamayı engelle */
      var parentG = el.closest('g');
      if(parentG && (parentG.style.display==='none' || parentG.getAttribute('visibility')==='hidden')) return;
      dbToggle(el.id);
    });
    el.addEventListener('mouseenter', function(){
      if(!_dbSelected.has(el.id)){
        el.style.fillOpacity = '0.5';
        el.style.fill = el.dataset.color;
      }
      // Tooltip: kas adını göster
      var hint = document.getElementById('db-hint');
      if(hint && !_dbSelected.size) hint.innerHTML = '<span style="font-size:16px">👆</span><span><b style="color:var(--tx)">'+el.dataset.name+'</b> — tıkla seç</span>';
    });
    el.addEventListener('mouseleave', function(){
      if(!_dbSelected.has(el.id)){
        el.style.fill = '#c4a882';
        el.style.fillOpacity = '1';
      }
      var hint = document.getElementById('db-hint');
      if(hint && !_dbSelected.size) hint.innerHTML = '<span style="font-size:16px">👆</span><span>Kas gruplarına tıkla, seçili kasları işaretle</span>';
    });
  });
}
function renderIcuPanel(){
  const cache = getIcuCache();
  const s = getIcuSettings();
  const connected = !!(s.athlete && s.apiKey);

  if(!connected){
    return '<div class="card mb10" style="border-color:#e8c54733">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
      +'<div style="font-size:11px;font-weight:700;color:#e8c547;letter-spacing:.08em;text-transform:uppercase">⚡ intervals.icu / Suunto</div>'
      +'<button class="btn btns" onclick="showIcuSettings()" style="font-size:10px">Bağlan</button></div>'
      +'<div style="font-size:11px;color:var(--tx3)">Suunto verilerini çekmek için intervals.icu hesabını bağla.</div>'
      +'</div>';
  }

  const wellness = cache?.wellness||[];
  const activities = cache?.activities||[];
  const latest = wellness[wellness.length-1]||{};
  const syncedAt = cache?.syncedAt ? new Date(cache.syncedAt).toLocaleString('tr-TR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';

  // Son 14 günün HRV trendi
  const last14 = wellness.slice(-14);
  const hrvMax = Math.max(...last14.map(w=>w.hrv||0), 1);
  const trendBars = last14.map(w=>{
    const h = w.hrv ? Math.round((w.hrv/hrvMax)*32) : 2;
    const c = w.hrv > (latest.hrv||0)*0.95 ? '#5bb8a0' : w.hrv > (latest.hrv||0)*0.80 ? '#e8c547' : '#e05c3a';
    return '<div style="width:8px;height:'+h+'px;background:'+c+';border-radius:2px 2px 0 0;flex-shrink:0" title="'+w.date+(w.hrv?' HRV:'+Math.round(w.hrv):'')+'"></div>';
  }).join('');

  const stat = (label,val,unit,color)=>val!=null
    ? '<div style="text-align:center;flex:1;min-width:70px"><div style="font-size:18px;font-weight:700;color:'+(color||'var(--tx)')+';font-family:monospace">'+val+(unit?'<span style="font-size:10px;color:var(--tx3)"> '+unit+'</span>':'')+'</div><div style="font-size:9px;color:var(--tx3);margin-top:2px">'+label+'</div></div>'
    : '';

  const lastRun = activities.filter(a=>a.type==='Run'||a.type==='VirtualRun').slice(-1)[0];
  const paceStr = lastRun?.avgPace ? Math.floor(lastRun.avgPace)+':'+(Math.round((lastRun.avgPace%1)*60)+'').padStart(2,'0') : null;

  return '<div class="card mb10" style="border-color:#e8c54722">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
    +'<div style="font-size:11px;font-weight:700;color:#e8c547;letter-spacing:.08em;text-transform:uppercase">⚡ Suunto / intervals.icu</div>'
    +'<div style="display:flex;gap:6px;align-items:center">'
    +'<span style="font-size:9px;color:var(--tx3)">'+syncedAt+'</span>'
    +'<button class="btn btns" onclick="syncIcuAll().then(renderProfile)" style="font-size:10px;padding:2px 8px">↻ Senkronize Et</button>'
    +'<button class="btn btns" onclick="showIcuSettings()" style="font-size:10px;padding:2px 8px"><i class="ti ti-settings"></i></button>'
    +'</div></div>'

    // Ana istatistikler
    +'<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px">'
    +stat('HRV', latest.hrv?Math.round(latest.hrv):null, '', latest.hrv>55?'#5bb8a0':latest.hrv>40?'#e8c547':'#e05c3a')
    +stat('RMSSD', latest.hrvRmssd?Math.round(latest.hrvRmssd):null, 'ms', '#a78bfa')
    +stat('VO2max', latest.vo2max?Math.round(latest.vo2max*10)/10:null, '', '#38bdf8')
    +stat('Dinlenme KAH', latest.restingHR, 'bpm', '#e05c3a')
    +stat('Uyku', latest.sleep, 's', '#9b7fe8')
    +stat('Form', latest.form?Math.round(latest.form):null, '', latest.form>0?'#5bb8a0':latest.form>-10?'#e8c547':'#e05c3a')
    +'</div>'

    // HRV trend grafiği
    +(last14.length>2?'<div style="margin-bottom:12px"><div style="font-size:9px;color:var(--tx3);margin-bottom:4px">HRV Trend (14 gün)</div>'
      +'<div style="display:flex;align-items:flex-end;gap:2px;height:36px">'+trendBars+'</div></div>':'')

    // Fitness/Yorgunluk
    +(latest.fitness||latest.fatigue?'<div style="display:flex;gap:8px;margin-bottom:12px">'
      +'<div style="flex:1;background:rgba(91,184,160,.1);border-radius:7px;padding:8px;text-align:center">'
      +'<div style="font-size:11px;color:var(--tx3);margin-bottom:2px">Fitness (CTL)</div>'
      +'<div style="font-size:16px;font-weight:700;color:#5bb8a0">'+(latest.fitness?Math.round(latest.fitness):'—')+'</div></div>'
      +'<div style="flex:1;background:rgba(224,92,58,.1);border-radius:7px;padding:8px;text-align:center">'
      +'<div style="font-size:11px;color:var(--tx3);margin-bottom:2px">Yorgunluk (ATL)</div>'
      +'<div style="font-size:16px;font-weight:700;color:#e05c3a">'+(latest.fatigue?Math.round(latest.fatigue):'—')+'</div></div>'
      +'</div>':'')

    // Son koşu
    +(lastRun?'<div style="border-top:1px solid var(--bd);padding-top:10px;margin-top:4px">'
      +'<div style="font-size:9px;color:var(--tx3);margin-bottom:4px">Son Koşu · '+lastRun.date+'</div>'
      +'<div style="display:flex;gap:12px;flex-wrap:wrap">'
      +(lastRun.distance?'<span style="font-size:12px;font-weight:600">'+lastRun.distance+' km</span>':'')
      +(paceStr?'<span style="font-size:12px;font-weight:600;color:#e8c547">'+paceStr+'/km</span>':'')
      +(lastRun.avgHR?'<span style="font-size:12px;font-weight:600;color:#e05c3a">'+Math.round(lastRun.avgHR)+' bpm</span>':'')
      +(lastRun.elevation?'<span style="font-size:12px;font-weight:600;color:#a78bfa">'+Math.round(lastRun.elevation)+'m D+</span>':'')
      +'</div></div>':'')
    +'</div>';
}

// Sayfa açılışında otomatik senkronize et
async function icuAutoSync(){
  const {athlete, apiKey} = getIcuSettings();
  if(!athlete||!apiKey) return;
  const cache = getIcuCache();
  // Son 30 dakikada senkronize edildiyse atla
  if(cache?.syncedAt && Date.now()-new Date(cache.syncedAt).getTime() < 30*60*1000) return;
  await syncIcuAll();
}

const PROFILE_KEY = 'fl7_profile';
const PROFILE_HISTORY_KEY = 'fl7_profile_history';
function loadProfile(){ try{ return JSON.parse(localStorage.getItem(PROFILE_KEY)||'{}'); }catch(e){ return {}; } }
function loadProfileHistory(){ try{ return JSON.parse(localStorage.getItem(PROFILE_HISTORY_KEY)||'[]'); }catch(e){ return []; } }
function saveProfile(data){
  // Mevcut profili historye ekle (ilk kayıt değilse)
  const existing = loadProfile();
  if(existing.savedAt){
    const history = loadProfileHistory();
    history.push(existing);
    // Max 10 kayıt tut
    if(history.length > 10) history.shift();
    localStorage.setItem(PROFILE_HISTORY_KEY, JSON.stringify(history));
  }
  localStorage.setItem(PROFILE_KEY, JSON.stringify(data));
}
