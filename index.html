<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FitLog</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html{
  --bg:#f5f2ee;
  --bg2:#edeae4;
  --bg3:#e4e0d8;
  --bg4:#d8d3c8;
  --bd:rgba(0,0,0,.08);
  --bd2:rgba(0,0,0,.15);
  --tx:#1a1714;
  --tx2:#5a5148;
  --tx3:#9a9088;
  --run:#c8860a;
  --str:#c0392b;
  --cal:#1a8a6a;
  --ast:#6d3fbb;
  --acc:#c8860a;
}
body{background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,sans-serif;font-size:13px;min-height:100vh;padding:16px}
.app{max-width:920px;margin:0 auto}
.logo{font-size:22px;font-weight:700;margin-bottom:16px;letter-spacing:-.5px}.logo b{color:#e8c547}
.nav{display:flex;gap:4px;background:#fff;border-radius:12px;padding:4px;margin-bottom:18px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.nb{flex:1;min-width:72px;padding:7px 4px;border:none;background:transparent;border-radius:8px;font-size:11px;color:var(--tx2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s;font-family:inherit}
.nb.on{background:var(--acc);color:#fff;border:1px solid transparent;font-weight:600}.nb:hover{background:var(--bg3);color:var(--tx)}.nb i{font-size:17px}
.scr{display:none}.scr.on{display:block}
.card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px 18px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.csm{background:var(--bg2);border-radius:8px;padding:11px 13px;border:1px solid var(--bd)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.g7{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.lbl{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-size:12px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx);cursor:pointer;transition:all .12s;font-family:inherit}
.btn:hover{background:var(--bg3)}.btnp{background:#c8860a!important;color:#fff!important;border-color:#c8860a!important;font-weight:500}.btnp:hover{background:#b07208!important}
.btnd{background:rgba(224,92,58,.12)!important;color:#e05c3a!important;border-color:rgba(224,92,58,.3)!important}
.btns{padding:4px 10px;font-size:11px}
input.fi,select.fi,textarea.fi{background:#fff;border:1px solid var(--bd2);color:var(--tx);border-radius:8px;padding:6px 10px;font-size:12px;outline:none;width:100%;font-family:inherit}
input.fi:focus,select.fi:focus,textarea.fi:focus{border-color:rgba(255,255,255,.3)}
select.fi option{background:var(--bg3)}
label.fl{font-size:11px;color:var(--tx2);display:block;margin-bottom:3px}
.fg{margin-bottom:10px}
.pb{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:2px;transition:width .4s}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.mod{background:#fff;border:1px solid var(--bd2);border-radius:14px;padding:22px;width:520px;max-width:96vw;max-height:90vh;overflow-y:auto}
.bsel{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.bo{padding:9px 10px;border-radius:8px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx2);font-size:12px;display:flex;align-items:center;gap:7px;cursor:pointer;width:100%;transition:all .12s;font-family:inherit}
.fb{display:flex;align-items:center;justify-content:space-between}
.fc{display:flex;align-items:center}
.gap6{gap:6px}.gap8{gap:8px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}
.mu{color:var(--tx2)}.dim{color:var(--tx3)}
.bw{height:90px;display:flex;align-items:flex-end;gap:3px;margin-top:6px}
.bbar{flex:1;border-radius:2px 2px 0 0;min-height:2px}.blbl{font-size:9px;color:var(--tx3);text-align:center;margin-top:2px}
.tabs{display:flex;gap:3px;background:var(--bg3);padding:3px;border-radius:8px;width:fit-content;margin-bottom:14px}
.tab{padding:5px 13px;border-radius:7px;font-size:12px;border:none;background:none;color:var(--tx2);cursor:pointer;transition:all .12s;font-family:inherit}.tab.on{background:var(--bg);color:var(--tx)}
.dc{border-radius:8px;padding:8px 4px;text-align:center;border:1px solid var(--bd);background:var(--bg3);cursor:pointer;position:relative;transition:all .12s}.dc:hover{background:var(--bg3)}
.ddone{position:absolute;inset:0;border-radius:7px;background:rgba(91,184,160,.14);border:1.5px solid #5bb8a0!important;pointer-events:none;z-index:2;display:flex;align-items:center;justify-content:center}
/* Race plan specific */
.rp-step{display:none}.rp-step.on{display:block}
.rp-option{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.rp-option:hover{border-color:var(--bd2);background:var(--bg3)}
.rp-option.on{border-color:#e8c547;background:rgba(232,197,71,.1);color:#e8c547}
.rp-option .rp-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.rp-prog{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:20px}
.rp-prog-fill{height:100%;background:#e8c547;border-radius:2px;transition:width .3s}
.week-row{display:grid;grid-template-columns:80px repeat(7,1fr);gap:4px;margin-bottom:4px;align-items:center}
.week-label{font-size:11px;color:var(--tx3);font-family:monospace}
.day-cell{border-radius:6px;padding:6px 4px;text-align:center;border:1px solid var(--bd);font-size:10px;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .12s}
.day-cell:hover{border-color:var(--bd2)}
.day-cell.rest{opacity:.4}
.day-cell.today-cell{border-color:#e8c547}
.day-cell.done-cell{background:rgba(91,184,160,.1);border:1.5px solid #5bb8a0!important;}
.day-cell.race-cell{background:rgba(232,197,71,.15);border-color:#e8c547}
.day-cell .run-type{font-size:9px;font-weight:500;letter-spacing:.04em}
.day-cell .run-dist{font-size:12px;font-weight:600;font-family:monospace}
.day-cell .run-pace{font-size:9px;color:var(--tx3)}
.intensity-bar{height:3px;width:80%;border-radius:2px;margin-top:3px}
.week-stats{display:flex;gap:8px;margin-bottom:6px;font-size:11px;color:var(--tx2)}
.wstat{background:var(--bg3);padding:3px 8px;border-radius:6px;font-family:monospace}
/* run type colors */
.tc-easy{color:#5bb8a0}.tc-tempo{color:#e8c547}.tc-interval{color:#e05c3a}.tc-long{color:#9b7fe8}
.tc-race{color:#FFD700}.tc-hill{color:#ff7c43}.tc-fartlek{color:#a78bfa}.tc-strides{color:#38bdf8}
.tc-progression{color:#fb923c}.tc-recovery{color:#94a3b8}.tc-rest{color:var(--tx3)}
.bc-easy{background:#5bb8a0}.bc-tempo{background:#e8c547}.bc-interval{background:#e05c3a}.bc-long{background:#9b7fe8}
.bc-race{background:#FFD700}.bc-hill{background:#ff7c43}.bc-fartlek{background:#a78bfa}.bc-strides{background:#38bdf8}
.bc-progression{background:#fb923c}.bc-recovery{background:#94a3b8}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}
@media(max-width:600px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.g7{gap:3px}.week-row{grid-template-columns:50px repeat(7,1fr);gap:2px}.day-cell{padding:4px 2px;min-height:44px}}

/* ── drag & drop ─────────────────────────────────────────── */
.day-cell{cursor:default;user-select:none;transition:all .15s}
.day-cell.draggable{cursor:grab}
.day-cell.draggable:active{cursor:grabbing}
.day-cell.drag-over{border-color:#e8c547 !important;background:rgba(232,197,71,.12) !important;transform:scale(1.04)}
.day-cell.dragging{opacity:.35;transform:scale(.96)}
.day-cell.drag-source{border-style:dashed}

/* ── FIT import ─────────────────────────────────────────── */
.fit-drop{border:2px dashed var(--bd2);border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3)}
.fit-drop:hover,.fit-drop.over{border-color:#e8c547;background:rgba(232,197,71,.06)}
.fit-drop i{font-size:36px;color:var(--tx3);display:block;margin-bottom:10px}
.fit-drop.over i{color:#e8c547}
.fit-result{border-radius:10px;padding:14px 16px;margin-top:12px;border:1px solid var(--bd)}
.hr-zone{height:8px;border-radius:4px;margin-bottom:4px}
.fit-field{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);font-size:13px}
.fit-field:last-child{border-bottom:none}

/* ── Inline SVG icon system ─────────────────────────────── */
.ti-svg{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;flex-shrink:0}
.ti-svg svg{width:1em;height:1em;stroke:currentColor;fill:none}
.nb .ti-svg{width:1.3em;height:1.3em;margin-bottom:1px}
.nb .ti-svg svg{width:1.3em;height:1.3em}
.wkp-tip-wrap{position:relative;display:inline-block}
.wkp-tip{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#1e2020;color:#f0ede8;font-size:10px;white-space:nowrap;padding:3px 8px;border-radius:5px;border:1px solid #333;pointer-events:none;opacity:0;transition:opacity .15s;z-index:999}
.wkp-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#333}
.wkp-tip-wrap:hover .wkp-tip{opacity:1}
</style>
</head>
<body>
<div class="app">
<div class="logo"><b>Fit</b>Log</div>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
  <div class="nav" style="flex:1">
    <button class="nb on" data-s="dashboard" onclick="go('dashboard')"><i class="ti ti-layout-dashboard"></i><span>Dashboard</span></button>
    <button class="nb" data-s="race" onclick="go('race')"><i class="ti ti-trophy"></i><span>Plan</span></button>
    <button class="nb" data-s="stats" onclick="go('stats')"><i class="ti ti-chart-bar"></i><span>İstatistik</span></button>
    <button class="nb" data-s="goals" onclick="go('goals')"><i class="ti ti-trophy"></i><span>Hedef&amp;Yarış</span></button>
    <button class="nb" data-s="history" onclick="go('history')"><i class="ti ti-list"></i><span>Geçmiş</span></button>

    <button class="nb" data-s="profile" onclick="go('profile')"><i class="ti ti-user"></i><span>Profil</span></button>
    <button class="btn btns" onclick="showConnectModal()" style="margin-left:auto;flex-shrink:0;padding:4px 10px;font-size:10px" title="Bağlantılar" id="suunto-nav-btn">⚡</button>
  </div>
  <button class="btn btnp" onclick="showFitImport()" style="margin-left:10px;flex-shrink:0;white-space:nowrap">
    <i class="ti ti-watch"></i><span style="display:none" id="fit-btn-label"> FIT İçe Aktar</span>
  </button>
  <button class="btn" onclick="showApiKeyModal()" style="margin-left:6px;flex-shrink:0" title="API Ayarları">
    <i class="ti ti-key"></i>
  </button>
</div>
<div id="root">
  <div class="scr on" id="s-dashboard"></div>
  <div class="scr" id="s-race"></div>
  <div class="scr" id="s-stats"></div>
  <div class="scr" id="s-goals"></div>
  <div class="scr" id="s-history"></div>

  <div class="scr" id="s-profile"></div>
</div>
<div id="modal"></div>
</div>

<script charset="utf-8">
// ══════════════════════════════════════════════════════════
// KAS-EGZERSİZ EŞLEMESİ & SABAH AĞRI CHECK-IN SİSTEMİ
// Literatür: DOMS 24-72s arası, zirve 48-72s, iyileşme ~7 gün
// Kaynak: Frontiers Physiology 2025, Physiopedia, StrengthLog
// ══════════════════════════════════════════════════════════

// Egzersiz tipi → Birincil ve ikincil kas grupları
// Kas ID'leri: dbf/dbb prefix olmadan, kas haritasıyla eşleşiyor
const EXERCISE_MUSCLES = {
  // KOŞU TİPLERİ
  easy:        { primary:['quad','calf'],       secondary:['glute','ham','obl'],      label:'Kolay Koşu' },
  tempo:       { primary:['quad','calf','glute'],secondary:['ham','obl','erec'],       label:'Tempo' },
  interval:    { primary:['quad','calf','glute','ham'], secondary:['obl','erec','delt'], label:'İnterval' },
  long:        { primary:['quad','calf','glute','ham'],secondary:['obl','erec'],        label:'Uzun Koşu' },
  hill:        { primary:['glute','quad','calf'],secondary:['ham','erec','obl'],        label:'Tepe Koşu' },
  recovery:    { primary:['calf','quad'],        secondary:['glute'],                   label:'Toparlanma' },
  // KUVVET EGZERSİZLERİ
  squat:       { primary:['quad','glute'],       secondary:['ham','obl','erec'],        label:'Squat' },
  deadlift:    { primary:['glute','ham','erec'], secondary:['quad','sirt','trap'],      label:'Deadlift' },
  rdl:         { primary:['ham','glute'],        secondary:['erec','calf'],             label:'Romanian DL' },
  bench:       { primary:['pec','tri'],          secondary:['delt','serr'],             label:'Bench Press' },
  row:         { primary:['sirt','bic'],         secondary:['trap','erec','delt'],      label:'Barbell Row' },
  pullup:      { primary:['sirt','bic'],         secondary:['trap','delt'],             label:'Pull-up' },
  ohp:         { primary:['delt','tri'],         secondary:['trap','pec'],              label:'Overhead Press' },
  lunge:       { primary:['quad','glute'],       secondary:['ham','calf','obl'],        label:'Lunge' },
  legpress:    { primary:['quad','glute'],       secondary:['ham','calf'],              label:'Leg Press' },
  calfrise:    { primary:['calf'],              secondary:[],                           label:'Calf Rise' },
  plank:       { primary:['obl','abs'],         secondary:['erec','delt'],             label:'Plank' },
  hipthrust:   { primary:['glute'],             secondary:['ham','obl'],               label:'Hip Thrust' },
  curl:        { primary:['bic'],               secondary:['fore'],                    label:'Biceps Curl' },
  pushdown:    { primary:['tri'],               secondary:['fore'],                    label:'Triceps' },
  lateraise:   { primary:['delt'],              secondary:['trap'],                    label:'Lateral Raise' },
};

// Kas ID kısa → tam ID eşlemesi (kas haritasıyla bağlantı)
const MUSCLE_IDS = {
  quad:  ['dbf-quad', 'dbb-ham'],  // quad + ilişkili
  glute: ['dbb-glute'],
  ham:   ['dbb-ham'],
  calf:  ['dbf-calf','dbb-calf'],
  obl:   ['dbf-obl'],
  abs:   ['dbf-abs'],
  pec:   ['dbf-pec'],
  delt:  ['dbf-delt','dbb-delt'],
  trap:  ['dbf-trap','dbb-trap'],
  sirt:  ['dbb-sirt'],
  erec:  ['dbb-erec'],
  bic:   ['dbf-bic'],
  tri:   ['dbb-tri'],
  fore:  ['dbf-fore','dbb-fore'],
  serr:  ['dbf-serr'],
};

// Kas kısa ID → Türkçe ad
const MUSCLE_NAMES = {
  quad:'Quadriceps', glute:'Glute', ham:'Hamstring', calf:'Baldır',
  obl:'Oblique', abs:'Karın', pec:'Göğüs', delt:'Omuz/Deltoid',
  trap:'Trapezius', sirt:'Sırt', erec:'Erector Spinae',
  bic:'Biceps', tri:'Triceps', fore:'Ön/Arka Kol', serr:'Serratus'
};

// LocalStorage anahtarları
const SORENESS_KEY = 'fl7_soreness_log';   // { date: { muscleId: level } }
// ══════════════════════════════════════════════════════════
// EKLEM HARİTASI SİSTEMİ
// Ana eklemler: boyun, omuz, dirsek, bilek, bel, kalça, diz, ayak bileği
// ══════════════════════════════════════════════════════════

const JOINT_SORENESS_KEY = 'fl7_joint_soreness';
const _jSelected = new Set();
const _jSoreness = {};

// Eklem tanımları: id, Türkçe ad, x, y (viewBox 140x480 içinde)
const JOINTS = [
  // Ön görünüm
  { id:'jf-boyun',   nm:'Boyun',       x:70,  y:58  },
  { id:'jf-omuz-l',  nm:'Omuz (Sol)',   x:108, y:78  },
  { id:'jf-omuz-r',  nm:'Omuz (Sağ)',   x:32,  y:78  },
  { id:'jf-dirsek-l',nm:'Dirsek (Sol)', x:122, y:134 },
  { id:'jf-dirsek-r',nm:'Dirsek (Sağ)', x:18,  y:134 },
  { id:'jf-bilek-l', nm:'Bilek (Sol)',  x:128, y:192 },
  { id:'jf-bilek-r', nm:'Bilek (Sağ)',  x:12,  y:192 },
  { id:'jf-bel',     nm:'Bel',          x:70,  y:222 },
  { id:'jf-kalca-l', nm:'Kalça (Sol)',  x:94,  y:248 },
  { id:'jf-kalca-r', nm:'Kalça (Sağ)', x:46,  y:248 },
  { id:'jf-diz-l',   nm:'Diz (Sol)',    x:86,  y:370 },
  { id:'jf-diz-r',   nm:'Diz (Sağ)',    x:54,  y:370 },
  { id:'jf-ayak-l',  nm:'Ayak Bileği (Sol)', x:82, y:468 },
  { id:'jf-ayak-r',  nm:'Ayak Bileği (Sağ)', x:58, y:468 },
];

// Eklem → ilişkili egzersizler (plan revizyonu için)
const JOINT_EXERCISE_MAP = {
  'jf-boyun':    ['ohp','lateraise','row','pullup'],
  'jf-omuz-l':   ['bench','ohp','lateraise','row','pullup'],
  'jf-omuz-r':   ['bench','ohp','lateraise','row','pullup'],
  'jf-dirsek-l': ['bench','curl','pushdown','row'],
  'jf-dirsek-r': ['bench','curl','pushdown','row'],
  'jf-bilek-l':  ['bench','curl','pushdown','row'],
  'jf-bilek-r':  ['bench','curl','pushdown','row'],
  'jf-bel':      ['deadlift','rdl','squat','lunge','plank'],
  'jf-kalca-l':  ['squat','lunge','deadlift','hipthrust','legpress'],
  'jf-kalca-r':  ['squat','lunge','deadlift','hipthrust','legpress'],
  'jf-diz-l':    ['squat','lunge','legpress','run','interval','tempo'],
  'jf-diz-r':    ['squat','lunge','legpress','run','interval','tempo'],
  'jf-ayak-l':   ['run','easy','tempo','interval','long','hill','calfrise'],
  'jf-ayak-r':   ['run','easy','tempo','interval','long','hill','calfrise'],
};

function jSorenessColor(l){ return ['','#5bb8a0','#e8c547','#e05c3a'][l]||'#444'; }
function jSorenessLabel(l){ return ['','Hafif','Orta','Şiddetli'][l]||''; }


const CHECKIN_KEY  = 'fl7_checkin_date';    // son check-in tarihi

function getSorenessLog(){ return ld(SORENESS_KEY, {}); }
function saveSorenessLog(d){ sv(SORENESS_KEY, d); }

// Bugünkü ağrı seviyelerini getir
function getTodaySoreness(){
  const log = getSorenessLog();
  return log[td()] || {};
}

// Bir kasın son N gündeki toplam ağrı yükü
function getMuscleLoad(muscleShortId, days){
  const log = getSorenessLog();
  const today = new Date();
  let total = 0;
  for(let i=0; i<days; i++){
    const d = new Date(today); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    if(log[key] && log[key][muscleShortId]) total += log[key][muscleShortId];
  }
  return total;
}

// Bugünkü plana göre hangi kasların çalışacağını bul
function getTodayPlanMuscles(){
  const today = td();
  const activePlan = racePlans.find(r=>r.raceDate>=today);
  let muscles = { primary:[], secondary:[] };
  if(activePlan){
    const wk = activePlan.weeks.find(w=>wkDates(w.startDate).includes(today));
    if(wk){
      const day = wk.days.find(d=>d.date===today);
      if(day && day.type && day.type!=='rest'){
        const m = EXERCISE_MUSCLES[day.type];
        if(m){ muscles.primary=m.primary; muscles.secondary=m.secondary; }
      }
    }
  }
  return muscles;
}

// Ağrı seviyesine göre renk
function sorenessColor(level){
  return ['','#5bb8a0','#e8c547','#e05c3a'][level] || '#444';
}
function sorenessEmoji(level){
  return ['—','1','2','3'][level] || '—';
}
function sorenessLabel(level){
  return ['Yok','Hafif Ağrı','Orta Ağrı','Şiddetli Ağrı'][level] || '';
}




const API_KEY_STORE='fl7_api_key';

// ── HAVA DURUMU SİSTEMİ (Open-Meteo — ücretsiz, key gerektirmez) ──────────
const WX_CACHE = {}; // Her açılışta temizlenir — güncel hava durumu alınır
const WX_ICONS = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'🌨️', 73:'🌨️', 75:'❄️',

  95:'⛈️', 96:'⛈️', 99:'⛈️',
};
async function wxGeocode(city){
  if(WX_CACHE['geo:'+city]) return WX_CACHE['geo:'+city];
  try{
    const r=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(city)+'&count=1&language=tr&format=json');
    const d=await r.json();
    const res=d.results?.[0];
    if(!res) return null;
    const geo={lat:res.latitude,lon:res.longitude};
    WX_CACHE['geo:'+city]=geo;
    return geo;
  }catch(e){return null;}
}
async function wxForecast(city, date){
  const key=city+'|'+date;
  if(WX_CACHE[key]) return WX_CACHE[key];
  const geo=await wxGeocode(city);
  if(!geo) return null;
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+geo.lat+'&longitude='+geo.lon
      +'&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&start_date='+date+'&end_date='+date);
    const d=await r.json();
    if(!d.daily?.temperature_2m_max?.[0]) return null;
    const wx={
      max:Math.round(d.daily.temperature_2m_max[0]),
      min:Math.round(d.daily.temperature_2m_min[0]),
      icon:WX_ICONS[d.daily.weathercode[0]]||'🌡️'
    };
    WX_CACHE[key]=wx;
    return wx;
  }catch(e){return null;}
}
// Tüm hafta günleri için hava durumu yükle ve hücreleri güncelle
async function loadWeatherForWeeks(){
  const HOME_CITY=localStorage.getItem('fl7_home_city')||'Kuşadası';
  const tasks=[];

  // Aktif planın yakın haftalardaki tüm günleri
  const activePlan=racePlans.find(r=>r.raceDate>=td());
  if(activePlan){
    const todayStr=td();
    activePlan.weeks
      .filter(wk=>wk.days.some(d=>d.date>=todayStr))
      .slice(0,6) // önümüzdeki 6 hafta
      .forEach(wk=>{
        wk.days.forEach(day=>{
          // Tüm günler (dinlenme dahil)
          const planId=activePlan.id;
          const weekNum=wk.weekNum;
          const noteKey='fl7_wkplan_'+planId+'_'+weekNum+'_days';
          let city=HOME_CITY;
          try{
            const notes=JSON.parse(localStorage.getItem(noteKey)||'{}');
            const d=notes[day.date];
            if(d && typeof d==='object' && d.city) city=d.city;
          }catch(e){}
          tasks.push({date:day.date, city});
        });
      });
  }

  // Benzersiz city+date çiftleri
  const unique=[...new Map(tasks.map(t=>[t.city+'|'+t.date,t])).values()];
  await Promise.all(unique.map(async t=>{
    const wx=await wxForecast(t.city,t.date);
    if(wx){
      const el=document.getElementById('wx-'+t.date);
      if(el) el.innerHTML=wx.icon+' '+wx.max+'°/'+wx.min+'°';
    }
  }));
}

async function claudeFetch(promptText, maxTokens){
  var key=getApiKey();
  if(!key){ key=await askForApiKey(); if(!key) return null; }
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:maxTokens||800,messages:[{role:'user',content:promptText}]})
    });
    var json=await res.json();
    console.log('claudeFetch status:', res.status, 'response:', JSON.stringify(json).slice(0,300));
    if(res.status===401){ localStorage.removeItem(API_KEY_STORE); throw new Error('API anahtari gecersiz (401). Yeni anahtar gir.'); }
    if(res.status===403){ throw new Error('Erisim reddedildi (403). CORS sorunu olabilir.'); }
    if(json.error){ throw new Error('API Hatasi: '+json.error.type+' - '+json.error.message); }
    return json;
  }catch(e){
    console.error('claudeFetch error:', e);
    throw e;
  }
}

// RACE PLAN ENGINE
// ══════════════════════════════════════════════════════════

// Pace hesaplama: 2:00 HM hedefi = 5:41 dk/km
// Buna göre tüm zonelerı hesapla
function calcPaces(goalPacePerKm){
  // goalPacePerKm = dakika cinsinden (ör: 5.68 = 5:41/km)
  return {
    easy:   goalPacePerKm * 1.20,  // %20 yavaş
    long:   goalPacePerKm * 1.15,  // %15 yavaş
    tempo:  goalPacePerKm * 0.95,  // %5 hızlı
    interval: goalPacePerKm * 0.85,// %15 hızlı (5K pace)
    hill:   goalPacePerKm * 1.05,  // effort bazlı
    race:   goalPacePerKm
  };
}

function minToPaceStr(mins){
  var m=Math.floor(mins);
  var s=Math.round((mins-m)*60);
  if(s>=60){m+=1;s=0;}
  return m+":"+(s<10?"0":"")+s;
}

// 16 haftalık HM planı üret
// ── VDOT-based pace estimation ──────────────────────────────
// Riegel formula: T2 = T1 × (D2/D1)^1.06
function riegelPredict(knownTimeMins, knownDist, targetDist){
  return knownTimeMins * Math.pow(targetDist/knownDist, 1.06);
}

// Convert range string to midpoint minutes
function rangeToMins(val, dist){
  const maps = {
    hm: {"none":null,"2:30+":155,"2:10-2:30":140,"1:55-2:10":122,"1:45-1:55":110,"1:45-":101},
    "10k": {"none":null,"60+":63,"55-60":57.5,"50-55":52.5,"45-50":47.5,"45-":43},
    "5k": {"none":null,"35+":37,"30-35":32.5,"27-30":28.5,"24-27":25.5,"24-":22.5}
  };
  return maps[dist]?.[val] ?? null;
}

// Estimate current HM capacity from all available data → return minutes
// Inputs are now raw minutes (numbers) or null
function estimateCurrentCapacity(config){
  const {best_hm, best_10k, best_5k} = config;
  const estimates = [];
  const weights = [];

  // Direct HM time — most reliable (weight 3)
  if(best_hm && best_hm > 0){
    estimates.push(best_hm);
    weights.push(3);
  }
  // 10K prediction via Riegel (weight 2)
  if(best_10k && best_10k > 0){
    estimates.push(riegelPredict(best_10k, 10, 21.1));
    weights.push(2);
  }
  // 5K prediction via Riegel (weight 1)
  if(best_5k && best_5k > 0){
    estimates.push(riegelPredict(best_5k, 5, 21.1));
    weights.push(1);
  }

  if(!estimates.length) return null;
  // Weighted average
  const totalW = weights.reduce((s,w)=>s+w,0);
  return estimates.reduce((s,v,i)=>s+v*weights[i],0) / totalW;
}

// Gap analysis: how ambitious is the goal vs current capacity
function analyzeGap(currentMins, goalMins){
  if(!currentMins) return {level:"unknown", pct:0, label:"Bilinmiyor"};
  const pct = (currentMins - goalMins) / currentMins * 100;
  if(pct <= 0)  return {level:"easy",       pct, label:"Mevcut seviyende veya daha iyi"};
  if(pct <= 3)  return {level:"realistic",  pct, label:"Gerçekçi — %3 gelişim"};
  if(pct <= 7)  return {level:"stretch",    pct, label:"Zorlu ama mümkün — %7 gelişim"};
  if(pct <= 12) return {level:"ambitious",  pct, label:"Çok zorlu — %12 gelişim gerekli"};
  return          {level:"unrealistic",  pct, label:"Çok iddialı — süre uzatılması önerilir"};
}

function generateRacePlan(config){
  const {raceDate, raceName, raceType, goalTime, currentLevel, daysPerWeek,
         best_hm, best_10k, best_5k,
         sessionDuration, longRunDay,
         squat1rm, squat1rmTarget, bench1rm, deadlift1rm, ohp1rm,
         pullupMax, muscleupLevel, muscleupTarget} = config;
  const today = td();
  const totalDays = diffDays(today, raceDate);
  const totalWeeks = Math.min(16, Math.max(4, Math.floor(totalDays/7)));

  // Hedef pace hesapla (HM = 21.1km)
  const [gh, gm] = goalTime.split(":").map(Number);
  const goalMinutes = gh*60 + gm;
  const goalPace = goalMinutes / 21.1; // dk/km

  // Mevcut kapasite tahmini (VDOT/Riegel)
  const currentCapacityMins = estimateCurrentCapacity({best_hm, best_10k, best_5k});
  const currentPace = currentCapacityMins ? currentCapacityMins / 21.1 : goalPace * 1.10;
  const gap = analyzeGap(currentCapacityMins, goalMinutes);

  // Pace zonelerı: hedeften değil, MEVCUT kapasiteden hesapla (daha güvenli adaptasyon)
  // Eğitim paceleri mevcut seviyeye, yarış pacei hedefe göre
  const trainingBasePace = Math.max(currentPace, goalPace); // daha yavaş olan baz
  const paces = calcPaces(trainingBasePace);
  paces.race = goalPace; // yarış pace hedef

  // Haftalık km başlangıç & peak — gape göre konservatif veya agresif
  const levelBaseKm = {beginner:18, intermediate:28, regular:38, advanced:48};
  const baseKm = levelBaseKm[currentLevel] || 25;
  const gapMultiplier = gap.level==="unrealistic"?1.0:gap.level==="ambitious"?1.1:gap.level==="stretch"?1.2:1.15;
  const peakKm = Math.min(baseKm * gapMultiplier * 1.6, 65);

  // Gün ataması: daysPerWeeke göre hangi günler koşu
  const runDayPatterns = {
    2: [1,4],           // Salı, Cuma
    3: [1,3,5],         // Sal, Per, Cmt
    4: [1,3,5,6],       // Sal, Per, Cmt, Paz
    5: [0,1,3,4,6],     // Pzt, Sal, Per, Cum, Paz
  };
  const runDays = runDayPatterns[daysPerWeek] || runDayPatterns[3];
  // Kuvvet günleri: koşu günleri dışındaki günler (max 2)
  const allDays = [0,1,2,3,4,5,6];
  const strengthDays = allDays.filter(d=>!runDays.includes(d)).slice(0,2);
  // Uzun koşu günü: kullanıcı tercihi (longRunDay) veya son koşu günü
  const preferredLongDay = longRunDay !== undefined ? parseInt(longRunDay) : null;
  const longDayIdx = preferredLongDay !== null && runDays.includes(preferredLongDay)
    ? preferredLongDay
    : runDays[runDays.length-1];

  const weeks = [];
  const planStart = wkStart(today);

  for(let w=0; w<totalWeeks; w++){
    const wkDate = addDays(planStart, w*7);
    const wkNum = w+1;
    const isLastWeek = w === totalWeeks-1;
    const isTaperWeek = w >= totalWeeks-2;
    const isBuildPhase = w < totalWeeks/2;

    // Km progression: build → peak → taper
    let wkKm;
    if(isLastWeek){ wkKm = baseKm * 0.4; }
    else if(isTaperWeek){ wkKm = peakKm * 0.6; }
    else if(w % 4 === 3){ wkKm = baseKm + (peakKm-baseKm) * (w/totalWeeks) * 0.7; } // deload
    else { wkKm = baseKm + (peakKm-baseKm) * (w/(totalWeeks-3)); }
    wkKm = Math.round(wkKm);

    // Hafta içi antrenman tipi — bilimsel periodizasyon
    const sessionTypes = [];
    const numRuns = runDays.length;

    if(isLastWeek){
      // Yarış haftası: kolay + toparlanma + yarış
      runDays.forEach((d,i)=>{
        if(i===numRuns-1) sessionTypes.push("race");
        else if(i===numRuns-2) sessionTypes.push("strides"); // son hızlanma aktivasyonu
        else sessionTypes.push("recovery");
      });
    } else if(isTaperWeek){
      // Taper: hacim düşük, kalite korunur
      runDays.forEach((d,i)=>{
        if(d===longDayIdx) sessionTypes.push("long");
        else if(i===1) sessionTypes.push("tempo");
        else sessionTypes.push("easy");
      });
    } else {
      // 80/20 prensibi: haftada max 1-2 kaliteli seans
      // Baz fazı (ilk yarı): aerobik baz + fartlek intro
      // Gelişim fazı (ikinci yarı): tempo + interval yoğunlaşır
      const qualityDay1 = isBuildPhase ? "fartlek" : "tempo";
      const qualityDay2 = isBuildPhase ? "interval" : "interval";
      // Tepe koşusu: her 3 haftada 1 (interval yerine)
      const useHill = (w%3===1);
      const actualQ2 = useHill ? "hill" : qualityDay2;
      // Progresyon koşusu: her 4 haftada 1 uzun koşu içine
      const useProg = (w%4===2);

      runDays.forEach((d,i)=>{
        if(d===longDayIdx){
          sessionTypes.push(useProg ? "progression" : "long");
        } else if(i===1){
          sessionTypes.push(qualityDay1);
        } else if(i===2 && numRuns>=4){
          sessionTypes.push(actualQ2);
        } else {
          // Strides: kolay koşu sonuna eklenir, 2. haftadan itibaren
          sessionTypes.push(w>=2 && i===numRuns-2 ? "strides" : "easy");
        }
      });
    }

    // Mesafe dağılımı
    const distMap={};
    const longKm = isLastWeek ? 21.1 : Math.min(wkKm*0.35, 18);
    let remaining = wkKm - longKm;
    runDays.forEach((d,i)=>{
      const type = sessionTypes[i];
      if(type==="race") distMap[d] = 21.1;
      else if(type==="long") distMap[d] = Math.round(longKm*10)/10;
      else{
        const share = remaining/(numRuns-1);
        distMap[d] = Math.round(share*10)/10;
      }
    });

    // Gün verilerini oluştur
    const days=[];
    for(let d=0;d<7;d++){
      const date = addDays(wkDate,d);
      const runIdx = runDays.indexOf(d);
      if(runIdx>=0){
        const type = sessionTypes[runIdx];
        const dist = distMap[d] || 0;
        const pace = paces[type] || goalPace;
        const description = getSessionDesc(type, dist, pace, paces, w, totalWeeks);

        // Sadece koşu: tek seans, S2 yok
        let sessions = [{type, dist, pace: minToPaceStr(pace), description,
          duration: estimateSessionDuration(type, dist)}];

        days.push({date, type, dist, pace: minToPaceStr(pace), description, done: false, sessions});
      } else if(!isTaperWeek && strengthDays.includes(d)){
        // Kuvvet günü: S1 kuvvet + S2 metcon veya calisthenics
        const strSession = getStrengthSession(w, totalWeeks, config);
        // Haftada max 2 metcon — hafta içi metcon sayacı
        const metconCount = days.filter(dy=>dy.sessions&&dy.sessions.some(s=>s.type==='metcon')).length;
        const s2 = (config.sessionDuration||60)>=60
          ? (metconCount<2 && w%2===1
              ? getMetconSession(w, totalWeeks, config)
              : getCalisthenicsSession(w, totalWeeks, config))
          : null;
        const strSessions = [{
          type:'strength', dist:0, pace:null,
          label: strSession.label,
          description: strSession.description,
          duration: Math.min((config.sessionDuration||60)-20, 50)
        }];
        if(s2) strSessions.push({...s2, isS2:true});
        days.push({date, type:'strength', dist:0, pace:null,
          description: strSession.description, done:false, sessions:strSessions});
      } else {
        days.push({date, type:"rest", dist:0, pace:null, description:"Dinlenme veya aktif toparlanma", done:false});
      }
    }

    weeks.push({
      weekNum: wkNum,
      startDate: wkDate,
      totalKm: Math.round(days.reduce((s,d)=>s+d.dist,0)*10)/10,
      phase: isLastWeek?"Yarış Haftası":isTaperWeek?"Taper":isBuildPhase?"Baz":"Gelişim",
      days
    });
  }

  // Add recovery and strides paces
  paces.recovery = goalPace * 1.35;
  paces.strides = goalPace * 0.78;

  return {
    id: Date.now().toString(),
    raceName,
    raceDate,
    goalTime,
    goalPace: minToPaceStr(goalPace),
    paces: Object.fromEntries(Object.entries(paces).map(([k,v])=>[k,minToPaceStr(v)])),
    totalWeeks,
    currentLevel,
    daysPerWeek,
    createdAt: today,
    weeks,
    // Performance data
    perfData: {
      best_hm, best_10k, best_5k,
      squat1rm, squat1rmTarget, bench1rm, deadlift1rm, ohp1rm,
      pullupMax, muscleupLevel, muscleupTarget,
      sessionDuration: sessionDuration||60,
      longRunDay: longRunDay||6,
    },
    currentCapacityMins,
    currentPacePKm: minToPaceStr(currentPace),
    gap,
    revisions: []
  };
}

function estimateSessionDuration(type, dist){
  if(type==='rest') return 0;
  if(dist>0) return Math.round(dist*(type==='easy'?8:type==='tempo'?6:7)+10);
  return type==='strength'?50:type==='calisthenics'?30:45;
}

function getCalisthenicsSession(weekNum, totalWeeks, config){
  const mu=config.muscleupLevel||'none';
  const pullup=parseInt(config.pullupMax||0);
  const phase=weekNum/totalWeeks;
  if(mu==='none'||pullup<5){
    return {type:'calisthenics',label:'Temel Çekiş',duration:25,
      description:'Bant pull-up 4×6, inverted row 3×10, scapular pull 3×12'};
  } else if(mu==='kipping'){
    return {type:'calisthenics',label:'Strict Geliştirme',duration:30,
      description:'Strict pull-up 4×max, negative MU 3×3, ring support 3×20sn'};
  } else {
    const reps=phase<0.5?'2×3':'3×'+Math.min(5,Math.floor(phase*8));
    return {type:'calisthenics',label:'Muscle-up Prog.',duration:30,
      description:`Strict MU ${reps}, weighted pull-up 3×5, L-sit 3×15sn`};
  }
}

function getStrengthSession(weekNum, totalWeeks, config){
  const phase=weekNum/totalWeeks;
  const sq=parseFloat(config.squat1rm)||0;
  const bp=parseFloat(config.bench1rm)||0;
  const dl=parseFloat(config.deadlift1rm)||0;
  const ohp=parseFloat(config.ohp1rm)||0;
  const pct=phase<0.3?0.65:phase<0.6?0.75:phase<0.85?0.85:0.70;
  function w(kg){return kg>0?Math.round(kg*pct/2.5)*2.5+'kg':'ağırlık seç';}
  const isLower=weekNum%2===0;
  if(isLower){
    return {label:'Alt Vücut Kuvvet',
      description:`Back Squat 4×5 @${w(sq)} · RDL 3×8 @${w(dl*0.7)} · Bulgarian SS 3×8`,
      cali:getCalisthenicsSession(weekNum,totalWeeks,config)};
  } else {
    return {label:'Üst Vücut Kuvvet',
      description:`Bench Press 4×5 @${w(bp)} · OHP 3×6 @${w(ohp)} · Barbell Row 3×8 @${w(bp*0.7)}`,
      cali:getCalisthenicsSession(weekNum,totalWeeks,config)};
  }
}

function getSessionDesc(type, dist, pace, paces, weekNum, totalWeeks){
  const ps = minToPaceStr(pace);
  const easyPs = minToPaceStr(paces.easy);
  const longPs = minToPaceStr(paces.long);
  const tempoPs = minToPaceStr(paces.tempo);
  const intPs = minToPaceStr(paces.interval);
  switch(type){
    case "easy":
      return `${dist} km kolay koşu @ ${ps}/km. Konuşabilir tempo (KAH %65-75). Aerobik baz ve toparlanma. Nefes kontrolü: yanındakiyle rahat konuşabilmelisin.`;
    case "recovery":
      return `${dist} km aktif toparlanma @ ${easyPs}/km veya daha yavaş. Çok hafif tempo, kas kan dolaşımını destekler. Yürüyüş hızına yakın.`;
    case "long": {
      const seg1 = Math.round(dist*0.7*10)/10;
      const seg2 = Math.round(dist*0.3*10)/10;
      return `${dist} km uzun koşu. İlk ${seg1} km @ ${longPs}/km (kolay), son ${seg2} km @ ${tempoPs}/km (orta). Glikojen depoları ve dayanıklılık için. Son bölüm yarış pace'ini simüle eder.`;
    }
    case "progression": {
      const seg1 = Math.round(dist/3*10)/10;
      const seg2 = Math.round(dist/3*10)/10;
      const seg3 = Math.round(dist - seg1 - seg2 + dist/3*10/10*0.1);
      return `${dist} km progresyon koşusu. Bölüm 1: ${seg1} km @ ${easyPs}/km (kolay) → Bölüm 2: ${seg2} km @ ${longPs}/km (orta) → Bölüm 3: ${seg3} km @ ${tempoPs}/km (tempo). Negatif split pratiği, yarış sonuna güç biriktirir.`;
    }
    case "tempo": {
      const warmup = Math.min(1.5, dist*0.2);
      const main = Math.round((dist - warmup*2)*10)/10;
      return `${dist} km tempo koşusu. ${warmup} km ısınma (kolay) + ${main} km @ ${ps}/km (laktat eşiği) + ${warmup} km soğuma. KAH %85-90. Kısa cümleler kurabilmelisin, tam konuşamıyorsun. LT gelişimi için en kritik antrenman.`;
    }
    case "fartlek": {
      const reps = weekNum < 5 ? 5 : weekNum < 9 ? 6 : 8;
      return `${dist} km fartlek. 1 km ısınma + ${reps}×(1 dk @ ${intPs}/km hızlı · 2 dk @ ${easyPs}/km kolay) + 1 km soğuma. Hisse göre koş, pace'e takılma. LT ve VO2max'ı birlikte geliştirir.`;
    }
    case "interval": {
      const reps = weekNum < 5 ? 4 : weekNum < 9 ? 5 : 6;
      const repDist = weekNum < 8 ? "600m" : "800m";
      return `${dist} km interval. 1.5 km ısınma + ${reps}×${repDist} @ ${ps}/km (${Math.round(parseFloat(repDist)/1000/pace*60)} dk · 400m yürüyüş arası) + 1 km soğuma. KAH %90-100. VO2max için maksimum uyaran. Her rep sonrası tam toparlanma bekle.`;
    }
    case "hill": {
      const reps = weekNum < 6 ? 6 : 8;
      return `${dist} km tepe koşusu. 1 km ısınma + ${reps}×200m tepe sprint (maksimum effort, iniş yürüyerek toparlan) + 1 km soğuma. Bacak kuvveti, koşu formu ve koşu ekonomisi için. Kol hareketi ve dik duruşa dikkat.`;
    }
    case "strides": {
      const strideCount = 4;
      return `${dist} km kolay koşu + ${strideCount}×20 sn strides. Ana koşudan sonra ${strideCount} kez 20 saniye kontrollü hızlanma (sprint değil, %85 effort) + 60 sn yürüyüş arası. Nöromusküler aktivasyon ve koşu ekonomisi için kritik.`;
    }
    case "race":
      return `🏆 YARIŞ GÜNÜ! 21.1 km @ ${ps}/km hedef pace. İlk 5 km sakin başla, orta bölüm hedef pace, son 5 km güç varsa artır. Başarılar!`;
    default:
      return "Dinlenme veya hafif esnetme. Kas onarımı için önemli.";
  }
}

function renderRaceDashboard(plan){
  const today = td();
  const todayWk = plan.weeks.find(w=>wkDates(w.startDate).includes(today));
  const daysLeft = diffDays(today, plan.raceDate);
  const weeksLeft = Math.ceil(daysLeft/7);
  const totalSessions = plan.weeks.reduce((s,w)=>s+w.days.filter(d=>d.type!=="rest").length,0);
  const doneSessions = plan.weeks.reduce((s,w)=>s+w.days.filter(d=>d.done&&d.type!=="rest").length,0);
  const pct = totalSessions>0?Math.round(doneSessions/totalSessions*100):0;
  const totalKm = plan.weeks.reduce((s,w)=>s+w.totalKm,0);

  // Bugünkü antrenman

window.previewRevision = function(planId){
  const plan = racePlans.find(r=>r.id===planId);
  if(!plan) return;
  const newPd = {
    best_hm: parseTimeStr(document.getElementById("up-hm").value)||null,
    best_10k: parseTimeStr(document.getElementById("up-10k").value)||null,
    best_5k: parseTimeStr(document.getElementById("up-5k").value)||null,
  };
  const newCapacity = estimateCurrentCapacity(newPd);
  const [gh,gm] = plan.goalTime.split(":").map(Number);
  const goalMins = gh*60+gm;
  const newGap = analyzeGap(newCapacity, goalMins);
  const oldPace = plan.currentPacePKm || "—";
  const newPace = newCapacity ? minToPaceStr(newCapacity/21.1) : "—";
  const gapColor = newGap.level==="easy"||newGap.level==="realistic"?"#5bb8a0":
    newGap.level==="stretch"?"#e8c547":newGap.level==="ambitious"?"#ff7c43":"#e05c3a";

  document.getElementById("up-preview").innerHTML = `
    <div class="card" style="border-color:${gapColor}44;background:var(--bg3)">
      <div style="font-size:11px;color:var(--tx3);margin-bottom:8px">Revizyon önizlemesi</div>
      <div class="g2" style="gap:8px">
        <div class="csm" style="text-align:center">
          <div style="font-size:10px;color:var(--tx3);margin-bottom:3px">Önceki kapasite</div>
          <div style="font-size:15px;font-family:monospace;color:var(--tx2)">${oldPace}/km</div>
        </div>
        <div class="csm" style="text-align:center">
          <div style="font-size:10px;color:var(--tx3);margin-bottom:3px">Yeni kapasite</div>
          <div style="font-size:15px;font-family:monospace;color:${gapColor}">${newPace}/km</div>
        </div>
      </div>
      <div style="font-size:12px;color:${gapColor};margin-top:8px;font-weight:500">${newGap.label}</div>
      <div style="font-size:11px;color:var(--tx3);margin-top:4px">
        Antrenman pace'leri güncellenir. Tamamlanan seanslar korunur.
      </div>
    </div>`;
};

window.applyRevision = function(planId){
  const plan = racePlans.find(r=>r.id===planId);
  if(!plan) return;
  const newPd = {
    best_hm: parseTimeStr(document.getElementById("up-hm").value)||null,
    best_10k: parseTimeStr(document.getElementById("up-10k").value)||null,
    best_5k: parseTimeStr(document.getElementById("up-5k").value)||null,
  };
  const reason = document.getElementById("up-reason").value || "Performans verileri güncellendi";

  const newCapacity = estimateCurrentCapacity(newPd);
  const [gh,gm] = plan.goalTime.split(":").map(Number);
  const goalMins = gh*60+gm;
  const goalPace = goalMins/21.1;
  const newGap = analyzeGap(newCapacity, goalMins);
  const currentPace = newCapacity ? newCapacity/21.1 : goalPace*1.10;
  const trainingBasePace = Math.max(currentPace, goalPace);
  const newPaces = calcPaces(trainingBasePace);
  newPaces.race = goalPace;
  newPaces.recovery = goalPace*1.35;
  newPaces.strides = goalPace*0.78;

  // Update plan paces
  plan.perfData = newPd;
  plan.currentCapacityMins = newCapacity;
  plan.currentPacePKm = newCapacity ? minToPaceStr(currentPace) : null;
  plan.gap = newGap;
  plan.paces = Object.fromEntries(Object.entries(newPaces).map(([k,v])=>[k,minToPaceStr(v)]));

  // Update future sessions pace (keep done ones intact)
  const today = td();
  for(const wk of plan.weeks){
    for(const day of wk.days){
      if(day.date <= today || day.done || day.type==="rest") continue;
      const p = newPaces[day.type];
      if(p){
        day.pace = minToPaceStr(p);
        // Regenerate description with new pace
        day.description = getSessionDesc(day.type, day.dist, p, newPaces, wk.weekNum, plan.totalWeeks);
      }
    }
  }

  // Log revision
  if(!plan.revisions) plan.revisions = [];
  plan.revisions.push({
    date: today,
    reason,
    oldPace: plan.currentPacePKm,
    newPace: newCapacity ? minToPaceStr(currentPace) : "—",
    gap: newGap.label
  });

  saveR();
  closeModal();
  renderRaceDashboard(plan);
};

// Parse time string "H:MM:SS" or "MM:SS" → total minutes
function parseTimeStr(s){
  if(!s||!s.trim()) return null;
  const parts = s.trim().split(":").map(Number);
  if(parts.some(isNaN)||parts.some(p=>p<0)) return null;
  if(parts.length===3) return parts[0]*60 + parts[1] + parts[2]/60; // H:MM:SS
  if(parts.length===2) return parts[0] + parts[1]/60;               // MM:SS
  return null;
}

window.rpPacePreview = function(val, dist, color){
  const mins = parseTimeStr(val);
  const el = document.getElementById("rp-pace-preview");
  if(!el) return;
  if(!mins || mins<=0){
    el.innerHTML="";
    return;
  }
  const pace = mins/dist;
  const paceStr = minToPaceStr(pace);
  // Predict other distances via Riegel
  const hmMins = riegelPredict(mins, dist, 21.1);
  const tenMins = riegelPredict(mins, dist, 10);
  const fiveMins = riegelPredict(mins, dist, 5);
  const fmt = m => { const h=Math.floor(m/60); const mm=Math.floor(m%60); const ss=Math.round((m%1)*60);
    return h>0 ? h+":"+(("0"+mm).slice(-2))+":"+(("0"+ss).slice(-2)) : ("0"+mm).slice(-2)+":"+(("0"+ss).slice(-2)); };
  el.innerHTML=`
    <div style="display:inline-block;background:${color}18;border:1px solid ${color}44;border-radius:10px;padding:10px 16px;text-align:center">
      <div style="font-size:24px;font-family:monospace;font-weight:600;color:${color}">${paceStr}<span style="font-size:13px;margin-left:4px">dk/km</span></div>
      <div style="font-size:11px;color:var(--tx3);margin-top:6px;display:flex;gap:12px;justify-content:center">
        ${dist!==5?`<span>5K: ~${fmt(fiveMins)}</span>`:""}
        ${dist!==10?`<span>10K: ~${fmt(tenMins)}</span>`:""}
        ${dist!==21.1?`<span>HM: ~${fmt(hmMins)}</span>`:""}
      </div>
    </div>`;
};

// Riegel + VDOT tabanlı local tahmin
function calcLocalGoal(data, distKm, raceType){
  let baseTimeSec = null;
  let source = '';

  function timeStrToSec(t){
    if(!t||typeof t!=='number') return null;
    return t*60; // stored as minutes
  }

  // En iyi referans mesafeden tahmin et (Riegel: t2 = t1 * (d2/d1)^1.06)
  const refs=[
    {key:'best_hm', km:21.1},
    {key:'best_10k',km:10},
    {key:'best_5k', km:5},
  ];
  for(const ref of refs){
    const mins = data[ref.key];
    if(mins && typeof mins==='number' && mins>0){
      const sec = mins*60;
      const predicted = sec * Math.pow(distKm/ref.km, 1.06);
      // Antrenman faktorü: %8-12 iyileşme hedefle
      const improvement = data.currentLevel==='advanced'?0.95:data.currentLevel==='regular'?0.92:0.90;
      baseTimeSec = predicted * improvement;
      source = ref.key;
      break;
    }
  }

  // Referans yoksa seviyeye göre tahmin
  if(!baseTimeSec){
    const defaults={'5k':{'beginner':40,'intermediate':32,'regular':27,'advanced':23},
                    '10k':{'beginner':65,'intermediate':52,'regular':44,'advanced':38},
                    'hm':{'beginner':145,'intermediate':120,'regular':105,'advanced':92},
                    'marathon':{'beginner':310,'intermediate':260,'regular':225,'advanced':198}};
    const mins = (defaults[raceType]||defaults['hm'])[data.currentLevel||'intermediate']||120;
    baseTimeSec = mins*60;
    source='level';
  }

  function secToHMS(s){
    s=Math.round(s);
    const h=Math.floor(s/3600);
    const m=Math.floor((s%3600)/60);
    const sec=s%60;
    return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;
  }
  function secToPace(s,km){
    const ps=Math.round(s/km);
    return `${Math.floor(ps/60)}:${String(ps%60).padStart(2,'0')}/km`;
  }

  const realistic = baseTimeSec * 1.03;
  const stretch   = baseTimeSec * 0.97;
  const srcLabel  = {'best_hm':'YM derecene','best_10k':'10k derecene','best_5k':'5k derecene','level':'antrenman seviyene'}[source]||'verilerine';

  return {
    goalTime: secToHMS(baseTimeSec),
    goalPace: secToPace(baseTimeSec, distKm),
    realistic: secToHMS(realistic),
    stretch: secToHMS(stretch),
    explanation: `${srcLabel} göre hesaplandı. Bu hedef mevcut formundan %8-12 gelişim öngörüyor. Düzenli antrenmanla ulaşılabilir bir süre.`,
    weeklyKmTarget: data.currentLevel==='beginner'?35:data.currentLevel==='intermediate'?50:data.currentLevel==='regular'?65:80
  };
}

function buildProfileSummary(data){
  const lines=[];
  if(data.raceName)  lines.push(`Yarış: ${data.raceName} (${data.raceDate})`);
  if(data.raceType)  lines.push(`Mesafe: ${'hm'===data.raceType?'Yarı Maraton (21.1 km)':'marathon'===data.raceType?'Maraton (42.2 km)':data.raceType}`);
  if(data.best_hm)   lines.push(`En iyi YM: ${Math.floor(data.best_hm/60)}:${String(Math.round(data.best_hm%60)).padStart(2,'0')}`);
  if(data.best_10k)  lines.push(`En iyi 10k: ${Math.floor(data.best_10k/60)}:${String(Math.round(data.best_10k%60)).padStart(2,'0')}`);
  if(data.best_5k)   lines.push(`En iyi 5k: ${Math.floor(data.best_5k/60)}:${String(Math.round(data.best_5k%60)).padStart(2,'0')}`);
  if(data.currentLevel) lines.push(`Seviye: ${data.currentLevel}`);
  if(data.daysPerWeek)  lines.push(`Haftada ${data.daysPerWeek} gün antrenman`);
  return lines.join('\n');
}

window.saveRaceResult = function(planId){
  const val = gv('race-result-input').trim();
  if(!val){ alert('Dereceni gir (örn: 1:52:34)'); return; }
  const plan = racePlans.find(r=>r.id===planId);
  if(!plan) return;

  function hmsToSec(t){
    const p=t.split(':').map(Number);
    return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+(p[1]||0);
  }
  const distKm = {'5k':5,'10k':10,'hm':21.1,'marathon':42.2}[plan.raceType]||21.1;
  const sec = hmsToSec(val);
  const goalSec = hmsToSec(plan.goalTime||'99:00:00');
  const ps = Math.round(sec/distKm);
  const pace = `${Math.floor(ps/60)}:${String(ps%60).padStart(2,'0')}/km`;
  const diff = sec - goalSec;
  function secToHMS(s){
    s=Math.abs(Math.round(s));
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec2=s%60;
    return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sec2).padStart(2,'0')}`:`${m}:${String(sec2).padStart(2,'0')}`;
  }

  plan.finishTime  = val;
  plan.finishPace  = pace;
  plan.finishVsGoal= (diff<0?'-':'+')+secToHMS(diff);
  saveR();

  // raceEntries'e de kaydet
  const existing = raceEntries.findIndex(r=>r.raceDate===plan.raceDate&&r.raceName===plan.raceName);
  const entry={id:Date.now().toString(),raceName:plan.raceName,raceDate:plan.raceDate,
    raceType:plan.raceType,goalTime:plan.goalTime,finishTime:val,_type:'entry'};
  if(existing>=0) raceEntries[existing]=entry; else raceEntries.push(entry);
  saveRE();

  renderRaceDashboard(plan);
  // Tebrik modalı
  setTimeout(()=>{
    showModal(`<div class="mod" onclick="event.stopPropagation()" style="max-width:420px;text-align:center">
      <div style="font-size:48px;margin-bottom:12px">🏆</div>
      <div style="font-size:20px;font-weight:800;margin-bottom:6px">${val}</div>
      <div style="font-size:14px;color:var(--tx2);margin-bottom:4px">${pace}</div>
      <div style="font-size:13px;color:${diff<0?'#1a8a6a':'#c0392b'};font-weight:600;margin-bottom:16px">
        ${diff<0?'🚀 Hedefin '+secToHMS(diff)+' altında!':'Hedefin '+secToHMS(diff)+' üstünde'}
      </div>
      <div style="font-size:12px;color:var(--tx3);margin-bottom:16px">${plan.raceName} — ${plan.raceDate}</div>
      <button class="btn btnp" onclick="closeModal()" style="width:100%;justify-content:center">Harika! 🎉</button>
    </div>`);
  }, 200);
};

window.markDone=function(planId, date){
  const plan = racePlans.find(r=>r.id===planId);
  if(!plan) return;
  for(const wk of plan.weeks){
    const day=wk.days.find(d=>d.date===date);
    if(day){day.done=!day.done;break;}
  }
  saveR();
  renderRaceDashboard(plan);
};

// Auto-mark plan day done when FIT is saved for that date
function autoMarkPlanDay(date){
  let marked=false;
  let markedPlan=null;
  for(const plan of racePlans){
    for(const wk of plan.weeks){
      const day=wk.days.find(d=>d.date===date&&d.type!=="rest"&&d.type!=="race");
      if(day&&!day.done){
        day.done=true;
        marked=true;
        markedPlan=plan;
      }
    }
  }
  if(marked){
    saveR();
    // Force race screen to refresh if its active, or mark for refresh
    window._racePlanNeedsRefresh=true;
  }
  return marked;
}

window.showDayDetail=function(planId,date){
  const plan=racePlans.find(r=>r.id===planId);
  if(!plan) return;
  let day=null, weekNum=null;
  for(const wk of plan.weeks){
    const d=wk.days.find(d=>d.date===date);
    if(d){day=d;weekNum=wk.weekNum;break;}
  }
  if(!day) return;

    showStrengthDayDetail(encodeURIComponent(JSON.stringify(entry)),date);
    return;

  const c=RT_COLOR[day.type];
  const sci=RT_SCIENCE[day.type]||{};
  const icon=RT_ICON[day.type]||"ti-run";

  parts.push('<div>');
  parts.push('<div style="font-size:14px;font-weight:600;color:'+c+'">'+(day.type==='metcon'?'🏨 METCON — Bodyweight':RT_LABEL[day.type]+' — '+day.dist+' km')+'</div>');
  parts.push('<div class="mu" style="font-size:11px;margin-top:1px">'+day.date+' · Hafta '+weekNum+' · '+(sci.zone||"")+'</div>');
  parts.push('</div></div>');
  parts.push('<button class="btn btns" onclick="closeModal()">✕</button></div>');

  // Plan metrics
  parts.push('<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px">');
  parts.push('<div class="csm" style="text-align:center"><div style="font-size:9px;color:var(--tx3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.07em">Hedef pace</div>');
  parts.push('<div style="font-size:15px;font-family:monospace;font-weight:600;color:'+c+'">'+day.pace+'<span style="font-size:10px">/km</span></div></div>');
  parts.push('<div class="csm" style="text-align:center"><div style="font-size:9px;color:var(--tx3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.07em">Mesafe</div>');
  parts.push('<div style="font-size:15px;font-family:monospace;font-weight:600;color:'+c+'">'+day.dist+'<span style="font-size:10px">km</span></div></div>');
  parts.push('<div class="csm" style="text-align:center"><div style="font-size:9px;color:var(--tx3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.07em">KAH hedef</div>');
  parts.push('<div style="font-size:13px;font-weight:500;color:'+c+'">'+(sci.hr||"—")+'</div></div>');
  parts.push('</div>');

  // Description
  parts.push('<div class="card" style="border-color:'+c+'22;background:var(--bg3);margin-bottom:10px">');
  parts.push('<div style="font-size:10px;color:var(--tx3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em">Antrenman planı</div>');
  if(day.type==='metcon'){
    const exercises = day._metconProgram || [];
    const wodName = day._metconName || 'Otel Odası Bodyweight WOD';
    const wodFormat = day._metconFormat || 'For Time';
    const wodNote = day._metconNote || 'Ekipman gerektirmez.';
    parts.push('<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
      +'<span style="font-size:22px">🏨</span>'
      +'<div><div style="font-size:13px;font-weight:700;color:#ec4899">'+wodName+'</div>'
      +'<div style="font-size:11px;color:rgba(236,72,153,.7);margin-top:1px">'+wodFormat+'</div></div>'
      +'</div>');
    parts.push('<div style="display:grid;gap:4px;margin-bottom:8px">');
    exercises.forEach(ex=>{
      const repStr = ex.sets ? ex.sets+'  ·  '+ex.reps : ex.reps;
      parts.push('<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:rgba(236,72,153,.08);border-radius:7px;border:1px solid rgba(236,72,153,.2)">'
        +'<span style="font-size:12px;color:var(--tx)">'+ex.name+'</span>'
        +'<span style="font-size:12px;font-weight:700;color:#ec4899;font-family:monospace">'+repStr+'</span>'
        +'</div>');
    });
    parts.push('</div>');
    parts.push('<div style="font-size:11px;color:var(--tx3);padding:6px 10px;background:var(--bg3);border-radius:6px">'+wodNote+'</div>');
  } else if(day.type==='strength' && day._salonProgram){
    const salonName = day._salonName || 'Salon Antrenmanı';
    const salonColor = '#a78bfa';
    parts.push('<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
      +'<span style="font-size:22px">🏋️</span>'
      +'<div><div style="font-size:13px;font-weight:700;color:'+salonColor+'">'+salonName+'</div>'
      +'<div style="font-size:11px;color:rgba(167,139,250,.7);margin-top:1px">Spor Salonu · Seyahat</div></div>'
      +'</div>');
    parts.push('<div style="display:grid;gap:4px;margin-bottom:8px">');
    day._salonProgram.forEach(ex=>{
      parts.push('<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:rgba(167,139,250,.08);border-radius:7px;border:1px solid rgba(167,139,250,.2)">'
        +'<span style="font-size:12px;color:var(--tx)">'+ex.name+'</span>'
        +'<span style="font-size:12px;font-weight:700;color:'+salonColor+';font-family:monospace">'+ex.reps+'</span>'
        +'</div>');
    });
    parts.push('</div>');
    parts.push('<div style="font-size:11px;color:var(--tx3);padding:6px 10px;background:var(--bg3);border-radius:6px">Seyahatte spor salonu fırsatını değerlendir. Tam ısınma yap.</div>');
  } else {
    parts.push('<div style="font-size:12px;line-height:1.7;color:var(--tx)">'+day.description+'</div>');
    if(sci.feel) parts.push('<div style="font-size:11px;color:var(--tx3);margin-top:6px;font-style:italic">'+sci.feel+'</div>');
  }
  parts.push('</div>');

  // FIT comparison section
  if(fitLog){
    const fd=fitLog.runData||{};
    const fi=fitLog.fitData||{};

    const planPaceMin=parseFloat(day.pace.split(":")[0])+(parseFloat(day.pace.split(":")[1]||0)/60);
    const actualPaceStr=fd.pace||"—";
    const actualPaceMin=fd.pace?parseFloat(fd.pace.split(":")[0])+(parseFloat(fd.pace.split(":")[1]||0)/60):null;
    const paceDiffSec=actualPaceMin?Math.round((actualPaceMin-planPaceMin)*60):null;
    const paceColor=paceDiffSec===null?"var(--tx3)":paceDiffSec<=-5?"#5bb8a0":paceDiffSec<=5?"#e8c547":"#e05c3a";
    const paceLbl=paceDiffSec===null?"":paceDiffSec<=-5?"Hedefin üstünde 🔥":paceDiffSec<=5?"Hedefe yakın ✓":"Hedefin altında";

    const planDist=day.dist;
    const actualDist=parseFloat(fd.distance||0);
    const distDiff=actualDist>0?Math.round((actualDist-planDist)*100)/100:null;
    const distColor=distDiff===null?"var(--tx3)":distDiff>=-0.2?"#5bb8a0":"#ff7c43";

    parts.push('<div style="border-top:1px solid var(--bd);margin:0 0 10px;padding-top:10px">');
    parts.push('<div class="fc gap6 mb10">');
    parts.push('<i class="ti ti-watch" style="color:#e8c547;font-size:14px"></i>');
    parts.push('<div style="font-size:13px;font-weight:600">Suunto — Gerçek vs Plan</div>');
    parts.push('<span class="tag" style="margin-left:auto;background:#5bb8a022;color:#5bb8a0"><i class="ti ti-check" style="font-size:11px"></i> Yüklü</span>');
    parts.push('</div>');

    // Pace + distance grid
    parts.push('<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">');

    // Pace card
    parts.push('<div class="csm">');
    parts.push('<div style="font-size:9px;color:var(--tx3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">Pace</div>');
    parts.push('<div style="display:flex;align-items:center;justify-content:space-between">');
    parts.push('<div><div style="font-size:9px;color:var(--tx3)">Plan</div><div style="font-size:14px;font-family:monospace;color:'+c+'">'+day.pace+'</div></div>');
    parts.push('<div style="color:var(--tx3)">→</div>');
    parts.push('<div><div style="font-size:9px;color:var(--tx3)">Gerçek</div><div style="font-size:14px;font-family:monospace;color:'+paceColor+'">'+actualPaceStr+'</div></div>');
    parts.push('</div>');
    if(paceDiffSec!==null){
      parts.push('<div style="font-size:11px;color:'+paceColor+';margin-top:5px">'+paceLbl+'</div>');
      parts.push('<div style="font-size:10px;color:var(--tx3);margin-top:1px">'+Math.abs(paceDiffSec)+'sn '+(paceDiffSec>0?'yavaş':'hızlı')+'/km</div>');
    }
    parts.push('</div>');

    // Distance card
    parts.push('<div class="csm">');
    parts.push('<div style="font-size:9px;color:var(--tx3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">Mesafe</div>');
    parts.push('<div style="display:flex;align-items:center;justify-content:space-between">');
    parts.push('<div><div style="font-size:9px;color:var(--tx3)">Plan</div><div style="font-size:14px;font-family:monospace;color:'+c+'">'+planDist+' km</div></div>');
    parts.push('<div style="color:var(--tx3)">→</div>');
    parts.push('<div><div style="font-size:9px;color:var(--tx3)">Gerçek</div><div style="font-size:14px;font-family:monospace;color:'+distColor+'">'+(actualDist||"—")+' km</div></div>');
    parts.push('</div>');
    if(distDiff!==null) parts.push('<div style="font-size:10px;color:'+distColor+';margin-top:5px">'+(distDiff>=0?"+":"")+distDiff+' km fark</div>');
    parts.push('</div>');

    parts.push('</div>'); // end grid

    // Kalori + KAH
    var extraMetrics=[];
      if(fitLog.calories) extraMetrics.push({l:'Kalori',v:fitLog.calories,u:'kcal',c:'#e05c3a'});
      if(fd.hr_avg) extraMetrics.push({l:'Ort. KAH',v:fd.hr_avg+(fd.hr_max?' / maks '+fd.hr_max:''),u:'bpm',c:'#9b7fe8'});
      if(fi.vo2max) extraMetrics.push({l:'VO2max',v:fi.vo2max,u:'ml/kg/min',c:'#5bb8a0'});
      if(fi.elevation_gain) extraMetrics.push({l:'Yukselis',v:fi.elevation_gain,u:'m',c:'#ff7c43'});
      if(extraMetrics.length){
        var cols=extraMetrics.length>=4?'repeat(4,1fr)':Array(extraMetrics.length).fill('1fr').join(' ');
        parts.push('<div style="display:grid;grid-template-columns:'+cols+';gap:6px;margin-bottom:8px">');
        extraMetrics.forEach(function(m){
          parts.push('<div class="csm" style="text-align:center"><div style="font-size:9px;color:var(--tx3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">'+m.l+'</div>');
          parts.push('<div style="font-size:18px;font-family:monospace;font-weight:600;color:'+m.c+'">'+m.v+'</div>');
          parts.push('<div style="font-size:10px;color:var(--tx3)">'+m.u+'</div></div>');
        });
        parts.push('</div>');
      }

        // HR Zones
    if(fi.hrZones){
      const zc=["#5bb8a0","#a3d977","#e8c547","#ff7c43","#e05c3a"];
      const zl=["Z1 Dinlenme","Z2 Aerobik","Z3 Tempo","Z4 Eşik","Z5 Maks."];
      parts.push('<div style="margin-top:4px">');
      parts.push('<div style="font-size:9px;color:var(--tx3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em">KAH Zone Dağılımı</div>');
      fi.hrZones.forEach(function(p,i){
        parts.push('<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">');
        parts.push('<div style="font-size:10px;color:'+zc[i]+';width:70px;flex-shrink:0">'+zl[i]+'</div>');
        parts.push('<div style="flex:1;height:7px;background:var(--bg3);border-radius:3px;overflow:hidden">');
        parts.push('<div style="width:'+p+'%;height:100%;background:'+zc[i]+';border-radius:3px"></div></div>');
        parts.push('<div style="font-size:10px;color:var(--tx3);width:28px;text-align:right">'+p+'%</div>');
        parts.push('</div>');
      });
      parts.push('</div>');
    }

    parts.push('</div>'); // end comparison section
  }

  // Footer
  parts.push('<div class="fc gap8" style="justify-content:flex-end;flex-wrap:wrap;border-top:1px solid var(--bd);padding-top:10px;margin-top:4px">');
  if(day.type!=="rest"){
    const suuntoBg = day.suuntoSynced?"#5bb8a0":"#e8c547";
    const suuntoLbl = day.suuntoSynced?"🏔️ Suunto'ya Gönderildi ✓":isSuuntoConnected()?"🏔️ Suunto'ya Gönder":"📅 intervals.icu'ya Gönder";
    const suuntoClick = isSuuntoConnected()?"suuntoSendFromModal('"+planId+"','"+date+"')" : "icuSendFromModal('"+planId+"','"+date+"')";
    parts.push(
      '<button id="fl-suunto-btn"'
      +' onclick="'+suuntoClick+'"'
      +' style="width:100%;padding:9px;border-radius:8px;font-size:13px;font-weight:500;'
      +'background:'+suuntoBg+';color:#000;border:none;cursor:pointer;margin-bottom:8px;font-family:inherit">'
      +suuntoLbl
      +'</button>'
    );
  }
  parts.push('<button class="btn btns" onclick="closeModal()">Kapat</button>');
  if(!fitLog){
    parts.push('<button class="btn btns" style="border-color:#e8c54755;color:#e8c547" onclick="closeModal();showFitImport(\''+date+'\')"><i class="ti ti-watch"></i> FIT yükle</button>');
  } else {
    parts.push('<span style="font-size:11px;color:#5bb8a0;align-self:center"><i class="ti ti-check"></i> Suunto yüklü</span>');
  }
  parts.push('<button class="btn '+(day.done?'btnd':'btnp')+' btns" onclick="markDone(\''+planId+'\',\''+date+'\');closeModal()">');
  parts.push('<i class="ti ti-'+(day.done?'x':'check')+'"></i> '+(day.done?'İptal et':'Tamamlandı')+'</button>');
  parts.push('</div>');

  showModal('<div class="mod" onclick="event.stopPropagation()" style="max-width:500px">'+parts.join('')+'</div>');
};

function getPaceDesc(type){
  const s=RT_SCIENCE[type];
  if(!s)return"";
  return`<span style="color:var(--tx3)">${s.zone}</span> · <span style="color:${RT_COLOR[type]||"#888"}">${s.hr}</span><br/><span style="font-size:11px;color:var(--tx2)">${s.target}</span>`;
}

function renderDashboard(){
  const today=td();const tp=plans[today];
  const wd=wkDates(wkStart(today));
  const wl=logs.filter(l=>wd.includes(l.date));
  const ml=logs.filter(l=>l.date.slice(0,7)===today.slice(0,7));
  const wkm=wl.reduce((s,l)=>s+parseFloat(l.runData?.distance||0),0);
  const mkm=ml.reduce((s,l)=>s+parseFloat(l.runData?.distance||0),0);
  const wkcal=wl.reduce((s,l)=>s+parseFloat(l.calories||0),0);
  const d7=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(d.getDate()-6+i);const iso=d.toISOString().slice(0,10);return{day:DAYS[dow(iso)],kcal:Math.round(logs.filter(l=>l.date===iso).reduce((s,l)=>s+parseFloat(l.calories||0),0))};});
  const d7k=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(d.getDate()-6+i);const iso=d.toISOString().slice(0,10);return{day:DAYS[dow(iso)],km:parseFloat(logs.filter(l=>l.date===iso).reduce((s,l)=>s+parseFloat(l.runData?.distance||0),0).toFixed(1))};});
  const lr=logs.filter(l=>l.branch==="run"&&l.runData?.distance).sort((a,b)=>b.date.localeCompare(a.date))[0];
  const bc=BC[tp?.branch]||"rgba(255,255,255,.07)";

  // Kas haritası HTML
  const muscleSvgHTML = buildMuscleSvgHTML();
  const jointSvgHTML  = buildJointSvgHTML_svg();

  // Race plan today  // Race plan today
  const activePlan=racePlans.find(r=>r.raceDate>=today);
  let raceTodayHTML="";
  if(activePlan){
    const todayWk=activePlan.weeks.find(w=>wkDates(w.startDate).includes(today));
    if(todayWk){
      const dayDow=dow(today);
      const rDay=todayWk.days.find(d=>dow(d.date)===dayDow);
      if(rDay&&rDay.type!=="rest"){
        raceTodayHTML=`<div class="card mb10" style="border-color:${RT_COLOR[rDay.type]}44">
          <div class="lbl">Yarış planı — bugün</div>
          <div class="fb">
            <div>
              <div style="font-weight:600;color:${RT_COLOR[rDay.type]}">${RT_LABEL[rDay.type]} — ${rDay.dist} km @ ${rDay.pace}/km</div>
              <div class="mu" style="font-size:11px;margin-top:3px">${rDay.description}</div>
            </div>
            <button class="btn btns" onclick="go('race')">Detay <i class="ti ti-arrow-right"></i></button>
          </div>
        </div>`;
      }
    }
  }

  el("s-dashboard").innerHTML=
    buildCombinedMapHTML()+
    renderWeeklyCheckBanner()+
    `<div class="card mb10" style="border-color:${bc}44"><div class="fb"><div><div class="dim" style="font-size:10px">BUGÜN · ${today}</div><div style="font-size:18px;font-weight:600;margin-top:3px">${tp?BL[tp.branch]:"Plan atanmamış"}</div>${tp?.note?`<div class="mu" style="font-size:12px;margin-top:2px">${tp.note}</div>`:""}</div>${tp?tag(tp.branch):""}</div></div>`+
    raceTodayHTML+
    `<div class="g4 mb10">${[{l:"Bu hafta km",v:f1(wkm),u:"km",c:"#e8c547"},{l:"Bu ay km",v:f1(mkm),u:"km",c:"#e8c547"},{l:"Hafta kalori",v:fN(wkcal),u:"kcal",c:"#e05c3a"},{l:"Toplam seans",v:logs.length,u:"",c:"#5bb8a0"}].map(m=>mc(m.v,m.u,m.l,m.c)).join("")}</div>`+
    `<div class="g2"><div class="card"><div class="lbl">Son 7 gün — kalori</div>${barChart(d7,"kcal","day","#e05c3a")}</div><div class="card"><div class="lbl">Son 7 gün — km</div>${barChart(d7k,"km","day","#e8c547")}</div></div>`+
    (lr?`<div class="card mt8"><div class="lbl">Son koşu</div><div class="fb"><div><div style="font-size:14px;font-weight:500">${lr.runData.distance} km <span class="dim" style="font-size:11px">· ${lr.date}</span></div><div class="mu" style="font-size:11px;margin-top:3px">${lr.runData.pace} dk/km · ${lr.runData.type} · KAH ort ${lr.runData.hr_avg||"—"}</div></div><div style="font-size:22px;font-family:monospace;color:#e8c547;font-weight:500">${lr.runData.pace}<span style="font-size:10px;color:var(--tx3);margin-left:2px">dk/km</span></div></div></div>`:"")

  +`<div class="card mt8" style="border-style:dashed;cursor:pointer;text-align:center;padding:14px" onclick="showFitImport()">
    <i class="ti ti-watch" style="font-size:22px;color:#e8c547;display:block;margin-bottom:6px"></i>
    <div style="font-size:13px;font-weight:500;color:var(--tx2)">Suunto'dan FIT dosyası içe aktar</div>
    <div style="font-size:11px;color:var(--tx3);margin-top:3px">Antrenman verilerini otomatik doldur</div>
  </div>`;
  // Kas haritası + eklem haritası event listener'larını bağla
  setTimeout(initDashboardMuscleMap, 50);
  setTimeout(initJointMap, 60);
}
